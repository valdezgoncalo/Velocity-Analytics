<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SoccerAnalyst Pro - Smart Reset</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background-color: #020617; touch-action: manipulation; -webkit-tap-highlight-color: transparent; color: white; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        button { touch-action: manipulation; transition: all 0.2s; }
        .active-btn:active { transform: scale(0.95); }
        .timeline-dot { position: absolute; width: 6px; height: 6px; border-radius: 50%; transform: translateX(-50%); }
    </style>
</head>
<body class="font-sans select-none overflow-hidden text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const INITIAL_STATS = [
            { id: 1, name: 'Golo', count: 0, type: 'ataque' },
            { id: 2, name: 'Remate', count: 0, type: 'ataque' },
            { id: 3, name: 'Rem. Enquad.', count: 0, type: 'ataque' },
            { id: 4, name: 'Cantos', count: 0, type: 'ataque' },
            { id: 5, name: 'Rem. Área', count: 0, type: 'ataque' },
            { id: 6, name: 'Cruzam.', count: 0, type: 'ataque' },
            { id: 7, name: 'Golo Sofr.', count: 0, type: 'defesa' },
            { id: 8, name: 'Recuper.', count: 0, type: 'defesa' },
            { id: 9, name: 'Rem. Conc.', count: 0, type: 'defesa' },
            { id: 10, name: 'Rem. Área C.', count: 0, type: 'defesa' },
            { id: 11, name: 'Perdas Bola', count: 0, type: 'defesa' },
            { id: 12, name: 'Faltas', count: 0, type: 'defesa' }
        ];

        function App() {
            const [view, setView] = useState('folders'); 
            const [folders, setFolders] = useState(() => JSON.parse(localStorage.getItem('soccer_db_v3')) || []);
            const [currentFolderId, setCurrentFolderId] = useState(null);
            const [currentGame, setCurrentGame] = useState(null);
            const [isActive, setIsActive] = useState(false);
            const [showNotes, setShowNotes] = useState(false);

            useEffect(() => {
                localStorage.setItem('soccer_db_v3', JSON.stringify(folders));
            }, [folders]);

            useEffect(() => {
                let interval = null;
                if (isActive && currentGame) {
                    interval = setInterval(() => {
                        updateCurrentGameData('time', currentGame.time + 1);
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [isActive, currentGame]);

            const updateCurrentGameData = (field, value) => {
                const updatedFolders = folders.map(f => {
                    if (f.id === currentFolderId) {
                        return { ...f, games: f.games.map(g => g.id === currentGame.id ? { ...g, [field]: value } : g) };
                    }
                    return f;
                });
                setFolders(updatedFolders);
                setCurrentGame(prev => ({ ...prev, [field]: value }));
            };

            const resetGameStats = () => {
                if(confirm("Deseja colocar as ações deste jogo a zero? As notas e o tempo também serão reiniciados.")) {
                    updateCurrentGameData('stats', INITIAL_STATS);
                    updateCurrentGameData('events', []);
                    updateCurrentGameData('time', 0);
                    updateCurrentGameData('notes', "");
                    setIsActive(false);
                }
            };

            const createFolder = () => {
                const name = prompt("Nome da Pasta:");
                if (name) setFolders([...folders, { id: Date.now(), name, games: [] }]);
            };

            const createGame = (folderId) => {
                const opponent = prompt("Nome do Adversário:");
                if (opponent) {
                    const newGame = {
                        id: Date.now(),
                        opponent,
                        time: 0,
                        stats: INITIAL_STATS,
                        events: [],
                        notes: "",
                        date: new Date().toLocaleDateString('pt-PT')
                    };
                    setFolders(folders.map(f => f.id === folderId ? { ...f, games: [newGame, ...f.games] } : f));
                }
            };

            const addStat = (stat) => {
                if(!isActive) { alert("Inicia o cronómetro (START) primeiro!"); return; }
                const newStats = currentGame.stats.map(s => s.id === stat.id ? { ...s, count: s.count + 1 } : s);
                const newEvent = { time: currentGame.time, name: stat.name, type: stat.type };
                updateCurrentGameData('stats', newStats);
                updateCurrentGameData('events', [...currentGame.events, newEvent]);
            };

            const undoLast = () => {
                if (currentGame.events.length === 0) return;
                const lastEvent = currentGame.events[currentGame.events.length - 1];
                const newStats = currentGame.stats.map(s => s.name === lastEvent.name ? { ...s, count: Math.max(0, s.count - 1) } : s);
                updateCurrentGameData('stats', newStats);
                updateCurrentGameData('events', currentGame.events.slice(0, -1));
            };

            const formatTime = (s) => `${(s/60|0)}:${(s%60).toString().padStart(2,'0')}`;

            if (view === 'folders') return (
                <div className="p-6 h-screen bg-slate-950 overflow-y-auto">
                    <h1 className="text-2xl font-black text-indigo-500 mb-6 italic uppercase tracking-tighter">SoccerAnalyst Pro</h1>
                    <button onClick={createFolder} className="w-full p-4 mb-6 border-2 border-dashed border-slate-800 rounded-2xl text-slate-500 font-bold active-btn">+ Criar Pasta de Época</button>
                    <div className="space-y-3">
                        {folders.map(f => (
                            <div key={f.id} className="bg-slate-900 p-5 rounded-2xl flex justify-between items-center shadow-lg active-btn" onClick={() => { setCurrentFolderId(f.id); setView('games'); }}>
                                <div>
                                    <h3 className="font-black text-white uppercase italic">{f.name}</h3>
                                    <p className="text-[10px] text-slate-500 font-bold uppercase">{f.games.length} Jogos</p>
                                </div>
                                <button onClick={(e) => { e.stopPropagation(); if(confirm("Apagar pasta?")) setFolders(folders.filter(fold => fold.id !== f.id)); }} className="text-slate-700 text-xs">Apagar</button>
                            </div>
                        ))}
                    </div>
                </div>
            );

            if (view === 'games') {
                const folder = folders.find(f => f.id === currentFolderId);
                return (
                    <div className="p-6 h-screen bg-slate-950 overflow-y-auto text-white">
                        <button onClick={() => setView('folders')} className="text-[10px] font-black text-slate-500 mb-4 tracking-widest uppercase">← Voltar às Pastas</button>
                        <h2 className="text-xl font-black mb-6 uppercase italic text-indigo-400 border-l-4 border-indigo-500 pl-3">{folder.name}</h2>
                        <button onClick={() => createGame(folder.id)} className="w-full p-4 bg-indigo-600 rounded-2xl font-black uppercase italic mb-6 shadow-xl active-btn">Adicionar Novo Jogo</button>
                        <div className="space-y-3">
                            {folder.games.map(g => (
                                <div key={g.id} onClick={() => { setCurrentGame(g); setView('tracking'); }} className="bg-slate-900 p-5 rounded-2xl flex justify-between items-center active-btn">
                                    <span className="font-black uppercase italic text-sm">{g.opponent}</span>
                                    <span className="text-[10px] text-slate-600 font-bold">{g.date}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            if (view === 'report') return (
                <div className="h-screen bg-slate-950 flex flex-col overflow-hidden text-white">
                    <div className="p-4 border-b border-slate-800 flex justify-between shrink-0">
                        <button onClick={() => setView('tracking')} className="text-xs font-bold text-slate-500 uppercase">← Painel</button>
                        <button onClick={() => window.print()} className="bg-white text-black px-6 py-1 rounded-xl text-[10px] font-black uppercase italic">Exportar PDF</button>
                    </div>
                    <div id="report-area" className="flex-1 overflow-y-auto p-8 bg-slate-950">
                        <h2 className="text-4xl font-black italic uppercase text-indigo-500 mb-1">{currentGame.opponent}</h2>
                        <p className="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-10">{currentGame.date} | Duração: {formatTime(currentGame.time)}</p>

                        <div className="mb-10">
                            <h3 className="text-[10px] font-black uppercase text-slate-500 mb-3 tracking-[0.2em]">Fluxo de Jogo (Timeline)</h3>
                            <div className="relative w-full h-12 bg-slate-900 rounded-xl border border-slate-800 flex items-center overflow-hidden">
                                {currentGame.events.map((e, i) => (
                                    <div key={i} className={`timeline-dot ${e.type === 'ataque' ? 'bg-indigo-500 shadow-[0_0_8px_indigo]' : 'bg-red-600 shadow-[0_0_8px_red]'}`} 
                                         style={{ left: `${(e.time / (currentGame.time || 1)) * 100}%`, top: e.type === 'ataque' ? '25%' : '65%' }}></div>
                                ))}
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-8">
                            {['ataque', 'defesa'].map(t => (
                                <div key={t}>
                                    <h4 className={`text-xs font-black uppercase mb-4 ${t === 'ataque' ? 'text-indigo-400' : 'text-red-500'}`}>{t}</h4>
                                    {currentGame.stats.filter(s => s.type === t).map(s => (
                                        <div key={s.id} className="flex justify-between text-xs border-b border-slate-900 py-2">
                                            <span className="text-slate-400 uppercase font-bold text-[10px]">{s.name}</span>
                                            <span className="font-black text-sm">{s.count}</span>
                                        </div>
                                    ))}
                                </div>
                            ))}
                        </div>
                        {currentGame.notes && <div className="mt-12 p-5 bg-slate-900 rounded-2xl text-xs text-slate-400 italic border-l-4 border-indigo-500 uppercase font-medium">"{currentGame.notes}"</div>}
                    </div>
                </div>
            );

            return (
                <div className="h-screen flex flex-col bg-slate-950 overflow-hidden text-white">
                    <header className="p-3 bg-slate-900 border-b border-slate-800 flex justify-between items-center shrink-0">
                        <div className="flex items-center gap-2">
                            <div className="bg-slate-950 px-3 py-1 rounded-lg border border-slate-800">
                                <span className="text-xl font-mono font-black text-indigo-400">{formatTime(currentGame.time)}</span>
                            </div>
                            <button onClick={undoLast} className="bg-slate-800 w-10 h-10 rounded-xl flex items-center justify-center active-btn">↩</button>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setShowNotes(!showNotes)} className={`w-10 h-10 rounded-xl flex items-center justify-center ${currentGame.notes ? 'bg-indigo-600' : 'bg-slate-800'}`}>📝</button>
                            <button onClick={() => setIsActive(!isActive)} className={`px-4 rounded-xl font-black text-[10px] uppercase transition-colors ${isActive ? 'bg-red-600' : 'bg-green-600'}`}>{isActive ? 'STOP' : 'START'}</button>
                            <button onClick={resetGameStats} className="bg-slate-800 w-10 h-10 rounded-xl flex items-center justify-center text-xs text-red-500 font-bold active-btn">R</button>
                            <button onClick={() => setView('games')} className="bg-slate-800 p-2 rounded-xl text-xl active-btn">🏠</button>
                        </div>
                    </header>

                    {showNotes && (
                        <div className="p-4 bg-slate-900 border-b border-slate-800 shrink-0">
                            <textarea value={currentGame.notes} onChange={(e) => updateCurrentGameData('notes', e.target.value)} placeholder="Notas táticas deste jogo..." className="w-full h-20 bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs outline-none text-white focus:border-indigo-500" />
                        </div>
                    )}

                    <div className="flex-1 flex overflow-hidden">
                        {['ataque', 'defesa'].map(type => (
                            <div key={type} className="flex-1 flex flex-col border-r border-slate-900 last:border-r-0">
                                <div className="px-3 py-1 bg-slate-900/50 text-[9px] font-black uppercase tracking-widest text-slate-500 text-center">{type}</div>
                                <div className="flex-1 overflow-y-auto p-2 space-y-3 no-scrollbar pb-24">
                                    {currentGame.stats.filter(s => s.type === type).map(s => (
                                        <button key={s.id} onClick={() => addStat(s)} className="w-full h-16 bg-slate-900 rounded-2xl flex items-center px-4 border-l-4 border-slate-800 active:border-indigo-500 shadow-xl active-btn">
                                            <span className="text-2xl font-black mr-3 italic">{s.count}</span>
                                            <span className="text-[10px] font-black uppercase text-slate-400 text-left leading-tight tracking-tighter line-clamp-2">{s.name}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                    
                    <button onClick={() => setView('report')} className="absolute bottom-6 left-1/2 -translate-x-1/2 bg-white text-black px-10 py-4 rounded-full font-black uppercase italic shadow-2xl active-btn">Finalizar e PDF</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
