<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SoccerAnalyst Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600;800&display=swap');

        :root {
            --bg: #050810;
            --surface: #0d1117;
            --surface2: #161b22;
            --border: #1e2530;
            --accent: #4361ee;
            --accent2: #7209b7;
            --green: #2dc653;
            --red: #ef233c;
            --gold: #f9c74f;
            --text: #e6edf3;
            --muted: #6e7681;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
        }
        .bebas { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.05em; }
        .mono  { font-family: 'Space Mono', monospace; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-btn:active { transform: scale(0.95); opacity: 0.85; }

        /* ── TIMELINE ───────────────────────────────── */
        .timeline-wrap { position: relative; padding: 36px 0 24px; }
        .timeline-track {
            height: 56px; background: var(--surface);
            border-radius: 14px; border: 1px solid var(--border);
            position: relative; overflow: visible;
        }
        .timeline-half {
            position: absolute; top: 0; bottom: 0;
            background: rgba(255,255,255,0.015);
            border-right: 1px dashed var(--border);
            width: 50%; left: 0; border-radius: 14px 0 0 14px;
        }
        .tl-minute-mark { position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(255,255,255,0.04); }
        .tl-label-top {
            position: absolute; top: -22px;
            font-family: 'Space Mono', monospace; font-size: 8px;
            color: var(--muted); transform: translateX(-50%); white-space: nowrap;
        }
        .tl-event-dot {
            position: absolute; width: 9px; height: 9px; border-radius: 50%;
            top: 50%; transform: translate(-50%, -50%);
            cursor: pointer; transition: all 0.15s; z-index: 5;
        }
        .tl-event-dot:hover { transform: translate(-50%, -50%) scale(2); z-index: 10; }
        .tl-event-dot.goal {
            width: 13px; height: 13px; background: var(--gold);
            box-shadow: 0 0 12px var(--gold), 0 0 24px rgba(249,199,79,0.4);
            animation: pulse-gold 2s infinite;
        }
        .tl-event-dot.ataque { background: var(--accent); box-shadow: 0 0 6px rgba(67,97,238,0.5); }
        .tl-event-dot.defesa { background: var(--red);    box-shadow: 0 0 6px rgba(239,35,60,0.4); }
        .tl-tooltip {
            position: absolute; bottom: calc(100% + 8px); left: 50%;
            transform: translateX(-50%);
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 8px; padding: 4px 8px;
            font-size: 9px; font-family: 'Space Mono', monospace; color: var(--text);
            white-space: nowrap; pointer-events: none; opacity: 0;
            transition: opacity 0.15s; z-index: 20;
        }
        .tl-event-dot:hover .tl-tooltip { opacity: 1; }
        .tl-cluster {
            position: absolute; top: 50%; transform: translate(-50%, -50%);
            display: flex; flex-direction: column;
            align-items: center; gap: 2px; cursor: pointer; z-index: 5;
        }
        .tl-period-label {
            position: absolute; bottom: -22px;
            font-size: 8px; font-family: 'Space Mono', monospace;
            color: var(--muted); transform: translateX(-50%);
        }
        @keyframes pulse-gold {
            0%,100% { box-shadow: 0 0 12px var(--gold), 0 0 24px rgba(249,199,79,0.4); }
            50%      { box-shadow: 0 0 22px var(--gold), 0 0 44px rgba(249,199,79,0.7); }
        }

        /* ── BAR CHART ──────────────────────────────── */
        .bar-row   { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .bar-label { font-size: 10px; color: var(--muted); min-width: 90px; font-weight: 600; text-transform: uppercase; }
        .bar-track { flex: 1; height: 22px; background: var(--surface); border-radius: 6px; overflow: hidden; position: relative; }
        .bar-fill  { height: 100%; border-radius: 6px; transition: width 0.8s cubic-bezier(0.23,1,0.32,1); position: relative; }
        .bar-value { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-family: 'Space Mono',monospace; font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.9); }

        /* ── CARD ───────────────────────────────────── */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }

        /* ── STAT BUTTON ────────────────────────────── */
        .stat-btn {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; display: flex; align-items: center;
            padding: 12px 14px; gap: 10px; cursor: pointer;
            transition: all 0.15s; width: 100%;
        }
        .stat-btn:active { border-color: var(--accent); background: rgba(67,97,238,0.1); }
        .stat-count { font-family: 'Bebas Neue',sans-serif; font-size: 32px; line-height: 1; min-width: 36px; }
        .stat-name  { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); line-height: 1.2; }

        /* ── TOAST ──────────────────────────────────── */
        .toast {
            position: fixed; top: 16px; right: 16px;
            background: var(--surface2); border: 1px solid var(--accent);
            color: white; padding: 10px 18px; border-radius: 10px;
            box-shadow: 0 8px 30px rgba(67,97,238,0.3);
            z-index: 9999; animation: slideIn 0.25s ease-out;
            font-weight: 700; font-size: 11px; text-transform: uppercase;
            letter-spacing: 0.05em; pointer-events: none;
        }
        .toast.goal-toast {
            border-color: var(--gold); box-shadow: 0 8px 30px rgba(249,199,79,0.4);
            font-family: 'Bebas Neue',sans-serif; font-size: 18px;
        }
        @keyframes slideIn {
            from { transform: translateX(120%) scale(0.9); opacity: 0; }
            to   { transform: translateX(0) scale(1); opacity: 1; }
        }
        .slide-enter { animation: slideEnter 0.3s ease-out; }
        @keyframes slideEnter {
            from { transform: translateX(-20px); opacity: 0; }
            to   { transform: translateX(0); opacity: 1; }
        }

        /* ── REPORT ─────────────────────────────────── */
        #report-area { background: #050810; color: white; }
        .report-section-title {
            font-family: 'Bebas Neue',sans-serif; font-size: 11px; letter-spacing: 0.15em;
            color: var(--muted); text-transform: uppercase; margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
        }
        .report-section-title::after { content:''; flex:1; height:1px; background:var(--border); }

        /* ── INTENSITY CHART ────────────────────────── */
        .intensity-chart { width: 100%; position: relative; }

        /* ── LANDSCAPE MODE ─────────────────────────── */
        @media (orientation: landscape) and (max-height: 500px) {
            .ls-header {
                padding: 6px 12px !important;
                flex-direction: row !important;
                flex-wrap: nowrap !important;
                gap: 6px !important;
            }
            .ls-timer-block { font-size: 18px !important; }
            .ls-btn-sm { width: 32px !important; height: 32px !important; font-size: 12px !important; }
            .ls-start-btn { padding: 0 10px !important; height: 32px !important; font-size: 13px !important; }
            .ls-pdf-btn  { padding: 0 10px !important; height: 32px !important; font-size: 12px !important; }
            .stat-btn { padding: 6px 10px !important; }
            .stat-count { font-size: 24px !important; }
            .ls-notes textarea { height: 48px !important; }
            .ls-col-header { padding: 4px 8px !important; }
            .ls-home-btn { display: none !important; }
        }

        /* ── MISC ───────────────────────────────────── */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
        input, textarea, select {
            background: var(--surface); color: var(--text);
            border: 1px solid var(--border); outline: none;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ═══════════════════════════════════════════════════════════════
   STORAGE
═══════════════════════════════════════════════════════════════ */
const DB_KEY        = 'socceranalyst_v4';
const DB_BACKUP_KEY = 'socceranalyst_v4_bak';

function loadDB() {
    for (const key of [DB_KEY, DB_BACKUP_KEY]) {
        try {
            const raw = localStorage.getItem(key);
            if (raw) { const p = JSON.parse(raw); if (Array.isArray(p)) return p; }
        } catch (_) {}
    }
    return [];
}
function saveDB(folders) {
    try {
        const str = JSON.stringify(folders);
        const prev = localStorage.getItem(DB_KEY);
        if (prev) localStorage.setItem(DB_BACKUP_KEY, prev);
        localStorage.setItem(DB_KEY, str);
    } catch (e) { console.warn('SoccerAnalyst: save failed', e); }
}

/* ═══════════════════════════════════════════════════════════════
   DEFAULT TEMPLATE
═══════════════════════════════════════════════════════════════ */
const DEFAULT_TEMPLATE = [
    { id: 1,  name: 'Golo',         type: 'ataque' },
    { id: 2,  name: 'Remate',       type: 'ataque' },
    { id: 3,  name: 'Rem. Enquad.', type: 'ataque' },
    { id: 4,  name: 'Cantos',       type: 'ataque' },
    { id: 5,  name: 'Rem. Area',    type: 'ataque' },
    { id: 6,  name: 'Cruzam.',      type: 'ataque' },
    { id: 7,  name: 'Golo Sofr.',   type: 'defesa' },
    { id: 8,  name: 'Recuper.',     type: 'defesa' },
    { id: 9,  name: 'Rem. Conc.',   type: 'defesa' },
    { id: 10, name: 'Rem. Area C.', type: 'defesa' },
    { id: 11, name: 'Perdas Bola',  type: 'defesa' },
    { id: 12, name: 'Faltas',       type: 'defesa' },
];
const statsFromTemplate = t => t.map(s => ({ id: s.id, name: s.name, type: s.type, count: 0 }));

/* ═══════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════ */
const promptText = (msg, def = '') => { const r = prompt(msg, def); if (r===null) return null; const t=r.trim(); return t.length?t:null; };
const parsePtDate = v => { if(!v) return null; const p=v.split('/'); if(p.length!==3) return null; const [d,m,y]=p.map(Number); return (d&&m&&y)?new Date(y,m-1,d):null; };
const fmt    = s => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
const fmtMin = s => `${Math.floor(s/60)}'`;

/* ═══════════════════════════════════════════════════════════════
   HOOK: orientation
═══════════════════════════════════════════════════════════════ */
function useOrientation() {
    const [landscape, setLandscape] = useState(
        () => window.innerWidth > window.innerHeight && window.innerHeight < 500
    );
    useEffect(() => {
        const h = () => setLandscape(window.innerWidth > window.innerHeight && window.innerHeight < 500);
        window.addEventListener('resize', h);
        window.addEventListener('orientationchange', h);
        return () => { window.removeEventListener('resize', h); window.removeEventListener('orientationchange', h); };
    }, []);
    return landscape;
}

/* ═══════════════════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════════════════ */
function Toast({ message, isGoal, onClose }) {
    useEffect(() => { const t = setTimeout(onClose, isGoal?3000:2000); return ()=>clearTimeout(t); }, [onClose]);
    return <div className={`toast${isGoal?' goal-toast':''}`}>{message}</div>;
}

/* ═══════════════════════════════════════════════════════════════
   BAR CHART
═══════════════════════════════════════════════════════════════ */
function BarChart({ data, colorFn }) {
    const max = Math.max(...data.map(d=>d.value), 1);
    return (
        <div>
            {data.map((d,i) => (
                <div key={i} className="bar-row">
                    <div className="bar-label">{d.label}</div>
                    <div className="bar-track">
                        <div className="bar-fill" style={{width:`${(d.value/max)*100}%`, background: colorFn?colorFn(d,i):'var(--accent)'}}>
                            {d.value>0 && <span className="bar-value">{d.value}</span>}
                        </div>
                        {d.value===0 && <span style={{position:'absolute',left:8,top:'50%',transform:'translateY(-50%)',fontSize:10,color:'var(--muted)',fontFamily:'Space Mono'}}>0</span>}
                    </div>
                </div>
            ))}
        </div>
    );
}

/* ═══════════════════════════════════════════════════════════════
   DONUT CHART
═══════════════════════════════════════════════════════════════ */
function DonutChart({ value, max, color, label, sublabel, size=80 }) {
    const r=30, circ=2*Math.PI*r;
    const dash = (max>0 ? Math.min(value/max,1) : 0)*circ;
    return (
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
            <svg width={size} height={size} viewBox="0 0 80 80">
                <circle cx="40" cy="40" r={r} fill="none" stroke="var(--border)" strokeWidth="8"/>
                <circle cx="40" cy="40" r={r} fill="none" stroke={color} strokeWidth="8"
                    strokeDasharray={`${dash} ${circ-dash}`} strokeLinecap="round"
                    style={{transform:'rotate(-90deg)',transformOrigin:'50% 50%',transition:'stroke-dasharray 0.8s cubic-bezier(0.23,1,0.32,1)'}}/>
                <text x="40" y="38" textAnchor="middle" dominantBaseline="middle"
                    style={{fill:'white',fontFamily:'Bebas Neue',fontSize:20,letterSpacing:1}}>{value}</text>
                <text x="40" y="52" textAnchor="middle" dominantBaseline="middle"
                    style={{fill:'var(--muted)',fontFamily:'DM Sans',fontSize:7,fontWeight:600,textTransform:'uppercase'}}>{sublabel}</text>
            </svg>
            <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',color:'var(--muted)',letterSpacing:'0.06em'}}>{label}</div>
        </div>
    );
}

/* ═══════════════════════════════════════════════════════════════
   STACKED BAR
═══════════════════════════════════════════════════════════════ */
function StackedBar({ leftVal, rightVal, leftColor, rightColor, leftLabel, rightLabel }) {
    const total = leftVal+rightVal;
    const lp = total>0?(leftVal/total)*100:50;
    return (
        <div>
            <div style={{display:'flex',height:28,borderRadius:8,overflow:'hidden',gap:2}}>
                <div style={{width:`${lp}%`,background:leftColor,display:'flex',alignItems:'center',justifyContent:'flex-end',paddingRight:8,fontSize:11,fontFamily:'Space Mono',fontWeight:700,minWidth:lp>0?'30px':0}}>{leftVal>0?leftVal:''}</div>
                <div style={{width:`${100-lp}%`,background:rightColor,display:'flex',alignItems:'center',justifyContent:'flex-start',paddingLeft:8,fontSize:11,fontFamily:'Space Mono',fontWeight:700,minWidth:(100-lp)>0?'30px':0}}>{rightVal>0?rightVal:''}</div>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:6}}>
                <span style={{fontSize:9,color:leftColor,fontWeight:700,textTransform:'uppercase'}}>{leftLabel}</span>
                <span style={{fontSize:9,color:rightColor,fontWeight:700,textTransform:'uppercase'}}>{rightLabel}</span>
            </div>
        </div>
    );
}

/* ═══════════════════════════════════════════════════════════════
   RADAR CHART
═══════════════════════════════════════════════════════════════ */
function RadarChart({ stats, size = 220 }) {
    const axes = [
        { key: 'Golo',         label: 'Golos',     max: 5,  color: 'var(--green)' },
        { key: 'Remate',       label: 'Remates',   max: 20, color: 'var(--accent)' },
        { key: 'Rem. Enquad.', label: 'Enquad.',   max: 12, color: '#4cc9f0' },
        { key: 'Cantos',       label: 'Cantos',    max: 10, color: var_gold },
        { key: 'Recuper.',     label: 'Recuper.',  max: 15, color: '#a8dadc' },
        { key: 'Faltas',       label: 'Faltas',    max: 15, color: 'var(--red)' },
    ];
    const N    = axes.length;
    const cx   = size / 2;
    const cy   = size / 2;
    const R    = size * 0.38;
    const rings = [0.25, 0.5, 0.75, 1.0];

    const angleOf = i => (Math.PI * 2 * i) / N - Math.PI / 2;

    const ptOf = (i, ratio) => {
        const a = angleOf(i);
        return { x: cx + R * ratio * Math.cos(a), y: cy + R * ratio * Math.sin(a) };
    };

    const dataPoints = axes.map((ax, i) => {
        const stat = stats.find(s => s.name === ax.key);
        const v    = stat ? stat.count : 0;
        const ratio = Math.min(v / ax.max, 1);
        return ptOf(i, ratio);
    });
    const dataPath = dataPoints.map((p, i) => `${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ') + ' Z';

    const labelPt = (i) => {
        const a = angleOf(i);
        const off = 18;
        return { x: cx + (R + off) * Math.cos(a), y: cy + (R + off) * Math.sin(a) };
    };

    return (
        <div style={{display:'flex',justifyContent:'center',alignItems:'center'}}>
            <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{overflow:'visible'}}>
                {rings.map((r, ri) => {
                    const ringPts = axes.map((_,i) => ptOf(i, r));
                    const rPath = ringPts.map((p,i)=>`${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ')+' Z';
                    return <path key={ri} d={rPath} fill="none" stroke="var(--border)" strokeWidth="1" strokeDasharray={r<1?"3,3":""}/>;
                })}
                {axes.map((_,i) => {
                    const outer = ptOf(i,1);
                    return <line key={i} x1={cx} y1={cy} x2={outer.x.toFixed(1)} y2={outer.y.toFixed(1)} stroke="var(--border)" strokeWidth="1"/>;
                })}
                <path d={dataPath} fill="rgba(67,97,238,0.18)" stroke="var(--accent)" strokeWidth="2" strokeLinejoin="round"/>
                {dataPoints.map((p,i) => (
                    <circle key={i} cx={p.x.toFixed(1)} cy={p.y.toFixed(1)} r="4" fill={axes[i].color} stroke="var(--bg)" strokeWidth="1.5"/>
                ))}
                {axes.map((ax,i) => {
                    const lp = labelPt(i);
                    const anchor = Math.abs(Math.cos(angleOf(i))) < 0.1 ? 'middle' : Math.cos(angleOf(i)) > 0 ? 'start' : 'end';
                    const stat = stats.find(s => s.name === ax.key);
                    const val  = stat ? stat.count : 0;
                    return (
                        <g key={i}>
                            <text x={lp.x.toFixed(1)} y={(lp.y - 4).toFixed(1)} textAnchor={anchor}
                                style={{fill:'var(--muted)',fontFamily:'DM Sans',fontSize:9,fontWeight:700,textTransform:'uppercase'}}>{ax.label}</text>
                            <text x={lp.x.toFixed(1)} y={(lp.y + 8).toFixed(1)} textAnchor={anchor}
                                style={{fill:axes[i].color,fontFamily:'Space Mono',fontSize:10,fontWeight:700}}>{val}</text>
                        </g>
                    );
                })}
                <circle cx={cx} cy={cy} r="3" fill="var(--accent)" opacity="0.5"/>
            </svg>
        </div>
    );
}
const var_gold = '#f9c74f';

/* ═══════════════════════════════════════════════════════════════
   INTENSITY CHART
═══════════════════════════════════════════════════════════════ */
function IntensityChart({ events, totalTime }) {
    const W = 560, H = 90;
    const BUCKET = 5 * 60;
    const gameMin = Math.max(totalTime, 90 * 60);
    const numBuckets = Math.ceil(gameMin / BUCKET);

    const atkBuckets = new Array(numBuckets).fill(0);
    const defBuckets = new Array(numBuckets).fill(0);
    const totBuckets = new Array(numBuckets).fill(0);

    events.forEach(e => {
        const b = Math.min(Math.floor(e.time / BUCKET), numBuckets - 1);
        if (e.type === 'ataque') atkBuckets[b]++;
        else defBuckets[b]++;
        totBuckets[b]++;
    });

    const maxVal = Math.max(...totBuckets, 1);

    const smooth = arr => arr.map((v, i) => {
        const win = arr.slice(Math.max(0, i-1), i+2);
        return win.reduce((a,b)=>a+b,0) / win.length;
    });

    const atkS = smooth(atkBuckets);
    const defS = smooth(defBuckets);
    const totS = smooth(totBuckets);

    const xOf = i => (i / (numBuckets - 1)) * W;
    const yOf = v => H - 8 - ((v / maxVal) * (H - 20));

    const buildPath = (arr, closed = false) => {
        if (arr.length === 0) return '';
        const pts = arr.map((v, i) => [xOf(i), yOf(v)]);
        let d = `M${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`;
        for (let i = 0; i < pts.length - 1; i++) {
            const p0 = pts[Math.max(0, i-1)];
            const p1 = pts[i];
            const p2 = pts[i+1];
            const p3 = pts[Math.min(pts.length-1, i+2)];
            const cp1x = p1[0] + (p2[0] - p0[0]) / 6;
            const cp1y = p1[1] + (p2[1] - p0[1]) / 6;
            const cp2x = p2[0] - (p3[0] - p1[0]) / 6;
            const cp2y = p2[1] - (p3[1] - p1[1]) / 6;
            d += ` C${cp1x.toFixed(1)},${cp1y.toFixed(1)} ${cp2x.toFixed(1)},${cp2y.toFixed(1)} ${p2[0].toFixed(1)},${p2[1].toFixed(1)}`;
        }
        if (closed) {
            d += ` L${pts[pts.length-1][0].toFixed(1)},${H} L${pts[0][0].toFixed(1)},${H} Z`;
        }
        return d;
    };

    const gradId1 = 'ig1', gradId2 = 'ig2', gradId3 = 'ig3';
    const minLabels = [0, 15, 30, 45, 60, 75, 90];

    return (
        <div style={{width:'100%',overflowX:'auto'}} className="no-scrollbar">
            <svg viewBox={`0 0 ${W} ${H+10}`} style={{width:'100%',minWidth:280,height:'auto',display:'block'}}>
                <defs>
                    <linearGradient id={gradId3} x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stopColor="#4361ee" stopOpacity="0.25"/>
                        <stop offset="100%" stopColor="#4361ee" stopOpacity="0"/>
                    </linearGradient>
                    <linearGradient id={gradId1} x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stopColor="#2dc653" stopOpacity="0.3"/>
                        <stop offset="100%" stopColor="#2dc653" stopOpacity="0"/>
                    </linearGradient>
                    <linearGradient id={gradId2} x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stopColor="#ef233c" stopOpacity="0.3"/>
                        <stop offset="100%" stopColor="#ef233c" stopOpacity="0"/>
                    </linearGradient>
                </defs>
                <line x1={W/2} y1="0" x2={W/2} y2={H} stroke="var(--border)" strokeWidth="1" strokeDasharray="4,4"/>
                {totS.length > 1 && <path d={buildPath(totS, true)} fill={`url(#${gradId3})`}/>}
                {totS.length > 1 && <path d={buildPath(totS)} fill="none" stroke="var(--accent)" strokeWidth="2" strokeLinejoin="round"/>}
                {atkS.length > 1 && <path d={buildPath(atkS)} fill="none" stroke="var(--green)" strokeWidth="1.5" strokeLinejoin="round" strokeDasharray="5,3"/>}
                {defS.length > 1 && <path d={buildPath(defS)} fill="none" stroke="var(--red)" strokeWidth="1.5" strokeLinejoin="round" strokeDasharray="3,4"/>}
                {events.filter(e=>e.isGoal).map((e,i) => {
                    const b = Math.min(Math.floor(e.time / BUCKET), numBuckets-1);
                    const x = xOf(b);
                    const y = yOf(totS[b]);
                    return (
                        <g key={i}>
                            <circle cx={x.toFixed(1)} cy={y.toFixed(1)} r="5" fill="var(--gold)" stroke="var(--bg)" strokeWidth="1.5"/>
                        </g>
                    );
                })}
                {minLabels.map(m => {
                    const x = (m / 90) * W;
                    return (
                        <g key={m}>
                            <line x1={x.toFixed(1)} y1={H-2} x2={x.toFixed(1)} y2={H+2} stroke="var(--muted)" strokeWidth="1"/>
                            <text x={x.toFixed(1)} y={H+10} textAnchor="middle"
                                style={{fill:'var(--muted)',fontFamily:'Space Mono',fontSize:8}}>{m}'</text>
                        </g>
                    );
                })}
                <line x1="0" y1={H} x2={W} y2={H} stroke="var(--border)" strokeWidth="1"/>
            </svg>
            <div style={{display:'flex',gap:16,justifyContent:'center',marginTop:10}}>
                {[
                    {color:'var(--accent)', label:'Total', dash:false},
                    {color:'var(--green)',  label:'Ataque', dash:true},
                    {color:'var(--red)',    label:'Defesa', dash:true},
                    {color:'var(--gold)',   label:'Golos', dot:true},
                ].map(l => (
                    <div key={l.label} style={{display:'flex',alignItems:'center',gap:5}}>
                        {l.dot
                            ? <div style={{width:8,height:8,borderRadius:'50%',background:l.color}}/>
                            : <svg width={20} height={8}><line x1="0" y1="4" x2="20" y2="4" stroke={l.color} strokeWidth="2" strokeDasharray={l.dash?"4,3":"none"}/></svg>
                        }
                        <span style={{fontSize:9,fontWeight:700,textTransform:'uppercase',color:'var(--muted)'}}>{l.label}</span>
                    </div>
                ))}
            </div>
        </div>
    );
}

/* ═══════════════════════════════════════════════════════════════
   TIMELINE
═══════════════════════════════════════════════════════════════ */
function Timeline({ events, totalTime }) {
    const [hovered, setHovered] = useState(null);
    const displayTime = Math.max(totalTime, 90*60);
    const THRESHOLD = 0.025;
    const clusters = [];
    [...events].sort((a,b)=>a.time-b.time).forEach(ev => {
        const pct = ev.time / displayTime;
        const last = clusters[clusters.length-1];
        if (last && Math.abs(last.pct-pct)<THRESHOLD) {
            last.events.push(ev);
            last.pct = last.events.reduce((s,e)=>s+e.time/displayTime,0)/last.events.length;
        } else { clusters.push({pct, events:[ev]}); }
    });
    const minutes = [15,30,45,60,75,90];
    return (
        <div className="timeline-wrap">
            <div className="timeline-track">
                <div className="timeline-half"/>
                {minutes.map(m=>(
                    <div key={m} className="tl-minute-mark" style={{left:`${(m*60/displayTime)*100}%`}}>
                        <span className="tl-label-top">{m}'</span>
                    </div>
                ))}
                {clusters.map((cluster, ci) => {
                    if (cluster.events.length===1) {
                        const e = cluster.events[0];
                        return (
                            <div key={ci} className={`tl-event-dot ${e.isGoal?'goal':e.type}`} style={{left:`${cluster.pct*100}%`}}
                                onMouseEnter={()=>setHovered(ci)} onMouseLeave={()=>setHovered(null)}>
                                <div className="tl-tooltip">{fmtMin(e.time)} {e.name}</div>
                            </div>
                        );
                    }
                    return (
                        <div key={ci} className="tl-cluster" style={{left:`${cluster.pct*100}%`}}
                            onMouseEnter={()=>setHovered(ci)} onMouseLeave={()=>setHovered(null)}>
                            {cluster.events.slice(0,4).map((e,ei)=>(
                                <div key={ei} className={`tl-event-dot ${e.isGoal?'goal':e.type}`}
                                    style={{position:'relative',transform:'none',top:'auto',left:'auto',marginBottom:1}}/>
                            ))}
                            {hovered===ci && (
                                <div style={{position:'absolute',bottom:'calc(100% + 8px)',left:'50%',transform:'translateX(-50%)',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,padding:'6px 10px',zIndex:20,whiteSpace:'nowrap',minWidth:120}}>
                                    {cluster.events.map((e,ei)=>(
                                        <div key={ei} style={{fontSize:9,fontFamily:'Space Mono',color:'var(--text)',marginBottom:2}}>{fmtMin(e.time)} {e.name}</div>
                                    ))}
                                </div>
                            )}
                        </div>
                    );
                })}
                <span className="tl-period-label" style={{left:'25%'}}>1 Tempo</span>
                <span className="tl-period-label" style={{left:'75%'}}>2 Tempo</span>
            </div>
            <div style={{display:'flex',gap:16,marginTop:28,justifyContent:'center'}}>
                {[{color:'var(--gold)',label:'Golo'},{color:'var(--accent)',label:'Ataque'},{color:'var(--red)',label:'Defesa'}].map(l=>(
                    <div key={l.label} style={{display:'flex',alignItems:'center',gap:6}}>
                        <div style={{width:8,height:8,borderRadius:'50%',background:l.color}}/>
                        <span style={{fontSize:9,fontWeight:700,textTransform:'uppercase',color:'var(--muted)'}}>{l.label}</span>
                    </div>
                ))}
            </div>
        </div>
    );
}

/* ═══════════════════════════════════════════════════════════════
   NATIVE PDF EXPORT  ← COMPLETAMENTE REESCRITO
   Usa jsPDF puro: texto vectorial, barras, arcos, timeline.
   Sem html2canvas → resultado nítido, seleccionável, leve.
═══════════════════════════════════════════════════════════════ */
function buildNativePDF(game) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

    // ── Paleta (RGB arrays para jsPDF)
    const C = {
        bg:      [5,   8,  16],
        surface: [13,  17,  23],
        surface2:[22,  27,  34],
        border:  [30,  37,  48],
        accent:  [67,  97, 238],
        green:   [45, 198,  83],
        red:     [239, 35,  60],
        gold:    [249,199,  79],
        text:    [230,237, 243],
        muted:   [110,118, 129],
        white:   [255,255, 255],
    };

    const PW = 210, PH = 297;
    const ML = 14, MR = 14, MT = 14;
    const CW = PW - ML - MR;  // 182 mm content width
    let y = MT;

    // ── Helpers ─────────────────────────────────────
    const setFill   = (c) => doc.setFillColor(...c);
    const setStroke = (c) => doc.setDrawColor(...c);
    const setTxt    = (c) => doc.setTextColor(...c);
    const rect      = (x,yy,w,h,r=0) => { if(r>0) doc.roundedRect(x,yy,w,h,r,r,'F'); else doc.rect(x,yy,w,h,'F'); };
    const strokeRect= (x,yy,w,h,r=0,lw=0.3) => { doc.setLineWidth(lw); if(r>0) doc.roundedRect(x,yy,w,h,r,r,'S'); else doc.rect(x,yy,w,h,'S'); };
    const line      = (x1,y1,x2,y2,lw=0.3) => { doc.setLineWidth(lw); doc.line(x1,y1,x2,y2); };
    const txt       = (s,x,yy,opts={}) => { doc.text(String(s),x,yy,opts); };
    const newPage   = () => { doc.addPage(); y = MT; };
    const checkPage = (needed=20) => { if(y+needed > PH-10) newPage(); };

    // Helpers de cor "hex → rgb array"  (não precisamos, usando C directamente)

    // ── Helper: desenhar barra horizontal de progresso ─
    // x, yy: canto sup-esq  w: largura total  h: altura  val 0-1  color
    const progressBar = (x, yy, w, h, ratio, colorFill, rounding=1) => {
        setFill(C.surface2);  rect(x, yy, w, h, rounding);
        if(ratio>0) { setFill(colorFill); rect(x, yy, Math.max(w*ratio, 1), h, rounding); }
    };

    // ── Helper: arco (donut) ─
    // jsPDF não tem arco nativo nítido, simulamos com linhas densas (polyline circular)
    const drawArc = (cx, cy, r, startDeg, endDeg, color, lw=2) => {
        if(endDeg <= startDeg) return;
        doc.setDrawColor(...color);
        doc.setLineWidth(lw);
        const steps = Math.max(2, Math.round((endDeg-startDeg)/2));
        const pts = [];
        for(let i=0; i<=steps; i++) {
            const ang = (startDeg + (endDeg-startDeg)*(i/steps)) * Math.PI/180;
            pts.push([cx + r*Math.cos(ang), cy + r*Math.sin(ang)]);
        }
        for(let i=0;i<pts.length-1;i++) doc.line(pts[i][0],pts[i][1],pts[i+1][0],pts[i+1][1]);
    };

    const drawDonut = (cx, cy, r, ratio, color, valStr, labelStr) => {
        // fundo cinza
        drawArc(cx, cy, r, -90, 270, C.border, 2.5);
        // arco colorido
        if(ratio>0) drawArc(cx, cy, r, -90, -90 + 360*Math.min(ratio,1), color, 2.5);
        // valor central
        setTxt(C.text); doc.setFontSize(9); doc.setFont('helvetica','bold');
        txt(valStr, cx, cy+1.5, {align:'center'});
        // label abaixo
        setTxt(C.muted); doc.setFontSize(5.5); doc.setFont('helvetica','normal');
        txt(labelStr.toUpperCase(), cx, cy+r+5, {align:'center'});
    };

    // ── Helper: spider/radar simplificado (hexágono)
    const drawRadar = (cx, cy, R, stats) => {
        const axes = [
            { key:'Golo',         label:'GOLOS',    max:5  },
            { key:'Remate',       label:'REMATES',  max:20 },
            { key:'Rem. Enquad.', label:'ENQUAD.',  max:12 },
            { key:'Cantos',       label:'CANTOS',   max:10 },
            { key:'Recuper.',     label:'RECUPER.', max:15 },
            { key:'Faltas',       label:'FALTAS',   max:15 },
        ];
        const N = axes.length;
        const ang = i => (2*Math.PI*i/N) - Math.PI/2;

        // rings
        [0.25,0.5,0.75,1].forEach(rv => {
            const pts = axes.map((_,i)=>({x: cx+R*rv*Math.cos(ang(i)), y: cy+R*rv*Math.sin(ang(i))}));
            setStroke(C.border); doc.setLineWidth(0.2);
            for(let i=0;i<N;i++) doc.line(pts[i].x,pts[i].y,pts[(i+1)%N].x,pts[(i+1)%N].y);
        });
        // spokes
        axes.forEach((_,i)=>{
            setStroke(C.border); doc.setLineWidth(0.2);
            doc.line(cx,cy,cx+R*Math.cos(ang(i)),cy+R*Math.sin(ang(i)));
        });
        // data polygon
        const vals = axes.map((ax,i)=>{
            const s=stats.find(s=>s.name===ax.key);
            return s?Math.min(s.count/ax.max,1):0;
        });
        const dataPts = vals.map((v,i)=>({x:cx+R*v*Math.cos(ang(i)),y:cy+R*v*Math.sin(ang(i))}));
        // fill (semi-transparent via alpha trick: draw multiple times with low opacity → just use light stroke+fill)
        doc.setFillColor(67,97,238); doc.setGState(doc.GState({opacity:0.18}));
        doc.setDrawColor(67,97,238); doc.setLineWidth(0.5);
        // polygon fill
        const xPts = dataPts.map(p=>p.x);
        const yPts = dataPts.map(p=>p.y);
        // jsPDF polygon
        if(typeof doc.polygon === 'function') {
            const ptsArr = dataPts.map(p=>[p.x,p.y]);
            doc.setGState(doc.GState({opacity:0.18}));
            doc.polygon(ptsArr,'FD');
        } else {
            // fallback: draw outline only
            doc.setGState(new doc.GState({opacity:1}));
            for(let i=0;i<N;i++) doc.line(dataPts[i].x,dataPts[i].y,dataPts[(i+1)%N].x,dataPts[(i+1)%N].y);
        }
        doc.setGState(new doc.GState({opacity:1}));
        // dots + labels
        axes.forEach((ax,i)=>{
            const s=stats.find(s=>s.name===ax.key);
            const v=s?s.count:0;
            // dot
            setFill(C.accent); doc.circle(dataPts[i].x,dataPts[i].y,0.8,'F');
            // label
            const lx = cx+(R+6)*Math.cos(ang(i));
            const ly = cy+(R+6)*Math.sin(ang(i));
            const align = Math.abs(Math.cos(ang(i)))<0.15?'center':Math.cos(ang(i))>0?'left':'right';
            setTxt(C.muted); doc.setFontSize(5); doc.setFont('helvetica','bold');
            txt(ax.label, lx, ly-1, {align});
            setTxt(C.accent); doc.setFontSize(6);
            txt(String(v), lx, ly+3, {align});
        });
    };

    // ── Helper: intensity sparkline (polyline) ─
    const drawIntensityLine = (x0, yBase, w, h, events, totalSecs) => {
        const BUCKET = 5*60;
        const gameMin = Math.max(totalSecs, 90*60);
        const numB = Math.ceil(gameMin/BUCKET);
        const atkB = new Array(numB).fill(0);
        const defB = new Array(numB).fill(0);
        const totB = new Array(numB).fill(0);
        events.forEach(e=>{
            const b=Math.min(Math.floor(e.time/BUCKET),numB-1);
            if(e.type==='ataque') atkB[b]++; else defB[b]++;
            totB[b]++;
        });
        const maxV = Math.max(...totB,1);
        const smooth = arr=>arr.map((v,i)=>{
            const win=arr.slice(Math.max(0,i-1),i+2);
            return win.reduce((a,b)=>a+b,0)/win.length;
        });
        const totS=smooth(totB), atkS=smooth(atkB), defS=smooth(defB);
        const xOf=i=>x0+(i/(numB-1))*w;
        const yOf=v=>yBase-(v/maxV)*h;

        // HT line
        setStroke(C.border); doc.setLineWidth(0.2); doc.setLineDashPattern([1,1],0);
        doc.line(x0+w/2, yBase-h, x0+w/2, yBase);
        doc.setLineDashPattern([],0);

        // baseline
        setStroke(C.border); doc.setLineWidth(0.3);
        doc.line(x0,yBase,x0+w,yBase);

        // total line (accent)
        doc.setDrawColor(...C.accent); doc.setLineWidth(0.6);
        for(let i=0;i<numB-1;i++) doc.line(xOf(i),yOf(totS[i]),xOf(i+1),yOf(totS[i+1]));

        // ataque dashed (green)
        doc.setDrawColor(...C.green); doc.setLineWidth(0.4);
        doc.setLineDashPattern([1.5,1],0);
        for(let i=0;i<numB-1;i++) doc.line(xOf(i),yOf(atkS[i]),xOf(i+1),yOf(atkS[i+1]));

        // defesa dashed (red)
        doc.setDrawColor(...C.red); doc.setLineWidth(0.4);
        doc.setLineDashPattern([1,1.5],0);
        for(let i=0;i<numB-1;i++) doc.line(xOf(i),yOf(defS[i]),xOf(i+1),yOf(defS[i+1]));

        doc.setLineDashPattern([],0);

        // goal dots
        events.filter(e=>e.isGoal).forEach(e=>{
            const b=Math.min(Math.floor(e.time/BUCKET),numB-1);
            const gx=xOf(b), gy=yOf(totS[b]);
            setFill(C.gold); doc.circle(gx,gy,1.2,'F');
        });

        // minute labels
        [0,15,30,45,60,75,90].forEach(m=>{
            const mx=x0+(m/90)*w;
            setTxt(C.muted); doc.setFontSize(4.5); doc.setFont('helvetica','normal');
            txt(`${m}'`,mx,yBase+3.5,{align:'center'});
        });

        // legend
        const lx=x0, ly=yBase+7;
        const legends=[
            {color:C.accent,label:'Total',dash:false},
            {color:C.green,label:'Ataque',dash:true},
            {color:C.red,label:'Defesa',dash:true},
            {color:C.gold,label:'Golos',dot:true},
        ];
        legends.forEach((l,i)=>{
            const lxi=lx+i*22;
            if(l.dot){
                setFill(l.color); doc.circle(lxi+1.5,ly-0.5,1,'F');
            } else {
                doc.setDrawColor(...l.color); doc.setLineWidth(0.5);
                if(l.dash) doc.setLineDashPattern([1,0.8],0);
                doc.line(lxi,ly-0.5,lxi+4,ly-0.5);
                doc.setLineDashPattern([],0);
            }
            setTxt(C.muted); doc.setFontSize(4); doc.setFont('helvetica','bold');
            txt(l.label.toUpperCase(),lxi+5.5,ly,{align:'left'});
        });
    };

    // ── Helper: timeline bar ─
    const drawTimeline = (x0, yLine, w, events, totalSecs) => {
        const displayTime = Math.max(totalSecs, 90*60);
        const h=5;
        // track
        setFill(C.surface2); rect(x0,yLine,w,h,1);
        // HT divider
        setStroke(C.border); doc.setLineWidth(0.2);
        doc.setLineDashPattern([1,1],0);
        doc.line(x0+w/2,yLine,x0+w/2,yLine+h);
        doc.setLineDashPattern([],0);
        // events
        events.forEach(e=>{
            const pct=e.time/displayTime;
            const ex=x0+pct*w;
            const color=e.isGoal?C.gold:e.type==='ataque'?C.accent:C.red;
            setFill(color);
            const r=e.isGoal?1.8:1.3;
            doc.circle(ex,yLine+h/2,r,'F');
        });
        // minute ticks
        [15,30,45,60,75].forEach(m=>{
            const mx=x0+(m*60/displayTime)*w;
            setStroke(C.muted); doc.setLineWidth(0.2);
            doc.line(mx,yLine+h-0.5,mx,yLine+h);
        });
        // period labels
        setTxt(C.muted); doc.setFontSize(4.5); doc.setFont('helvetica','normal');
        txt('1 Tempo',x0+w*0.25,yLine+h+3.5,{align:'center'});
        txt('2 Tempo',x0+w*0.75,yLine+h+3.5,{align:'center'});
        // legend dots
        const lx=x0, ly=yLine+h+8;
        [{color:C.gold,label:'Golo'},{color:C.accent,label:'Ataque'},{color:C.red,label:'Defesa'}].forEach((l,i)=>{
            const lxi=lx+i*25;
            setFill(l.color); doc.circle(lxi+1.5,ly-0.8,1,'F');
            setTxt(C.muted); doc.setFontSize(4.5); doc.setFont('helvetica','bold');
            txt(l.label.toUpperCase(),lxi+4,ly,{align:'left'});
        });
    };

    // ════════════════════════════════════════════════
    // PÁGINA 1 – HEADER + KPIs + DISTRIBUIÇÃO + RADAR + DONUTS
    // ════════════════════════════════════════════════

    const g = game;
    const golos   = g.stats.find(s=>s.name==='Golo')?.count||0;
    const sofr    = g.stats.find(s=>s.name==='Golo Sofr.')?.count||0;
    const remates = g.stats.find(s=>s.name==='Remate')?.count||0;
    const ef      = remates>0?((golos/remates)*100).toFixed(1):'0.0';
    const totalAtk= g.stats.filter(s=>s.type==='ataque').reduce((a,s)=>a+s.count,0);
    const totalDef= g.stats.filter(s=>s.type==='defesa').reduce((a,s)=>a+s.count,0);
    const remEnq  = g.stats.find(s=>s.name==='Rem. Enquad.')?.count||0;
    const recuper = g.stats.find(s=>s.name==='Recuper.')?.count||0;
    const remConc = g.stats.find(s=>s.name==='Rem. Conc.')?.count||0;

    // ── Fundo página ──────────────────────────────
    setFill(C.bg); rect(0,0,PW,PH);

    // ── Barra topo accent ─────────────────────────
    setFill(C.accent); rect(0,0,PW,1.5);

    // ── "RELATÓRIO DE JOGO" label ─────────────────
    y = MT + 2;
    setTxt(C.muted); doc.setFontSize(6); doc.setFont('helvetica','bold');
    txt('RELATORIO DE JOGO', ML, y);
    y += 6;

    // ── Nome adversário ───────────────────────────
    setTxt(C.accent); doc.setFontSize(24); doc.setFont('helvetica','bold');
    txt(g.opponent.toUpperCase(), ML, y);
    y += 5;

    // ── Data + tempo ──────────────────────────────
    setTxt(C.muted); doc.setFontSize(7); doc.setFont('helvetica','normal');
    txt(`${g.date}   |   ${fmt(g.time)}   |   SoccerAnalyst Pro`, ML, y);
    y += 3;

    // ── Linha separadora ──────────────────────────
    setStroke(C.border); line(ML, y, ML+CW, y, 0.3);
    y += 5;

    // ── KPI BOXES (4 em linha) ────────────────────
    const kpis = [
        {val:golos,    label:'GOLOS',   sub:'marcados', color:C.green},
        {val:sofr,     label:'SOFR.',   sub:'sofridos',  color:C.red},
        {val:remates,  label:'REMATES', sub:'total',     color:C.accent},
        {val:`${ef}%`, label:'EFICACIA',sub:'golo/rem',  color:C.gold},
    ];
    const kW=(CW-9)/4, kH=20;
    kpis.forEach((k,i)=>{
        const kx=ML+i*(kW+3);
        setFill(C.surface); rect(kx,y,kW,kH,2);
        setStroke(k.color); doc.setLineWidth(0.4); doc.setDrawColor(...k.color);
        doc.roundedRect(kx,y,kW,kH,2,2,'S');
        // valor grande
        setTxt(k.color); doc.setFontSize(18); doc.setFont('helvetica','bold');
        txt(String(k.val), kx+kW/2, y+11, {align:'center'});
        // label
        setTxt(C.muted); doc.setFontSize(5.5); doc.setFont('helvetica','bold');
        txt(k.label, kx+kW/2, y+16, {align:'center'});
        // sub
        doc.setFontSize(4.5); doc.setFont('helvetica','normal');
        txt(k.sub, kx+kW/2, y+19, {align:'center'});
    });
    y += kH + 6;

    // ── DISTRIBUIÇÃO ATAQUE/DEFESA ────────────────
    const secLabel = (label) => {
        setTxt(C.muted); doc.setFontSize(6); doc.setFont('helvetica','bold');
        txt(label, ML, y);
        setStroke(C.border); line(ML+doc.getTextWidth(label)+2, y-0.5, ML+CW, y-0.5, 0.2);
        y += 4;
    };
    secLabel('DISTRIBUICAO ATAQUE / DEFESA');

    const total=totalAtk+totalDef;
    const pAtk=total>0?(totalAtk/total):0.5;
    const stackH=5, stackY=y;
    // ataque (left)
    setFill(C.accent); rect(ML, stackY, CW*pAtk, stackH, 1);
    // defesa (right)
    setFill(C.red); rect(ML+CW*pAtk, stackY, CW*(1-pAtk), stackH, 1);
    // values inside
    setTxt(C.white); doc.setFontSize(5); doc.setFont('helvetica','bold');
    if(pAtk>0.05) txt(String(totalAtk), ML+CW*pAtk-4, stackY+3.5, {align:'right'});
    if((1-pAtk)>0.05) txt(String(totalDef), ML+CW*pAtk+4, stackY+3.5, {align:'left'});
    y += stackH+3;
    // labels
    setTxt(C.accent); doc.setFontSize(5); doc.setFont('helvetica','bold');
    txt(`ATAQUE (${totalAtk})`, ML, y);
    setTxt(C.red);
    txt(`DEFESA (${totalDef})`, ML+CW, y, {align:'right'});
    y += 6;

    // ── RADAR + DONUTS (lado a lado) ──────────────
    secLabel('RADAR DE PERFORMANCE   /   INDICADORES');

    const radarH=48;
    const colL=ML, colR=ML+CW/2+2, colHalfW=CW/2-2;

    // Radar (esquerda)
    {
        const rcx=colL+colHalfW/2, rcy=y+radarH/2, rR=colHalfW*0.28;
        setFill(C.surface); rect(colL, y, colHalfW, radarH, 2);
        drawRadar(rcx, rcy, rR, g.stats);
    }

    // Donuts 2×2 (direita)
    {
        setFill(C.surface); rect(colR, y, colHalfW, radarH, 2);
        const dW=colHalfW/2, dH=radarH/2;
        const donuts=[
            {val:golos,  max:Math.max(remates,1), color:C.green, label:'Conversao',     sub:'Golos'},
            {val:remEnq, max:Math.max(remates,1), color:C.accent,label:'Enquadramento', sub:'Remates'},
            {val:recuper,max:Math.max(totalDef,1),color:C.gold,  label:'Recuperacao',   sub:'de Bola'},
            {val:sofr,   max:Math.max(remConc,1), color:C.red,   label:'Sofr./Conc.',   sub:'Golos'},
        ];
        donuts.forEach((d,i)=>{
            const col=i%2, row=Math.floor(i/2);
            const dcx=colR+col*dW+dW/2;
            const dcy=y+row*dH+dH/2+1;
            const ratio=d.max>0?Math.min(d.val/d.max,1):0;
            drawDonut(dcx, dcy, 6, ratio, d.color, String(d.val), d.label);
        });
    }
    y += radarH+7;

    // ── INTENSIDADE POR MINUTO ────────────────────
    checkPage(38);
    secLabel('INTENSIDADE POR MINUTO');
    const intH=20;
    setFill(C.surface); rect(ML, y, CW, intH+14, 2);
    drawIntensityLine(ML+4, y+intH, CW-8, intH-2, g.events, g.time);
    y += intH+18;

    // ════════════════════════════════════════════════
    // SECÇÃO: BARRAS ATAQUE + DEFESA
    // ════════════════════════════════════════════════
    checkPage(50);
    secLabel('ESTATISTICAS DETALHADAS');

    const atkStats=g.stats.filter(s=>s.type==='ataque');
    const defStats=g.stats.filter(s=>s.type==='defesa');
    const maxRows=Math.max(atkStats.length,defStats.length);
    const bH=5.5, bGap=1.5;
    const bColW=(CW-6)/2;
    const bSectionH=maxRows*(bH+bGap)+10;

    // col headers
    setFill(C.surface); rect(ML,y,bColW,bSectionH,2); rect(ML+bColW+6,y,bColW,bSectionH,2);
    setTxt(C.accent); doc.setFontSize(6); doc.setFont('helvetica','bold');
    txt('ATAQUE', ML+bColW/2, y+4, {align:'center'});
    setTxt(C.red);
    txt('DEFESA', ML+bColW+6+bColW/2, y+4, {align:'center'});
    y += 7;

    const atkC=['#4361ee','#3a0ca3','#4cc9f0','#560bad','#7209b7','#4895ef'];
    const defC=['#ef233c','#d90429','#e63946','#c1121f','#ff595e','#ff6b6b'];

    const hexToRgb = hex => {
        const r=parseInt(hex.slice(1,3),16);
        const g=parseInt(hex.slice(3,5),16);
        const b=parseInt(hex.slice(5,7),16);
        return [r,g,b];
    };

    const drawBarList = (stats, cx, colors) => {
        const maxV=Math.max(...stats.map(s=>s.count),1);
        const labelW=22, barAreaW=bColW-labelW-10, vW=8;
        stats.forEach((s,i)=>{
            const by=y+i*(bH+bGap);
            const ratio=s.count/maxV;
            const rgb=hexToRgb(colors[i%colors.length]);
            // label
            setTxt(C.muted); doc.setFontSize(4.5); doc.setFont('helvetica','normal');
            txt(s.name.toUpperCase().substring(0,12), cx+labelW-1, by+bH-1.2, {align:'right'});
            // bar bg
            setFill(C.bg); rect(cx+labelW, by, barAreaW, bH, 0.8);
            // bar fill
            if(ratio>0){ doc.setFillColor(...rgb); rect(cx+labelW, by, Math.max(barAreaW*ratio,1), bH, 0.8); }
            // value
            setTxt(C.text); doc.setFontSize(4.5); doc.setFont('helvetica','bold');
            txt(String(s.count), cx+labelW+barAreaW+2, by+bH-1.2);
        });
    };

    drawBarList(atkStats, ML+2, atkC);
    drawBarList(defStats, ML+bColW+8, defC);
    y += maxRows*(bH+bGap)+6;

    // ════════════════════════════════════════════════
    // SECÇÃO: TIMELINE DE EVENTOS
    // ════════════════════════════════════════════════
    checkPage(30);
    secLabel('CRONOLOGIA DE EVENTOS');
    setFill(C.surface); rect(ML, y, CW, 22, 2);
    drawTimeline(ML+4, y+5, CW-8, g.events, g.time);
    y += 28;

    // goal stamps
    const goals=g.events.filter(e=>e.isGoal);
    if(goals.length){
        goals.forEach((e,i)=>{
            const gx=ML+i*18;
            setFill([249,199,79,0.1]);
            doc.setFillColor(249,199,79,0.1);
            setStroke(C.gold); doc.setLineWidth(0.3); doc.roundedRect(gx,y,15,5,1,1,'S');
            setTxt(C.gold); doc.setFontSize(5.5); doc.setFont('helvetica','bold');
            txt(`GOLO ${fmtMin(e.time)}`, gx+7.5, y+3.5, {align:'center'});
        });
        y += 8;
    }

    // ════════════════════════════════════════════════
    // SECÇÃO: LISTA DE EVENTOS
    // ════════════════════════════════════════════════
    if(g.events.length){
        checkPage(20);
        secLabel(`LISTA DE EVENTOS (${g.events.length})`);
        const evCols=4, evW=(CW-evCols*2)/evCols, evH=6;
        g.events.forEach((e,i)=>{
            checkPage(evH+2);
            const col=i%evCols, row=Math.floor(i/evCols);
            if(col===0&&row>0&&i<g.events.length) {}
            const ex=ML+col*(evW+2);
            const ey=y+Math.floor(i/evCols)*(evH+1.5);
            const evColor=e.isGoal?C.gold:e.type==='ataque'?C.accent:C.red;
            setFill(C.surface); rect(ex,ey,evW,evH,1);
            // dot
            setFill(evColor); doc.circle(ex+2.5,ey+evH/2,0.9,'F');
            // time
            setTxt(C.muted); doc.setFontSize(4.5); doc.setFont('helvetica','normal');
            txt(fmtMin(e.time), ex+5, ey+2.8);
            // name
            setTxt(C.text); doc.setFontSize(5); doc.setFont('helvetica','bold');
            txt(e.name.toUpperCase().substring(0,14), ex+5, ey+5.2);
        });
        const evRows=Math.ceil(g.events.length/evCols);
        y += evRows*(evH+1.5)+6;
    }

    // ════════════════════════════════════════════════
    // SECÇÃO: NOTAS
    // ════════════════════════════════════════════════
    const hasNotes=g.notes||(g.notesHistory||[]).length>0;
    if(hasNotes){
        checkPage(25);
        secLabel('NOTAS');
        if(g.notes){
            setFill(C.surface); rect(ML,y,CW,10,2);
            setTxt(C.text); doc.setFontSize(6.5); doc.setFont('helvetica','italic');
            const lines=doc.splitTextToSize(`"${g.notes}"`, CW-8);
            lines.slice(0,3).forEach((l,i)=>txt(l,ML+4,y+4+i*4));
            y += 14;
        }
        (g.notesHistory||[]).forEach(n=>{
            checkPage(16);
            setFill(C.surface2); rect(ML,y,CW,12,2);
            setFill(C.accent); rect(ML,y,1.5,12,0.5);
            setTxt(C.muted); doc.setFontSize(5); doc.setFont('helvetica','bold');
            txt(n.label.toUpperCase(), ML+4, y+4);
            setTxt(C.text); doc.setFontSize(6); doc.setFont('helvetica','italic');
            const nLines=doc.splitTextToSize(`"${n.text}"`, CW-8);
            nLines.slice(0,2).forEach((l,i)=>txt(l,ML+4,y+8+i*3.5));
            y += 16;
        });
    }

    // ════════════════════════════════════════════════
    // RODAPÉ em todas as páginas
    // ════════════════════════════════════════════════
    const totalPages=doc.getNumberOfPages();
    for(let p=1;p<=totalPages;p++){
        doc.setPage(p);
        setFill(C.surface); rect(0,PH-8,PW,8);
        setStroke(C.border); line(0,PH-8,PW,PH-8,0.3);
        setTxt(C.muted); doc.setFontSize(5); doc.setFont('helvetica','normal');
        txt('SoccerAnalyst Pro', ML, PH-3);
        txt(new Date().toLocaleDateString('pt-PT'), PW/2, PH-3, {align:'center'});
        txt(`${p} / ${totalPages}`, PW-MR, PH-3, {align:'right'});
    }

    return doc;
}

/* ═══════════════════════════════════════════════════════════════
   APP
═══════════════════════════════════════════════════════════════ */
function App() {
    const [view,            setView]            = useState('folders');
    const [folders,         setFolders]         = useState(loadDB);
    const [currentFolderId, setCurrentFolderId] = useState(null);
    const [currentGameId,   setCurrentGameId]   = useState(null);
    const [isActive,        setIsActive]        = useState(false);
    const [showNotes,       setShowNotes]       = useState(false);
    const [toast,           setToast]           = useState(null);
    const [searchTerm,      setSearchTerm]      = useState('');
    const [sortBy,          setSortBy]          = useState('date');
    const [eventFilter,     setEventFilter]     = useState('all');
    const [dateFrom,        setDateFrom]        = useState('');
    const [dateTo,          setDateTo]          = useState('');
    const [minGoalsFor,     setMinGoalsFor]     = useState('');
    const [minGoalsAgainst, setMinGoalsAgainst] = useState('');
    const importRef  = useRef(null);
    const isLandscape = useOrientation();

    const currentGame = (currentGameId && currentFolderId)
        ? (folders.find(f=>f.id===currentFolderId)?.games||[]).find(g=>g.id===currentGameId)||null
        : null;

    useEffect(() => { saveDB(folders); }, [folders]);

    useEffect(() => {
        if (!isActive||!currentGameId) return;
        const iv = setInterval(()=>{
            setFolders(prev=>prev.map(f=>{
                if(f.id!==currentFolderId) return f;
                return{...f,games:f.games.map(g=>g.id!==currentGameId?g:{...g,time:g.time+1})};
            }));
        },1000);
        return ()=>clearInterval(iv);
    },[isActive,currentGameId,currentFolderId]);

    useEffect(()=>{
        const h=e=>{
            if(view==='tracking'&&e.code==='Space'&&!e.target.matches('textarea,input')){
                e.preventDefault(); setIsActive(p=>!p);
            }
        };
        window.addEventListener('keydown',h);
        return ()=>window.removeEventListener('keydown',h);
    },[view]);

    const showToast = useCallback((msg,goal=false)=>setToast({msg,goal}),[]);

    const updateGame = useCallback(updater=>{
        setFolders(prev=>prev.map(f=>{
            if(f.id!==currentFolderId) return f;
            return{...f,games:f.games.map(g=>g.id!==currentGameId?g:(typeof updater==='function'?updater(g):{...g,...updater}))};
        }));
    },[currentFolderId,currentGameId]);

    const getFolderTemplate = useCallback(folderId=>{
        const folder=folders.find(f=>f.id===folderId);
        return folder?.statTemplate||DEFAULT_TEMPLATE.map(s=>({...s}));
    },[folders]);

    const syncStatToFolder = useCallback((folderId,newStat)=>{
        setFolders(prev=>prev.map(f=>{
            if(f.id!==folderId) return f;
            const template=f.statTemplate||DEFAULT_TEMPLATE.map(s=>({...s}));
            const tplIdx=template.findIndex(t=>t.id===newStat.id);
            const newTemplate=tplIdx>=0
                ?template.map(t=>t.id===newStat.id?{...t,name:newStat.name,type:newStat.type}:t)
                :[...template,{id:newStat.id,name:newStat.name,type:newStat.type}];
            const updatedGames=f.games.map(g=>{
                if(g.stats.find(s=>s.id===newStat.id)) return g;
                return{...g,stats:[...g.stats,{id:newStat.id,name:newStat.name,type:newStat.type,count:0}]};
            });
            return{...f,statTemplate:newTemplate,games:updatedGames};
        }));
    },[]);

    const renameStatAcrossFolder = useCallback((folderId,statId,newName)=>{
        setFolders(prev=>prev.map(f=>{
            if(f.id!==folderId) return f;
            const template=(f.statTemplate||DEFAULT_TEMPLATE.map(s=>({...s}))).map(t=>t.id===statId?{...t,name:newName}:t);
            const games=f.games.map(g=>({...g,stats:g.stats.map(s=>s.id===statId?{...s,name:newName}:s)}));
            return{...f,statTemplate:template,games};
        }));
    },[]);

    const addStat = id=>{
        if(!isActive){showToast('Inicia o Cronometro!');return;}
        let statName='',isGoal=false;
        updateGame(g=>{
            const stat=g.stats.find(s=>s.id===id);
            if(!stat) return g;
            statName=stat.name;
            isGoal=stat.name.toLowerCase().includes('golo')&&stat.type==='ataque';
            return{
                ...g,
                stats:g.stats.map(s=>s.id===id?{...s,count:s.count+1}:s),
                events:[...g.events,{time:g.time,type:stat.type,name:stat.name,isGoal,statId:id}],
            };
        });
        if(navigator.vibrate) navigator.vibrate(isGoal?[50,50,50]:25);
        if(statName) showToast(isGoal?'GOLOOO!':`${statName}`,isGoal);
    };

    const removeStat = id=>{
        let removed=false;
        updateGame(g=>{
            const stat=g.stats.find(s=>s.id===id);
            if(!stat||stat.count<=0) return g;
            removed=true;
            const events=[...g.events];
            const li=[...events].reverse().findIndex(e=>e.statId===id);
            if(li!==-1) events.splice(events.length-1-li,1);
            return{...g,stats:g.stats.map(s=>s.id===id?{...s,count:s.count-1}:s),events};
        });
        if(removed) showToast('Removido');
    };

    const undoLast=()=>{
        if(!currentGame?.events.length) return;
        removeStat(currentGame.events[currentGame.events.length-1].statId);
    };

    const compressImage=file=>new Promise(res=>{
        const r=new FileReader();
        r.onload=()=>{
            const img=new Image();
            img.onload=()=>{
                const scale=Math.min(1,512/Math.max(img.width,img.height));
                const c=document.createElement('canvas');
                c.width=Math.round(img.width*scale); c.height=Math.round(img.height*scale);
                c.getContext('2d').drawImage(img,0,0,c.width,c.height);
                res(c.toDataURL('image/jpeg',0.8));
            };
            img.src=r.result;
        };
        r.readAsDataURL(file);
    });

    const getPeriodInfo=t=>{
        const m=Math.floor(t/60);
        if(m<45) return{label:'1 TEMPO',color:'#2dc653'};
        if(m<90) return{label:'2 TEMPO',color:'#4361ee'};
        return{label:'PRORROG.',color:'#f9c74f'};
    };

    const getFolderSummary=folder=>{
        if(!folder.games.length) return null;
        const golos=folder.games.reduce((s,g)=>s+(g.stats.find(x=>x.name==='Golo')?.count||0),0);
        const sofr =folder.games.reduce((s,g)=>s+(g.stats.find(x=>x.name==='Golo Sofr.')?.count||0),0);
        const rem  =folder.games.reduce((s,g)=>s+(g.stats.find(x=>x.name==='Remate')?.count||0),0);
        const ef   =rem>0?((golos/rem)*100).toFixed(1):0;
        return{games:folder.games.length,golos,sofr,ef};
    };

    const handleExport=()=>{
        const blob=new Blob([JSON.stringify({version:4,exportedAt:new Date().toISOString(),folders})],{type:'application/json'});
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');
        a.href=url; a.download=`socceranalyst_backup_${new Date().toISOString().slice(0,10)}.json`;
        document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);
        showToast('Backup Exportado');
    };

    const handleImport=file=>{
        if(!file) return;
        const r=new FileReader();
        r.onload=()=>{
            try{
                const p=JSON.parse(r.result);
                const imported=Array.isArray(p)?p:p?.folders;
                if(!Array.isArray(imported)){showToast('Ficheiro invalido');return;}
                setFolders(imported); showToast('Dados Importados');
            } catch(_){showToast('Erro ao importar');}
        };
        r.readAsText(file);
    };

    // ── NOVA EXPORTAÇÃO PDF NATIVA ─────────────────
    const exportPDF = () => {
        if(!currentGame){ showToast('Nenhum jogo carregado'); return; }
        showToast('A gerar PDF...');
        try {
            const doc = buildNativePDF(currentGame);
            const filename = `SoccerAnalyst_${currentGame.opponent.replace(/[^a-zA-Z0-9]/g,'_')}_${(currentGame.date||'').replace(/\//g,'-')}.pdf`;
            doc.save(filename);
            showToast('PDF Guardado');
        } catch(e) {
            console.error('PDF error:', e);
            showToast('Erro ao gerar PDF');
        }
    };

    /* ════════════════════════════════════════════════════
       VIEW: FOLDERS
    ════════════════════════════════════════════════════ */
    if(view==='folders') return (
        <div style={{padding:24,height:'100vh',overflowY:'auto',background:'var(--bg)'}} className="slide-enter no-scrollbar">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:32}}>
                <h1 style={{fontFamily:'Bebas Neue',fontSize:32,color:'var(--accent)',letterSpacing:3,lineHeight:1}}>
                    SoccerAnalyst<br/><span style={{color:'var(--text)',fontSize:18,letterSpacing:6}}>PRO</span>
                </h1>
                <div style={{display:'flex',gap:8}}>
                    <button onClick={handleExport} style={{padding:'8px 14px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,fontSize:10,fontWeight:700,textTransform:'uppercase',color:'var(--muted)',cursor:'pointer',letterSpacing:1}}>Exportar</button>
                    <button onClick={()=>importRef.current?.click()} style={{padding:'8px 14px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,fontSize:10,fontWeight:700,textTransform:'uppercase',color:'var(--muted)',cursor:'pointer',letterSpacing:1}}>Importar</button>
                    <input ref={importRef} type="file" accept=".json" style={{display:'none'}} onChange={e=>handleImport(e.target.files[0])}/>
                </div>
            </div>
            <button onClick={()=>{const n=promptText('Nome da Pasta:');if(n){setFolders(prev=>[{id:Date.now(),name:n,games:[],statTemplate:DEFAULT_TEMPLATE.map(s=>({...s}))},...prev]);showToast('Pasta Criada');}}}
                style={{width:'100%',padding:18,marginBottom:24,border:'2px dashed var(--border)',borderRadius:16,background:'transparent',color:'var(--muted)',fontWeight:700,fontSize:13,textTransform:'uppercase',letterSpacing:2,cursor:'pointer'}}
                onMouseOver={e=>e.currentTarget.style.borderColor='var(--accent)'}
                onMouseOut={e=>e.currentTarget.style.borderColor='var(--border)'}
            >+ Nova Pasta</button>
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
                {folders.map(f=>{
                    const s=getFolderSummary(f);
                    return(
                        <div key={f.id} onClick={()=>{setCurrentFolderId(f.id);setView('games');}} className="card active-btn"
                            style={{cursor:'pointer',transition:'all 0.2s'}}
                            onMouseOver={e=>e.currentTarget.style.borderColor='var(--accent)'}
                            onMouseOut={e=>e.currentTarget.style.borderColor='var(--border)'}>
                            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:s?16:0}}>
                                <div>
                                    <div style={{fontFamily:'Bebas Neue',fontSize:22,letterSpacing:2}}>{f.name}</div>
                                    <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',color:'var(--accent)',letterSpacing:2,marginTop:2}}>{f.games.length} Jogos</div>
                                </div>
                                <button onClick={e=>{e.stopPropagation();if(confirm('Apagar pasta e todos os jogos?')){setFolders(prev=>prev.filter(x=>x.id!==f.id));showToast('Eliminada');}}}
                                    style={{padding:'6px 12px',background:'transparent',border:'1px solid var(--border)',borderRadius:8,fontSize:10,color:'var(--muted)',cursor:'pointer',fontWeight:700}}>x</button>
                            </div>
                            {s&&(
                                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
                                    {[{val:s.golos,label:'Golos',color:'var(--green)'},{val:s.sofr,label:'Sofridos',color:'var(--red)'},{val:`${s.ef}%`,label:'Eficacia',color:'var(--accent)'}].map(x=>(
                                        <div key={x.label} style={{textAlign:'center',padding:10,background:'var(--bg)',borderRadius:10,border:'1px solid var(--border)'}}>
                                            <div style={{fontFamily:'Bebas Neue',fontSize:26,color:x.color,lineHeight:1}}>{x.val}</div>
                                            <div style={{fontSize:8,fontWeight:700,textTransform:'uppercase',color:'var(--muted)',marginTop:2,letterSpacing:1}}>{x.label}</div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    );
                })}
            </div>
            {toast&&<Toast message={toast.msg} isGoal={toast.goal} onClose={()=>setToast(null)}/>}
        </div>
    );

    /* ════════════════════════════════════════════════════
       VIEW: GAMES
    ════════════════════════════════════════════════════ */
    if(view==='games'){
        const folder=folders.find(f=>f.id===currentFolderId);
        if(!folder){setView('folders');return null;}
        const fromD=dateFrom?new Date(dateFrom):null;
        const toD=dateTo?(()=>{const d=new Date(dateTo);d.setHours(23,59,59,999);return d;})():null;
        const filtered=folder.games.filter(g=>{
            if(!g.opponent.toLowerCase().includes(searchTerm.toLowerCase())) return false;
            const gd=parsePtDate(g.date);
            if(fromD&&(!gd||gd<fromD)) return false;
            if(toD&&(!gd||gd>toD)) return false;
            const gf=g.stats.find(s=>s.name==='Golo')?.count||0;
            const ga=g.stats.find(s=>s.name==='Golo Sofr.')?.count||0;
            if(minGoalsFor&&gf<Number(minGoalsFor)) return false;
            if(minGoalsAgainst&&ga<Number(minGoalsAgainst)) return false;
            return true;
        }).sort((a,b)=>sortBy==='date'?(parsePtDate(b.date)-parsePtDate(a.date)):a.opponent.localeCompare(b.opponent));
        const sumGF=filtered.reduce((s,g)=>s+(g.stats.find(x=>x.name==='Golo')?.count||0),0);
        const sumGA=filtered.reduce((s,g)=>s+(g.stats.find(x=>x.name==='Golo Sofr.')?.count||0),0);
        const addGame=()=>{
            const o=promptText('Adversario:');
            if(!o) return;
            const template=getFolderTemplate(currentFolderId);
            const newGame={id:Date.now(),opponent:o,time:0,stats:statsFromTemplate(template),events:[],notes:'',notesHistory:[],pic:null,date:new Date().toLocaleDateString('pt-PT')};
            setFolders(prev=>prev.map(f=>f.id!==currentFolderId?f:{...f,games:[newGame,...f.games]}));
            showToast('Jogo Adicionado');
        };
        return(
            <div style={{padding:24,height:'100vh',overflowY:'auto',background:'var(--bg)'}} className="slide-enter no-scrollbar">
                <button onClick={()=>setView('folders')} style={{fontSize:10,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:3,background:'none',border:'none',cursor:'pointer',marginBottom:20}}>← Voltar</button>
                <h2 style={{fontFamily:'Bebas Neue',fontSize:28,letterSpacing:3,color:'var(--accent)',marginBottom:24,borderLeft:'4px solid var(--accent)',paddingLeft:12}}>{folder.name}</h2>
                <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:24}}>
                    <input type="text" placeholder="Pesquisar..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} style={{padding:'12px 16px',borderRadius:12,fontSize:13,width:'100%'}}/>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                        <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} style={{padding:'10px 12px',borderRadius:10,fontSize:12}}/>
                        <input type="date" value={dateTo}   onChange={e=>setDateTo(e.target.value)}   style={{padding:'10px 12px',borderRadius:10,fontSize:12}}/>
                        <input type="number" min="0" placeholder="Min. Golos" value={minGoalsFor}     onChange={e=>setMinGoalsFor(e.target.value)}     style={{padding:'10px 12px',borderRadius:10,fontSize:12}}/>
                        <input type="number" min="0" placeholder="Min. Sofr." value={minGoalsAgainst} onChange={e=>setMinGoalsAgainst(e.target.value)} style={{padding:'10px 12px',borderRadius:10,fontSize:12}}/>
                    </div>
                    <div style={{display:'flex',gap:8}}>
                        {['date','name'].map(s=>(
                            <button key={s} onClick={()=>setSortBy(s)} style={{flex:1,padding:8,borderRadius:10,border:'1px solid var(--border)',background:sortBy===s?'var(--accent)':'var(--surface)',color:'white',fontSize:10,fontWeight:700,textTransform:'uppercase',cursor:'pointer',letterSpacing:1}}>
                                {s==='date'?'Data':'Nome'}
                            </button>
                        ))}
                    </div>
                </div>
                <button onClick={addGame} style={{width:'100%',padding:16,marginBottom:20,borderRadius:14,border:'none',background:'linear-gradient(135deg, var(--accent), var(--accent2))',color:'white',fontFamily:'Bebas Neue',fontSize:18,letterSpacing:3,cursor:'pointer',boxShadow:'0 8px 24px rgba(67,97,238,0.3)'}}>
                    + Adicionar Jogo
                </button>
                {filtered.length>0&&(
                    <div className="card" style={{marginBottom:24}}>
                        <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',color:'var(--muted)',letterSpacing:2,marginBottom:12}}>Resumo</div>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,textAlign:'center'}}>
                            {[{val:filtered.length,label:'Jogos',color:'var(--accent)'},{val:(sumGF/filtered.length).toFixed(2),label:'Media Golos',color:'var(--green)'},{val:(sumGA/filtered.length).toFixed(2),label:'Media Sofr.',color:'var(--red)'}].map(x=>(
                                <div key={x.label}>
                                    <div style={{fontFamily:'Bebas Neue',fontSize:24,color:x.color}}>{x.val}</div>
                                    <div style={{fontSize:8,fontWeight:700,textTransform:'uppercase',color:'var(--muted)',letterSpacing:1}}>{x.label}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                )}
                <div style={{display:'flex',flexDirection:'column',gap:10}}>
                    {filtered.map(g=>{
                        const gf=g.stats.find(s=>s.name==='Golo')?.count||0;
                        const ga=g.stats.find(s=>s.name==='Golo Sofr.')?.count||0;
                        const rc={W:'var(--green)',L:'var(--red)',D:'var(--gold)'}[gf>ga?'W':gf<ga?'L':'D'];
                        return(
                            <div key={g.id} onClick={()=>{setCurrentGameId(g.id);setView('tracking');}} className="card active-btn"
                                style={{cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center',transition:'all 0.2s'}}
                                onMouseOver={e=>e.currentTarget.style.borderColor='var(--accent)'}
                                onMouseOut={e=>e.currentTarget.style.borderColor='var(--border)'}>
                                <div style={{flex:1}}>
                                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                                        <div style={{width:6,height:6,borderRadius:'50%',background:rc,flexShrink:0}}/>
                                        <span style={{fontFamily:'Bebas Neue',fontSize:18,letterSpacing:1}}>{g.opponent}</span>
                                        <span style={{fontFamily:'Space Mono',fontSize:13,fontWeight:700,color:'var(--green)'}}>{gf}</span>
                                        <span style={{color:'var(--muted)',fontSize:11}}>–</span>
                                        <span style={{fontFamily:'Space Mono',fontSize:13,fontWeight:700,color:'var(--red)'}}>{ga}</span>
                                    </div>
                                    <div style={{fontSize:10,color:'var(--muted)',fontWeight:600}}>{g.date} · {fmt(g.time)}</div>
                                </div>
                                <div style={{display:'flex',gap:6}}>
                                    <button onClick={e=>{e.stopPropagation();const template=getFolderTemplate(currentFolderId);const ng={...g,id:Date.now(),opponent:`${g.opponent} (Copia)`,time:0,stats:statsFromTemplate(template),events:[],notes:'',notesHistory:[],date:new Date().toLocaleDateString('pt-PT')};setFolders(prev=>prev.map(f=>f.id!==currentFolderId?f:{...f,games:[ng,...f.games]}));showToast('Duplicado');}}
                                        style={{width:36,height:36,borderRadius:10,background:'rgba(67,97,238,0.1)',border:'1px solid rgba(67,97,238,0.2)',color:'var(--accent)',cursor:'pointer',fontSize:14}}>C</button>
                                    <button onClick={e=>{e.stopPropagation();if(confirm('Eliminar jogo?')){setFolders(prev=>prev.map(f=>f.id!==currentFolderId?f:{...f,games:f.games.filter(x=>x.id!==g.id)}));showToast('Eliminado');}}}
                                        style={{width:36,height:36,borderRadius:10,background:'rgba(239,35,60,0.1)',border:'1px solid rgba(239,35,60,0.2)',color:'var(--red)',cursor:'pointer',fontSize:14}}>X</button>
                                </div>
                            </div>
                        );
                    })}
                </div>
                {toast&&<Toast message={toast.msg} isGoal={toast.goal} onClose={()=>setToast(null)}/>}
            </div>
        );
    }

    /* ════════════════════════════════════════════════════
       VIEW: REPORT  (ecrã web – inalterado)
    ════════════════════════════════════════════════════ */
    if(view==='report'&&currentGame){
        const g=currentGame;
        const golos  =g.stats.find(s=>s.name==='Golo')?.count||0;
        const sofr   =g.stats.find(s=>s.name==='Golo Sofr.')?.count||0;
        const remates=g.stats.find(s=>s.name==='Remate')?.count||0;
        const ef     =remates>0?((golos/remates)*100).toFixed(1):0;
        const totalAtk=g.stats.filter(s=>s.type==='ataque').reduce((a,s)=>a+s.count,0);
        const totalDef=g.stats.filter(s=>s.type==='defesa').reduce((a,s)=>a+s.count,0);
        const filteredEvents=eventFilter==='all'?g.events:eventFilter==='golos'?g.events.filter(e=>e.isGoal):g.events.filter(e=>e.type===eventFilter);
        const atkColors=['#4361ee','#3a0ca3','#4cc9f0','#560bad','#7209b7','#4895ef'];
        const defColors=['#ef233c','#d90429','#e63946','#c1121f','#ff595e','#ff6b6b'];
        return(
            <div style={{height:'100vh',display:'flex',flexDirection:'column',background:'var(--bg)'}}>
                <div style={{padding:'12px 20px',background:'var(--surface)',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center',gap:12,flexShrink:0}}>
                    <button onClick={()=>setView('tracking')} style={{fontSize:10,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:3,background:'none',border:'none',cursor:'pointer'}}>← Painel</button>
                    <div style={{display:'flex',gap:8}}>
                        <select value={eventFilter} onChange={e=>setEventFilter(e.target.value)} style={{padding:'8px 12px',borderRadius:10,fontSize:11,fontWeight:700,cursor:'pointer'}}>
                            <option value="all">Todos</option>
                            <option value="golos">Golos</option>
                            <option value="ataque">Ataque</option>
                            <option value="defesa">Defesa</option>
                        </select>
                        <button onClick={exportPDF} style={{padding:'8px 18px',borderRadius:10,background:'white',color:'black',fontFamily:'Bebas Neue',fontSize:14,letterSpacing:2,cursor:'pointer',border:'none'}}>PDF</button>
                    </div>
                </div>
                <div id="report-area" style={{flex:1,overflowY:'auto',padding:'32px 24px',background:'var(--bg)'}} className="no-scrollbar">
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:32}}>
                        <div>
                            <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',color:'var(--muted)',letterSpacing:3,marginBottom:8}}>Relatorio de Jogo</div>
                            <h2 style={{fontFamily:'Bebas Neue',fontSize:42,letterSpacing:3,color:'var(--accent)',lineHeight:1,marginBottom:8}}>{g.opponent}</h2>
                            <div style={{fontFamily:'Space Mono',fontSize:10,color:'var(--muted)'}}>{g.date} · {fmt(g.time)}</div>
                        </div>
                        {g.pic&&<img src={g.pic} style={{width:80,height:80,borderRadius:12,objectFit:'cover',border:'1px solid var(--border)'}}/>}
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:32}}>
