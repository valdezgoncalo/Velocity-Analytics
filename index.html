<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SoccerAnalyst Pro - Full Persistence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background-color: #020617; touch-action: manipulation; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        button { touch-action: manipulation; }
    </style>
</head>
<body class="text-white font-sans select-none overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [view, setView] = useState('home'); 
            const [opponent, setOpponent] = useState("");
            const [theme, setTheme] = useState('indigo');
            const [profilePic, setProfilePic] = useState(null);
            const [time, setTime] = useState(0);
            const [isActive, setIsActive] = useState(false);
            const [history, setHistory] = useState([]);

            const initialStats = [
                { id: 1, name: 'Golo', count: 0, type: 'ataque' },
                { id: 2, name: 'Remate', count: 0, type: 'ataque' },
                { id: 3, name: 'Rem. Enquad.', count: 0, type: 'ataque' },
                { id: 4, name: 'Cantos', count: 0, type: 'ataque' },
                { id: 5, name: 'Rem. Área', count: 0, type: 'ataque' },
                { id: 6, name: 'Cruzam.', count: 0, type: 'ataque' },
                { id: 7, name: 'Golo Sofr.', count: 0, type: 'defesa' },
                { id: 8, name: 'Recuper.', count: 0, type: 'defesa' },
                { id: 9, name: 'Rem. Conc.', count: 0, type: 'defesa' },
                { id: 10, name: 'Rem. Área C.', count: 0, type: 'defesa' },
                { id: 11, name: 'Perdas Bola', count: 0, type: 'defesa' },
                { id: 12, name: 'Faltas', count: 0, type: 'defesa' }
            ];

            const [stats, setStats] = useState(initialStats);

            // Carregamento Inicial
            useEffect(() => {
                const saved = localStorage.getItem('soccer_pro_data');
                if (saved) {
                    const d = JSON.parse(saved);
                    setStats(d.stats || initialStats);
                    setOpponent(d.opponent || "");
                    setTheme(d.theme || 'indigo');
                    setProfilePic(d.profilePic || null);
                    setTime(d.time || 0);
                }
            }, []);

            // Auto-Save
            useEffect(() => {
                const data = { stats, opponent, theme, profilePic, time };
                localStorage.setItem('soccer_pro_data', JSON.stringify(data));
            }, [stats, opponent, theme, profilePic, time]);

            // Timer
            useEffect(() => {
                let interval = null;
                if (isActive) interval = setInterval(() => setTime(t => t + 1), 1000);
                else clearInterval(interval);
                return () => clearInterval(interval);
            }, [isActive]);

            const saveHistory = () => {
                setHistory(prev => [...prev, JSON.parse(JSON.stringify(stats))].slice(-10));
            };

            const undo = () => {
                if (history.length > 0) {
                    const last = history[history.length - 1];
                    setStats(last);
                    setHistory(prev => prev.slice(0, -1));
                }
            };

            const resetAll = () => {
                if(confirm("Apagar todos os dados atuais?")) {
                    setStats(initialStats);
                    setTime(0);
                    setHistory([]);
                    setIsActive(false);
                }
            };

            const handlePhoto = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setProfilePic(reader.result);
                    reader.readAsDataURL(file);
                }
            };

            const addStat = (id) => {
                saveHistory();
                setStats(stats.map(s => s.id === id ? { ...s, count: s.count + 1 } : s));
            };

            const removeStat = (id) => {
                saveHistory();
                setStats(stats.map(s => s.id === id ? { ...s, count: Math.max(0, s.count - 1) } : s));
            };

            const editStatName = (id) => {
                const stat = stats.find(s => s.id === id);
                const newName = prompt("Editar nome:", stat.name);
                if (newName) setStats(stats.map(s => s.id === id ? { ...s, name: newName } : s));
            };

            const addNewStat = (type) => {
                const name = prompt("Nome da nova ação:");
                if (name) setStats([...stats, { id: Date.now(), name, count: 0, type }]);
            };

            const exportPDF = async () => {
                const element = document.getElementById('report-area');
                const canvas = await html2canvas(element, { backgroundColor: '#020617', scale: 2 });
                const pdf = new jspdf.jsPDF();
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 10, 10, 190, 0);
                pdf.save(`relatorio-${opponent || 'jogo'}.pdf`);
            };

            const colorMap = {
                indigo: 'bg-indigo-600', emerald: 'bg-emerald-600',
                violet: 'bg-violet-600', rose: 'bg-rose-600'
            };

            if (view === 'home') {
                return (
                    <div className="flex flex-col items-center justify-center h-screen p-6 space-y-6 bg-slate-950">
                        <div className="relative">
                            <div className="w-24 h-24 rounded-full bg-slate-800 flex items-center justify-center overflow-hidden border-2 border-indigo-500 shadow-xl">
                                {profilePic ? <img src={profilePic} className="w-full h-full object-cover" /> : <span className="text-4xl">👤</span>}
                            </div>
                            <input type="file" onChange={handlePhoto} className="absolute inset-0 opacity-0" />
                            <div className="absolute -bottom-1 -right-1 bg-indigo-600 rounded-full p-1 text-[10px]">📷</div>
                        </div>
                        <h1 className="text-3xl font-black text-indigo-500 italic text-center leading-tight uppercase tracking-tighter">SoccerAnalyst<br/>Pro</h1>
                        <input type="text" placeholder="Adversário" value={opponent} className="w-full p-4 rounded-xl bg-slate-900 border border-slate-800 outline-none text-center font-bold" onChange={(e) => setOpponent(e.target.value)} />
                        
                        <div className="w-full bg-slate-900 p-4 rounded-xl space-y-2">
                            <div className="flex justify-around">
                                {['indigo', 'emerald', 'violet', 'rose'].map(c => (
                                    <button key={c} onClick={() => setTheme(c)} className={`w-8 h-8 rounded-full border-2 ${theme === c ? 'border-white' : 'border-transparent'} ${colorMap[c]}`} />
                                ))}
                            </div>
                        </div>

                        <div className="w-full space-y-3">
                            <button onClick={() => setView('tracking')} className={`w-full ${colorMap[theme]} p-5 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-transform uppercase`}>Entrar no Painel</button>
                            <button onClick={resetAll} className="w-full py-3 text-[10px] font-bold text-slate-600 uppercase tracking-widest">Resetar Dados</button>
                        </div>
                    </div>
                );
            }

            if (view === 'report') {
                const maxVal = Math.max(...stats.map(s => s.count), 1);
                return (
                    <div className="h-screen flex flex-col bg-slate-950 overflow-hidden">
                        <div className="p-4 flex justify-between items-center border-b border-slate-800">
                            <button onClick={() => setView('tracking')} className="text-xs font-bold text-slate-500 uppercase">Voltar</button>
                            <button onClick={exportPDF} className={`${colorMap[theme]} px-4 py-2 rounded-xl font-bold text-xs`}>BAIXAR PDF</button>
                        </div>
                        <div id="report-area" className="flex-1 overflow-y-auto p-6 no-scrollbar bg-slate-950">
                            <div className="flex items-center gap-4 mb-8">
                                <div className="w-16 h-16 rounded-full bg-slate-800 overflow-hidden border-2 border-indigo-500">
                                    {profilePic && <img src={profilePic} className="w-full h-full object-cover" />}
                                </div>
                                <div>
                                    <h2 className="text-2xl font-black italic uppercase leading-none">{opponent || 'RELATÓRIO'}</h2>
                                    <p className="text-slate-500 text-[10px] font-bold mt-1 uppercase">Tempo total: {(time/60|0)}:{(time%60).toString().padStart(2,'0')}</p>
                                </div>
                            </div>
                            <div className="space-y-4">
                                {stats.filter(s => s.count > 0).map(s => (
                                    <div key={s.id} className="space-y-1">
                                        <div className="flex justify-between text-[10px] font-bold uppercase tracking-wider text-slate-400"><span>{s.name}</span><span>{s.count}</span></div>
                                        <div className="w-full bg-slate-900 h-1.5 rounded-full overflow-hidden">
                                            <div className={`${s.type === 'ataque' ? 'bg-indigo-500' : 'bg-rose-500'} h-full`} style={{width: `${(s.count/maxVal)*100}%`}}></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen w-full flex flex-col bg-slate-950 overflow-hidden">
                    <header className="p-3 bg-slate-900 border-b border-slate-800 flex justify-between items-center shrink-0">
                        <div className="text-xl font-mono font-black tracking-tighter text-indigo-400">
                            {(time/60|0)}:{(time%60).toString().padStart(2,'0')}
                        </div>
                        <div className="flex gap-2">
                            {history.length > 0 && <button onClick={undo} className="bg-amber-600 px-3 py-2 rounded-xl text-[10px] font-black">UNDO</button>}
                            <button onClick={() => setIsActive(!isActive)} className={`px-4 py-2 rounded-xl font-bold text-[10px] ${isActive ? 'bg-red-500' : 'bg-green-600'}`}>
                                {isActive ? 'STOP' : 'START'}
                            </button>
                            <button onClick={() => setView('report')} className="bg-white text-black px-3 py-2 rounded-xl text-[10px] font-black italic">PDF</button>
                            <button onClick={() => setView('home')} className="bg-slate-800 p-2 rounded-xl">🏠</button>
                        </div>
                    </header>
                    <div className="flex-1 flex overflow-hidden">
                        {['ataque', 'defesa'].map(type => (
                            <div key={type} className="flex-1 flex flex-col border-r border-slate-900 last:border-r-0">
                                <div className="flex justify-between items-center px-3 py-2 bg-slate-950/50">
                                    <span className={`${type === 'ataque' ? 'text-indigo-400' : 'text-rose-400'} text-[9px] font-black uppercase italic tracking-widest`}>{type}</span>
                                    <button onClick={() => addNewStat(type)} className="text-xs bg-slate-800 w-5 h-5 rounded flex items-center justify-center">+</button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-2 space-y-2 no-scrollbar pb-10">
                                    {stats.filter(s => s.type === type).map(s => (
                                        <div key={s.id} className="flex items-center gap-1">
                                            <button onClick={() => addStat(s.id)} className="flex-1 h-14 bg-slate-900 rounded-l-xl flex items-center px-3 border-l-4 border-slate-800 active:bg-slate-800 transition-colors">
                                                <span className="text-xl font-black mr-2 italic">{s.count}</span>
                                                <span className="text-[10px] font-bold uppercase text-slate-400 text-left leading-tight break-words">{s.name}</span>
                                            </button>
                                            <div className="flex flex-col gap-1 h-14">
                                                <button onClick={() => removeStat(s.id)} className="flex-1 bg-slate-800/50 px-3 rounded-tr-xl text-red-500 text-xs">-</button>
                                                <button onClick={() => editStatName(s.id)} className="flex-1 bg-slate-800/50 px-3 rounded-br-xl text-[10px]">✎</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
