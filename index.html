                        {[{val:golos,label:'Golos',color:'var(--green)',sub:'marcados'},{val:sofr,label:'Sofr.',color:'var(--red)',sub:'sofridos'},{val:remates,label:'Remates',color:'var(--accent)',sub:'total'},{val:`${ef}%`,label:'Eficacia',color:'var(--gold)',sub:'golo/remate'}].map(k=>(
                            <div key={k.label} style={{padding:'16px 12px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:14,textAlign:'center'}}>
                                <div style={{fontFamily:'Bebas Neue',fontSize:32,color:k.color,lineHeight:1}}>{k.val}</div>
                                <div style={{fontSize:9,fontWeight:700,textTransform:'uppercase',color:'var(--muted)',letterSpacing:1,marginTop:4}}>{k.label}</div>
                                <div style={{fontSize:8,color:'var(--muted)',fontStyle:'italic',marginTop:2}}>{k.sub}</div>
                            </div>
                        ))}
                    </div>
                    <div className="card" style={{marginBottom:24}}>
                        <div className="report-section-title">Distribuicao Ataque / Defesa</div>
                        <StackedBar leftVal={totalAtk} rightVal={totalDef} leftColor="var(--accent)" rightColor="var(--red)" leftLabel={`Ataque (${totalAtk})`} rightLabel={`Defesa (${totalDef})`}/>
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:24}}>
                        <div className="card">
                            <div className="report-section-title">Radar de Performance</div>
                            <RadarChart stats={g.stats} size={220}/>
                        </div>
                        <div className="card">
                            <div className="report-section-title">Indicadores</div>
                            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,paddingTop:4}}>
                                <DonutChart value={golos} max={Math.max(remates,1)} color="var(--green)" label="Conversao" sublabel="Golos" size={80}/>
                                <DonutChart value={g.stats.find(s=>s.name==='Rem. Enquad.')?.count||0} max={Math.max(remates,1)} color="var(--accent)" label="Enquadram." sublabel="Remates" size={80}/>
                                <DonutChart value={g.stats.find(s=>s.name==='Recuper.')?.count||0} max={Math.max(totalDef,1)} color="var(--gold)" label="Recuperacao" sublabel="de Bola" size={80}/>
                                <DonutChart value={sofr} max={Math.max(g.stats.find(s=>s.name==='Rem. Conc.')?.count||1,sofr)} color="var(--red)" label="Sofr./Conc." sublabel="Golos" size={80}/>
                            </div>
                        </div>
                    </div>
                    <div className="card" style={{marginBottom:24}}>
                        <div className="report-section-title">Intensidade por Minuto</div>
                        <IntensityChart events={filteredEvents} totalTime={g.time}/>
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:24}}>
                        <div className="card">
                            <div className="report-section-title" style={{color:'var(--accent)'}}>Ataque</div>
                            <BarChart data={g.stats.filter(s=>s.type==='ataque').map(s=>({label:s.name,value:s.count}))} colorFn={(_,i)=>atkColors[i%atkColors.length]}/>
                        </div>
                        <div className="card">
                            <div className="report-section-title" style={{color:'var(--red)'}}>Defesa</div>
                            <BarChart data={g.stats.filter(s=>s.type==='defesa').map(s=>({label:s.name,value:s.count}))} colorFn={(_,i)=>defColors[i%defColors.length]}/>
                        </div>
                    </div>
                    <div className="card" style={{marginBottom:24}}>
                        <div className="report-section-title">Cronologia de Eventos</div>
                        <Timeline events={filteredEvents} totalTime={g.time}/>
                        <div style={{marginTop:20,display:'flex',flexWrap:'wrap',gap:8}}>
                            {filteredEvents.filter(e=>e.isGoal).map((e,i)=>(
                                <div key={i} style={{padding:'6px 12px',background:'rgba(249,199,79,0.1)',border:'1px solid rgba(249,199,79,0.3)',borderRadius:8,fontFamily:'Space Mono',fontSize:10,color:'var(--gold)'}}>
                                    {fmtMin(e.time)}
                                </div>
                            ))}
                        </div>
                    </div>
                    {filteredEvents.length>0&&(
                        <div className="card" style={{marginBottom:24}}>
                            <div className="report-section-title">Lista de Eventos ({filteredEvents.length})</div>
                            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:6}}>
                                {filteredEvents.map((e,i)=>(
                                    <div key={i} style={{padding:'6px 10px',background:'var(--bg)',borderRadius:8,border:`1px solid ${e.isGoal?'rgba(249,199,79,0.3)':e.type==='ataque'?'rgba(67,97,238,0.2)':'rgba(239,35,60,0.2)'}`,display:'flex',alignItems:'center',gap:8}}>
                                        <div style={{width:6,height:6,borderRadius:'50%',flexShrink:0,background:e.isGoal?'var(--gold)':e.type==='ataque'?'var(--accent)':'var(--red)'}}/>
                                        <div>
                                            <div style={{fontFamily:'Space Mono',fontSize:9,color:'var(--muted)'}}>{fmtMin(e.time)}</div>
                                            <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.04em'}}>{e.name}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                    {(g.notes||(g.notesHistory||[]).length>0)&&(
                        <div className="card" style={{marginBottom:24}}>
                            <div className="report-section-title">Notas</div>
                            {g.notes&&<p style={{fontSize:12,color:'var(--text)',fontStyle:'italic',lineHeight:1.6,marginBottom:12}}>"{g.notes}"</p>}
                            {(g.notesHistory||[]).map((n,i)=>(
                                <div key={i} style={{marginBottom:10,paddingLeft:12,borderLeft:'2px solid var(--border)'}}>
                                    <div style={{fontSize:9,fontWeight:700,textTransform:'uppercase',color:'var(--muted)',letterSpacing:1,marginBottom:4}}>{n.label}</div>
                                    <div style={{fontSize:11,color:'var(--text)',fontStyle:'italic'}}>"{n.text}"</div>
                                </div>
                            ))}
                        </div>
                    )}
                    <div style={{textAlign:'center',fontSize:9,color:'var(--muted)',fontWeight:700,textTransform:'uppercase',letterSpacing:3,padding:'20px 0'}}>
                        SoccerAnalyst Pro · {new Date().toLocaleDateString('pt-PT')}
                    </div>
                </div>
                {toast&&<Toast message={toast.msg} isGoal={toast.goal} onClose={()=>setToast(null)}/>}
            </div>
        );
    }

    /* ════════════════════════════════════════════════════
       VIEW: TRACKING
    ════════════════════════════════════════════════════ */
    if(!currentGame){setView('games');return null;}
    const period=getPeriodInfo(currentGame.time);

    const headerPad   = isLandscape ? '6px 12px'  : '10px 16px';
    const timerSize   = isLandscape ? 18           : 22;
    const btnSize     = isLandscape ? 32           : 40;
    const btnFontSize = isLandscape ? 9            : 10;
    const startH      = isLandscape ? 32           : 40;

    return(
        <div style={{height:'100vh',display:'flex',flexDirection:'column',background:'var(--bg)',overflow:'hidden'}}>
            <header className="ls-header" style={{padding:headerPad,background:'var(--surface)',borderBottom:'1px solid var(--border)',flexShrink:0,display:'flex',flexWrap:'wrap',gap:isLandscape?6:10,alignItems:'center',justifyContent:'space-between'}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <div style={{padding:isLandscape?'5px 12px':'8px 16px',background:'var(--bg)',borderRadius:10,border:'1px solid var(--border)',display:'flex',alignItems:'center',gap:8}}>
                        <span className="ls-timer-block" style={{fontFamily:'Space Mono',fontSize:timerSize,fontWeight:700,color:'var(--accent)'}}>{fmt(currentGame.time)}</span>
                        <span style={{fontSize:isLandscape?8:9,fontWeight:800,textTransform:'uppercase',letterSpacing:1,color:period.color,background:`${period.color}22`,padding:'3px 8px',borderRadius:6}}>{period.label}</span>
                    </div>
                    <button onClick={undoLast} className="ls-btn-sm"
                        style={{width:btnSize,height:btnSize,borderRadius:10,background:'var(--bg)',border:'1px solid var(--border)',color:'var(--text)',cursor:'pointer',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center'}}>↩</button>
                </div>
                <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'nowrap'}}>
                    <div style={{width:btnSize,height:btnSize,borderRadius:10,background:'var(--bg)',border:'1px solid var(--border)',overflow:'hidden',position:'relative',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                        {currentGame.pic?<img src={currentGame.pic} style={{width:'100%',height:'100%',objectFit:'cover'}}/>:<span style={{fontSize:isLandscape?14:18}}>P</span>}
                        <input type="file" accept="image/*" onChange={async e=>{const f=e.target.files[0];if(f){const c=await compressImage(f);updateGame({pic:c});showToast('Foto');} }} style={{position:'absolute',inset:0,opacity:0,cursor:'pointer'}}/>
                    </div>
                    <button onClick={()=>setShowNotes(p=>!p)} className="ls-btn-sm"
                        style={{width:btnSize,height:btnSize,borderRadius:10,background:currentGame.notes?'rgba(67,97,238,0.3)':'var(--bg)',border:`1px solid ${currentGame.notes?'var(--accent)':'var(--border)'}`,cursor:'pointer',fontSize:isLandscape?14:16,display:'flex',alignItems:'center',justifyContent:'center'}}>N</button>
                    <button onClick={()=>adjustTime(-10)} className="ls-btn-sm"
                        style={{width:isLandscape?36:38,height:btnSize,borderRadius:10,background:'var(--bg)',border:'1px solid var(--border)',color:'var(--text)',cursor:'pointer',fontFamily:'Space Mono',fontSize:btnFontSize,fontWeight:700}}>-10s</button>
                    <button onClick={()=>adjustTime(60)} className="ls-btn-sm"
                        style={{width:isLandscape?36:38,height:btnSize,borderRadius:10,background:'var(--bg)',border:'1px solid var(--border)',color:'var(--text)',cursor:'pointer',fontFamily:'Space Mono',fontSize:btnFontSize,fontWeight:700}}>+1m</button>
                    <button className="ls-start-btn" onClick={()=>setIsActive(p=>{const n=!p;if(!n)showToast('Pausado');return n;})}
                        style={{padding:`0 ${isLandscape?10:16}px`,height:startH,borderRadius:10,border:'none',background:isActive?'var(--red)':'var(--green)',color:'white',fontFamily:'Bebas Neue',fontSize:isLandscape?14:16,letterSpacing:2,cursor:'pointer'}}>
                        {isActive?'STOP':'START'}
                    </button>
                    <button className="ls-pdf-btn" onClick={()=>setView('report')}
                        style={{padding:`0 ${isLandscape?10:14}px`,height:startH,borderRadius:10,border:'none',background:'white',color:'black',fontFamily:'Bebas Neue',fontSize:isLandscape?12:14,letterSpacing:2,cursor:'pointer'}}>PDF</button>
                </div>
            </header>

            {showNotes&&(
                <div className="ls-notes" style={{padding:'12px 16px',background:'var(--surface2)',borderBottom:'1px solid var(--border)',flexShrink:0}}>
                    <textarea value={currentGame.notes} onChange={e=>updateGame({notes:e.target.value})} placeholder="Observacoes..."
                        style={{width:'100%',height:isLandscape?48:72,borderRadius:10,padding:'10px 14px',fontSize:12,resize:'none',lineHeight:1.5}}/>
                    <div style={{display:'flex',justifyContent:'flex-end',marginTop:6}}>
                        <button onClick={()=>{
                            if(!currentGame.notes?.trim()){showToast('Nota vazia');return;}
                            const label=`${fmt(currentGame.time)} · ${new Date().toLocaleDateString('pt-PT')}`;
                            updateGame(g=>({...g,notesHistory:[...(g.notesHistory||[]),{label,text:g.notes.trim()}]}));
                            showToast('Nota guardada');
                        }} style={{padding:'6px 16px',borderRadius:10,background:'var(--accent)',border:'none',color:'white',fontWeight:700,fontSize:11,textTransform:'uppercase',letterSpacing:1,cursor:'pointer'}}>
                            Guardar
                        </button>
                    </div>
                </div>
            )}

            <div style={{flex:1,display:'flex',overflow:'hidden'}}>
                {['ataque','defesa'].map(type=>(
                    <div key={type} style={{flex:1,display:'flex',flexDirection:'column',borderRight:type==='ataque'?'1px solid var(--border)':'none'}}>
                        <div className="ls-col-header" style={{padding:isLandscape?'5px 10px':'8px 12px',display:'flex',justifyContent:'space-between',alignItems:'center',background:'var(--surface2)',borderBottom:'1px solid var(--border)',flexShrink:0}}>
                            <span style={{fontFamily:'Bebas Neue',fontSize:isLandscape?13:16,letterSpacing:3,color:type==='ataque'?'var(--accent)':'var(--red)'}}>{type.toUpperCase()}</span>
                            <button onClick={()=>addCustomStat(type)}
                                style={{width:isLandscape?24:28,height:isLandscape?24:28,borderRadius:8,background:'var(--bg)',border:'1px solid var(--border)',color:'var(--text)',cursor:'pointer',fontSize:13,display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
                        </div>
                        <div style={{flex:1,overflowY:'auto',padding:isLandscape?4:8}} className="no-scrollbar">
                            {currentGame.stats.filter(s=>s.type===type).map(s=>(
                                <div key={s.id} style={{display:'flex',gap:4,marginBottom:isLandscape?3:6}}>
                                    <button className="stat-btn active-btn" onClick={()=>addStat(s.id)}
                                        style={{borderLeft:`3px solid ${s.count>0?(type==='ataque'?'var(--accent)':'var(--red)'):'var(--border)'}`,padding:isLandscape?'6px 10px':'12px 14px'}}>
                                        <span className="stat-count" style={{color:s.count>0?'var(--text)':'var(--border)',fontSize:isLandscape?22:32}}>{s.count}</span>
                                        <span className="stat-name" style={{fontSize:isLandscape?9:10}}>{s.name}</span>
                                    </button>
                                    <div style={{display:'flex',flexDirection:'column',gap:4,width:isLandscape?24:28,flexShrink:0}}>
                                        <button onClick={()=>removeStat(s.id)} style={{flex:1,background:'rgba(239,35,60,0.08)',border:'1px solid rgba(239,35,60,0.2)',borderRadius:8,color:'var(--red)',cursor:'pointer',fontSize:13,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>-</button>
                                        <button onClick={()=>renameStat(s.id,s.name)} title="Renomear em todos os jogos" style={{flex:1,background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,color:'var(--muted)',cursor:'pointer',fontSize:10,display:'flex',alignItems:'center',justifyContent:'center'}}>E</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                ))}
            </div>

            <button className="ls-home-btn" onClick={()=>setView('folders')}
                style={{position:'absolute',bottom:24,left:24,width:52,height:52,borderRadius:'50%',background:'var(--surface)',border:'1px solid var(--border)',fontSize:22,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 20px rgba(0,0,0,0.4)'}}>H</button>

            {isLandscape&&(
                <button onClick={()=>setView('folders')}
                    style={{position:'absolute',top:6,left:6,background:'transparent',border:'none',color:'var(--muted)',fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:2,cursor:'pointer',zIndex:10}}>H</button>
            )}

            {toast&&<Toast message={toast.msg} isGoal={toast.goal} onClose={()=>setToast(null)}/>}
        </div>
    );

    function adjustTime(delta){ updateGame(g=>({...g,time:Math.max(0,g.time+delta)})); }
    function addCustomStat(type){
        const n=promptText(`Nova acao de ${type}:\n(propagada a todos os jogos desta pasta)`);
        if(!n) return;
        const newStat={id:Date.now(),name:n,type,count:0};
        updateGame(g=>({...g,stats:[...g.stats,newStat]}));
        syncStatToFolder(currentFolderId,newStat);
        showToast(`"${n}" em todos os jogos`);
    }
    function renameStat(statId,currentName){
        const n=promptText('Novo nome:',currentName);
        if(!n||n===currentName) return;
        renameStatAcrossFolder(currentFolderId,statId,n);
        showToast('Renomeado em todos os jogos');
    }
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
