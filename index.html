<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SoccerAnalyst Pro - Ultra Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background-color: #020617; touch-action: manipulation; color: white; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-btn:active { transform: scale(0.96); opacity: 0.8; }
        .timeline-bar { height: 50px; background: #0f172a; border-radius: 12px; position: relative; border: 1px solid #1e293b; margin-top: 25px; }
        .event-marker { position: absolute; width: 2px; height: 100%; top: 0; transform: translateX(-50%); }
        .goal-marker { position: absolute; width: 4px; height: 100%; top: 0; background: #fbbf24; z-index: 10; box-shadow: 0 0 10px #fbbf24; transform: translateX(-50%); }
        .time-label { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 9px; font-weight: 900; color: #475569; }
    </style>
</head>
<body class="font-sans select-none">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const INITIAL_STATS = [
            { id: 1, name: 'Golo', count: 0, type: 'ataque' },
            { id: 2, name: 'Remate', count: 0, type: 'ataque' },
            { id: 3, name: 'Rem. Enquad.', count: 0, type: 'ataque' },
            { id: 4, name: 'Cantos', count: 0, type: 'ataque' },
            { id: 5, name: 'Rem. Área', count: 0, type: 'ataque' },
            { id: 6, name: 'Cruzam.', count: 0, type: 'ataque' },
            { id: 7, name: 'Golo Sofr.', count: 0, type: 'defesa' },
            { id: 8, name: 'Recuper.', count: 0, type: 'defesa' },
            { id: 9, name: 'Rem. Conc.', count: 0, type: 'defesa' },
            { id: 10, name: 'Rem. Área C.', count: 0, type: 'defesa' },
            { id: 11, name: 'Perdas Bola', count: 0, type: 'defesa' },
            { id: 12, name: 'Faltas', count: 0, type: 'defesa' }
        ];

        function App() {
            const [view, setView] = useState('folders'); 
            const [folders, setFolders] = useState(() => JSON.parse(localStorage.getItem('soccer_final_db')) || []);
            const [currentFolderId, setCurrentFolderId] = useState(null);
            const [currentGame, setCurrentGame] = useState(null);
            const [isActive, setIsActive] = useState(false);
            const [showNotes, setShowNotes] = useState(false);

            useEffect(() => { localStorage.setItem('soccer_final_db', JSON.stringify(folders)); }, [folders]);

            useEffect(() => {
                let interval = null;
                if (isActive && currentGame) {
                    interval = setInterval(() => { updateCurrentGameData('time', currentGame.time + 1); }, 1000);
                }
                return () => clearInterval(interval);
            }, [isActive, currentGame]);

            const updateCurrentGameData = (field, value) => {
                const updatedFolders = folders.map(f => {
                    if (f.id === currentFolderId) {
                        return { ...f, games: f.games.map(g => g.id === currentGame.id ? { ...g, [field]: value } : g) };
                    }
                    return f;
                });
                setFolders(updatedFolders);
                setCurrentGame(prev => ({ ...prev, [field]: value }));
            };

            const formatFullTime = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;

            // FUNÇÃO CORRIGIDA PARA APAGAR JOGO
            const handleDeleteGame = (e, gameId) => {
                e.preventDefault();
                e.stopPropagation(); // Impede de abrir o jogo ao clicar no lixo
                if(window.confirm("ELIMINAR JOGO?\nEsta ação não pode ser desfeita.")) {
                    const newFolders = folders.map(f => {
                        if (f.id === currentFolderId) {
                            return { ...f, games: f.games.filter(g => g.id !== gameId) };
                        }
                        return f;
                    });
                    setFolders(newFolders);
                }
            };

            const addStat = (id) => {
                if(!isActive) return alert("Inicia o Cronómetro!");
                const stat = currentGame.stats.find(s => s.id === id);
                const isGoal = stat.name.toLowerCase().includes('golo');
                const newStats = currentGame.stats.map(s => s.id === id ? { ...s, count: s.count + 1 } : s);
                const newEvent = { time: currentGame.time, type: stat.type, name: stat.name, isGoal, statId: id };
                updateCurrentGameData('stats', newStats);
                updateCurrentGameData('events', [...currentGame.events, newEvent]);
            };

            const removeStat = (id) => {
                const stat = currentGame.stats.find(s => s.id === id);
                if (stat.count <= 0) return;
                const newStats = currentGame.stats.map(s => s.id === id ? { ...s, count: s.count - 1 } : s);
                const lastEventIndex = [...currentGame.events].reverse().findIndex(e => e.statId === id);
                let newEvents = [...currentGame.events];
                if (lastEventIndex !== -1) {
                    newEvents.splice(currentGame.events.length - 1 - lastEventIndex, 1);
                }
                updateCurrentGameData('stats', newStats);
                updateCurrentGameData('events', newEvents);
            };

            const exportPDF = async () => {
                const element = document.getElementById('report-area');
                const canvas = await html2canvas(element, { backgroundColor: '#020617', scale: 2, useCORS: true });
                const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, (canvas.height * 210) / canvas.width);
                pdf.save(`Relatorio_${currentGame.opponent}.pdf`);
            };

            if (view === 'folders') return (
                <div className="p-6 h-screen bg-slate-950 overflow-y-auto">
                    <h1 className="text-3xl font-black text-indigo-500 mb-8 italic uppercase tracking-tighter">SoccerAnalyst Pro</h1>
                    <button onClick={() => {const n = prompt("Nome da Pasta:"); if(n) setFolders([{id: Date.now(), name: n, games: []}, ...folders])}} className="w-full p-5 mb-6 border-2 border-dashed border-slate-800 rounded-3xl text-slate-500 font-bold active-btn">+ Nova Pasta</button>
                    <div className="space-y-4">
                        {folders.map(f => (
                            <div key={f.id} onClick={() => {setCurrentFolderId(f.id); setView('games')}} className="bg-slate-900 p-6 rounded-3xl flex justify-between items-center active-btn border border-slate-800">
                                <div><h3 className="font-black text-white uppercase italic text-lg">{f.name}</h3><p className="text-[10px] text-indigo-500 font-bold uppercase">{f.games.length} Jogos</p></div>
                                <button onClick={(e) => { e.stopPropagation(); if(confirm("Apagar pasta inteira?")) setFolders(folders.filter(fold => fold.id !== f.id)); }} className="text-slate-700 text-xs font-bold bg-slate-800 px-3 py-1 rounded-lg">Eliminar</button>
                            </div>
                        ))}
                    </div>
                </div>
            );

            if (view === 'games') {
                const folder = folders.find(f => f.id === currentFolderId);
                return (
                    <div className="p-6 h-screen bg-slate-950 overflow-y-auto">
                        <button onClick={() => setView('folders')} className="text-[10px] font-black text-slate-500 mb-6 uppercase tracking-widest">← Voltar</button>
                        <h2 className="text-2xl font-black mb-8 uppercase italic text-indigo-400 border-l-4 border-indigo-500 pl-4">{folder.name}</h2>
                        <button onClick={() => {const o = prompt("Adversário:"); if(o) setFolders(folders.map(f => f.id === currentFolderId ? {...f, games: [{id: Date.now(), opponent: o, time: 0, stats: INITIAL_STATS, events: [], notes: "", pic: null, date: new Date().toLocaleDateString('pt-PT')}, ...f.games]} : f))}} className="w-full p-5 bg-indigo-600 rounded-3xl font-black uppercase italic mb-8 shadow-xl active-btn">Adicionar Jogo</button>
                        <div className="space-y-4">
                            {folder.games.map(g => (
                                <div key={g.id} onClick={() => {setCurrentGame(g); setView('tracking')}} className="bg-slate-900 p-5 rounded-3xl flex justify-between items-center active-btn border border-slate-800">
                                    <div className="flex flex-col">
                                        <span className="font-black uppercase italic tracking-tight">{g.opponent}</span>
                                        <span className="text-[10px] text-slate-600 font-bold">{g.date}</span>
                                    </div>
                                    <button 
                                        onClick={(e) => handleDeleteGame(e, g.id)} 
                                        className="w-12 h-12 flex items-center justify-center bg-red-600/10 rounded-2xl text-red-500 border border-red-500/20 hover:bg-red-600 hover:text-white transition-all shadow-inner text-xl"
                                    >🗑️</button>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            // REPORT VIEW
            if (view === 'report') return (
                <div className="h-screen flex flex-col bg-slate-950 text-white">
                    <div className="p-4 flex justify-between border-b border-slate-800 shrink-0 bg-slate-900">
                        <button onClick={() => setView('tracking')} className="text-xs font-bold text-slate-400 uppercase">← Painel</button>
                        <button onClick={exportPDF} className="bg-white text-black px-6 py-2 rounded-xl font-black text-[10px] uppercase italic active-btn">Baixar PDF</button>
                    </div>
                    <div id="report-area" className="flex-1 overflow-y-auto p-10 bg-slate-950">
                        <div className="flex justify-between items-start mb-12">
                            <div><h2 className="text-5xl font-black italic uppercase text-indigo-500">{currentGame.opponent}</h2><p className="text-slate-500 font-bold text-xs mt-3 uppercase tracking-widest">{currentGame.date} | FINAL: {formatFullTime(currentGame.time)}</p></div>
                            {currentGame.pic && <img src={currentGame.pic} className="w-24 h-24 rounded-2xl object-cover border-2 border-slate-800 shadow-2xl" />}
                        </div>
                        <div className="mb-16">
                            <h3 className="text-[10px] font-black uppercase text-slate-500 mb-4 tracking-widest text-center">Cronologia</h3>
                            <div className="timeline-bar">
                                {currentGame.events.map((e, i) => (
                                    <div key={i} className={e.isGoal ? 'goal-marker' : 'event-marker ' + (e.type === 'ataque' ? 'bg-indigo-500' : 'bg-red-600')} style={{ left: `${(e.time / (currentGame.time || 1)) * 100}%` }}>
                                        {(e.isGoal || i % 6 === 0) && <span className="time-label">{Math.floor(e.time/60)}'</span>}
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="grid grid-cols-2 gap-12 text-white">
                            {['ataque', 'defesa'].map(type => (
                                <div key={type}>
                                    <h4 className={`text-xl font-black uppercase italic mb-6 border-l-4 pl-3 ${type === 'ataque' ? 'border-indigo-500 text-indigo-400' : 'border-red-600 text-red-500'}`}>{type}</h4>
                                    {currentGame.stats.filter(s => s.type === type).map(s => (
                                        <div key={s.id} className="flex justify-between items-center border-b border-slate-900 py-3 text-white">
                                            <span className="text-[10px] font-bold text-slate-500 uppercase">{s.name}</span>
                                            <span className="text-xl font-black text-white">{s.count}</span>
                                        </div>
                                    ))}
                                </div>
                            ))}
                        </div>
                        {currentGame.notes && <div className="mt-12 p-8 bg-slate-900 rounded-[2rem] italic text-slate-300 text-sm border border-slate-800">"{currentGame.notes}"</div>}
                    </div>
                </div>
            );

            // TRACKING (MAIN)
            return (
                <div className="h-screen flex flex-col bg-slate-950 overflow-hidden">
                    <header className="p-3 bg-slate-900 border-b border-slate-800 flex justify-between items-center shrink-0">
                        <div className="flex items-center gap-3">
                            <div className="bg-slate-950 px-3 py-1 rounded-xl border border-slate-800 text-xl font-mono font-black text-indigo-400 tracking-tighter">{formatFullTime(currentGame.time)}</div>
                            <button onClick={() => {if (currentGame.events.length > 0) removeStat(currentGame.events[currentGame.events.length - 1].statId)}} className="bg-slate-800 w-10 h-10 rounded-xl flex items-center justify-center active-btn border border-slate-700 shadow-lg text-lg">↩</button>
                        </div>
                        <div className="flex gap-2">
                            <div className="relative w-10 h-10 bg-slate-800 rounded-xl flex items-center justify-center border border-slate-700 active-btn overflow-hidden shadow-lg">
                                {currentGame.pic ? <img src={currentGame.pic} className="w-full h-full object-cover" /> : <span className="text-xl">📷</span>}
                                <input type="file" onChange={(e) => {const f=e.target.files[0]; if(f){const r=new FileReader(); r.onloadend=()=>updateCurrentGameData('pic', r.result); r.readAsDataURL(f)}}} className="absolute inset-0 opacity-0" />
                            </div>
                            <button onClick={() => setShowNotes(!showNotes)} className={`w-10 h-10 rounded-xl flex items-center justify-center border border-slate-700 ${currentGame.notes ? 'bg-indigo-600' : 'bg-slate-800'}`}>📝</button>
                            <button onClick={() => setIsActive(!isActive)} className={`px-4 rounded-xl font-black text-[10px] uppercase transition-all shadow-lg ${isActive ? 'bg-red-600 animate-pulse' : 'bg-green-600'}`}>{isActive ? 'STOP' : 'START'}</button>
                            <button onClick={() => setView('report')} className="bg-white text-black px-4 rounded-xl text-[10px] font-black uppercase italic active-btn">PDF</button>
                        </div>
                    </header>
                    {showNotes && (
                        <div className="p-4 bg-slate-900 border-b border-slate-800 shrink-0"><textarea value={currentGame.notes} onChange={(e) => updateCurrentGameData('notes', e.target.value)} placeholder="Notas..." className="w-full h-24 bg-slate-950 border border-slate-800 rounded-2xl p-4 text-xs text-white outline-none focus:border-indigo-500" /></div>
                    )}
                    <div className="flex-1 flex overflow-hidden">
                        {['ataque', 'defesa'].map(type => (
                            <div key={type} className="flex-1 flex flex-col border-r border-slate-900 last:border-r-0">
                                <div className="flex justify-between items-center px-4 py-2 bg-slate-900/50 border-b border-slate-800">
                                    <span className={`${type === 'ataque' ? 'text-indigo-400' : 'text-red-500'} text-[9px] font-black uppercase italic tracking-widest`}>{type}</span>
                                    <button onClick={() => {const n=prompt("Nova ação:"); if(n) updateCurrentGameData('stats', [...currentGame.stats, {id: Date.now(), name: n, count: 0, type}])}} className="text-lg bg-slate-800 w-6 h-6 rounded flex items-center justify-center border border-slate-700">+</button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-2 space-y-3 no-scrollbar pb-32">
                                    {currentGame.stats.filter(s => s.type === type).map(s => (
                                        <div key={s.id} className="flex items-stretch gap-1">
                                            <button onClick={() => addStat(s.id)} className="flex-1 h-20 bg-slate-900 rounded-2xl flex items-center px-4 border-l-4 border-slate-800 active:border-indigo-500 shadow-xl active-btn">
                                                <span className={`text-3xl font-black mr-3 italic ${s.count > 0 ? 'text-white' : 'text-slate-800'}`}>{s.count}</span>
                                                <span className="text-[10px] font-black uppercase text-slate-400 text-left leading-tight tracking-tighter">{s.name}</span>
                                            </button>
                                            <div className="flex flex-col gap-1 w-10">
                                                <button onClick={() => removeStat(s.id)} className="flex-1 bg-red-950/20 border border-red-900/30 rounded-xl text-red-500 text-xs font-black active-btn flex items-center justify-center">-</button>
                                                <button onClick={() => {const n=prompt("Editar:", s.name); if(n) updateCurrentGameData('stats', currentGame.stats.map(st=>st.id===s.id?{...st, name:n}:st))}} className="flex-1 bg-slate-900/50 border border-slate-800 rounded-xl text-[10px] opacity-40 flex items-center justify-center">✎</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                    <button onClick={() => setView('folders')} className="absolute bottom-8 left-8 w-14 h-14 bg-slate-800 rounded-full flex items-center justify-center shadow-2xl border border-slate-700 active-btn text-2xl">🏠</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
