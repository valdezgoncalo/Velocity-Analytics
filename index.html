        showToast('Renomeado em todos os jogos');
    };

    const compressImage=file=>new Promise(res=>{
        const r=new FileReader();
        r.onload=()=>{
            const img=new Image();
            img.onload=()=>{
                const scale=Math.min(1,512/Math.max(img.width,img.height));
                const c=document.createElement('canvas');
                c.width=Math.round(img.width*scale);c.height=Math.round(img.height*scale);
                c.getContext('2d').drawImage(img,0,0,c.width,c.height);
                res(c.toDataURL('image/jpeg',0.8));
            };
            img.src=r.result;
        };
        r.readAsDataURL(file);
    });

    const exportPDF = async (shareMode=false) => {
        if(!currentGame){showToast('Nenhum jogo carregado');return null;}
        setPdfProgress(10);
        await new Promise(r=>setTimeout(r,50));
        try {
            setPdfProgress(30);
            await new Promise(r=>setTimeout(r,30));
            const doc=buildNativePDF(currentGame, currentFolder?.name||'', getFolderPlayers(currentFolderId), currentFolder?.homeLogo||null);
            setPdfProgress(80);
            await new Promise(r=>setTimeout(r,30));
            const filename=`SoccerAnalyst_${currentGame.opponent.replace(/[^a-zA-Z0-9]/g,'_')}_${(currentGame.date||'').replace(/\//g,'-')}.pdf`;
            if(shareMode){
                const blob=doc.output('blob');
                setPdfProgress(100);
                await new Promise(r=>setTimeout(r,200));
                setPdfProgress(null);
                return {blob, filename};
            }
            doc.save(filename);
            setPdfProgress(100);
            await new Promise(r=>setTimeout(r,300));
            setPdfProgress(null);
            showToast('✅ PDF guardado');
            return null;
        } catch(e) {
            console.error(e);
            setPdfProgress(null);
            showToast('Erro ao gerar PDF');
            return null;
        }
    };

    const buildShareText = () => {
        if(!currentGame) return '';
        const g=currentGame;
        const gf=g.stats.find(s=>s.name==='Golo')?.count||0;
        const ga=g.stats.find(s=>s.name==='Golo Sofr.')?.count||0;
        const rem=g.stats.find(s=>s.name==='Remate')?.count||0;
        const ef=rem>0?`${((gf/rem)*100).toFixed(0)}%`:'—';
        const atk=g.stats.filter(s=>s.type==='ataque').reduce((a,s)=>a+s.count,0);
        const def=g.stats.filter(s=>s.type==='defesa').reduce((a,s)=>a+s.count,0);
        const goals=g.events.filter(e=>e.isGoal).map(e=>fmtMin(e.time)).join(', ');
        return [
            `⚽ *RELATÓRIO DE JOGO*`,
            `📋 ${currentFolder?.name||''}`,
            `🆚 *${g.opponent}*  |  ${g.date}`,
            ``,
            `🏆 *Resultado:  ${gf} – ${ga}*`,
            ``,
            `📊 *Estatísticas:*`,
            `• Remates: ${rem}  |  Eficácia: ${ef}`,
            `• Ações ataque: ${atk}  |  Defesa: ${def}`,
            goals?`• ⚽ Golos: ${goals}`:``,
            ``,
            g.notes?`📝 "${g.notes}"`:null,
            ``,
            `_Gerado por SoccerAnalyst Pro_`,
        ].filter(l=>l!==null).join('\n');
    };

    const handleShareWhatsApp = () => {
        const text=buildShareText();
        const encoded=encodeURIComponent(text);
        window.open(`https://wa.me/?text=${encoded}`,'_blank');
        setShowShare(false);
    };

    const handleShareEmail = () => {
        const g=currentGame;
        if(!g) return;
        const gf=g.stats.find(s=>s.name==='Golo')?.count||0;
        const ga=g.stats.find(s=>s.name==='Golo Sofr.')?.count||0;
        const subject=encodeURIComponent(`Relatório: ${g.opponent} (${gf}–${ga}) - ${g.date}`);
        const body=encodeURIComponent(buildShareText().replace(/\*/g,'').replace(/_/g,''));
        window.open(`mailto:?subject=${subject}&body=${body}`,'_blank');
        setShowShare(false);
    };

    const handleShareNative = async () => {
        setShowShare(false);
        const result = await exportPDF(true);
        if(!result) return;
        const {blob, filename}=result;
        const file=new File([blob],filename,{type:'application/pdf'});
        if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
            try{ await navigator.share({files:[file],title:`Relatório ${currentGame.opponent}`,text:buildShareText()}); }
            catch(e){ if(e.name!=='AbortError') showToast('Erro ao partilhar'); }
        } else {
            // Fallback: download
            const url=URL.createObjectURL(blob);
            const a=document.createElement('a');
            a.href=url;a.download=filename;
            document.body.appendChild(a);a.click();a.remove();
            URL.revokeObjectURL(url);
            showToast('✅ PDF guardado');
        }
    };

    const handleCopyText = () => {
        const text=buildShareText().replace(/\*/g,'').replace(/_/g,'');
        if(navigator.clipboard){
            navigator.clipboard.writeText(text).then(()=>showToast('✅ Copiado!'));
        } else {
            const ta=document.createElement('textarea');
            ta.value=text;document.body.appendChild(ta);ta.select();
            document.execCommand('copy');document.body.removeChild(ta);
            showToast('✅ Copiado!');
        }
        setShowShare(false);
    };

    const handleExport=()=>{
        const ok=downloadBackup(folders, globalPlayers);
        showToast(ok?'Backup exportado':'Erro ao exportar');
    };

    const handleImport=file=>{
        if(!file) return;
        const r=new FileReader();
        r.onload=async()=>{
            const parsed=parseBackup(r.result);
            if(!parsed){showToast('Ficheiro invalido');return;}
            setFolders(parsed.folders);
            if(parsed.players.length>0) setGlobalPlayers(parsed.players);
            await saveAll(parsed.folders, parsed.players.length>0?parsed.players:globalPlayers);
            showToast('Dados importados');
        };
        r.readAsText(file);
    };

    const getPeriodInfo=t=>{
        const m=Math.floor(t/60);
        if(m<45) return{label:'1 TEMPO',color:'var(--green)'};
        if(m<90) return{label:'2 TEMPO',color:'var(--accent)'};
        return{label:'PRORROG.',color:'var(--gold)'};
    };

    const getFolderSummary=folder=>{
        if(!folder.games.length) return null;
        const golos=folder.games.reduce((s,g)=>s+(g.stats.find(x=>x.name==='Golo')?.count||0),0);
        const sofr=folder.games.reduce((s,g)=>s+(g.stats.find(x=>x.name==='Golo Sofr.')?.count||0),0);
        const rem=folder.games.reduce((s,g)=>s+(g.stats.find(x=>x.name==='Remate')?.count||0),0);
        return{games:folder.games.length,golos,sofr,ef:rem>0?((golos/rem)*100).toFixed(1):0};
    };

    /* ── Filtered games ── */
    const filteredGames = useMemo(()=>{
        if(!currentFolder) return [];
        const fromD=dateFrom?new Date(dateFrom):null;
        const toD=dateTo?(()=>{const d=new Date(dateTo);d.setHours(23,59,59,999);return d;})():null;
        return currentFolder.games.filter(g=>{
            if(!g.opponent.toLowerCase().includes(searchTerm.toLowerCase())) return false;
            const gd=parsePtDate(g.date);
            if(fromD&&(!gd||gd<fromD)) return false;
            if(toD&&(!gd||gd>toD)) return false;
            const gf=g.stats.find(s=>s.name==='Golo')?.count||0;
            const ga=g.stats.find(s=>s.name==='Golo Sofr.')?.count||0;
            if(minGF&&gf<Number(minGF)) return false;
            if(minGA&&ga<Number(minGA)) return false;
            return true;
        }).sort((a,b)=>sortBy==='date'?(parsePtDate(b.date)-parsePtDate(a.date)):a.opponent.localeCompare(b.opponent));
    },[currentFolder,searchTerm,dateFrom,dateTo,minGF,minGA,sortBy]);

    const hasActiveFilter = dateFrom||dateTo||minGF||minGA;

    /* ════════════════════════════════════
       RENDER HELPERS
    ════════════════════════════════════ */
    const setGameAndView=(gameId,v)=>{
        setCurrentGameId(gameId);
        setView(v);
    };

    /* ════════════════════════════════════
       VIEW: FOLDERS
    ════════════════════════════════════ */
    const renderFolders=()=>(
        <div className="screen slide-in no-scrollbar" style={{paddingBottom:'calc(16px + env(safe-area-inset-bottom,0px))'}}>
            <div className="page-header">
                <div>
                    <div style={{fontFamily:'Barlow Condensed',fontSize:28,letterSpacing:3,color:'var(--accent)',lineHeight:1}}>SoccerAnalyst</div>
                    <div style={{fontFamily:'Barlow Condensed',fontSize:14,letterSpacing:6,color:'var(--muted)'}}>PRO</div>
                </div>
                <div style={{display:'flex',gap:8}}>
                    <button className="btn-ghost" onClick={handleExport} title="Guardar backup JSON">Backup</button>
                    <button className="btn-ghost" onClick={()=>importRef.current?.click()}>Importar</button>

            </div>
            <div style={{padding:'16px 16px 0'}}>
                <button className="btn-primary" style={{marginBottom:16}} onClick={()=>{

                <div style={{display:'flex',flexDirection:'column',gap:10}}>
                    {folders.length===0&&(
                        <div className="empty"><div className="empty-icon">🗂</div><div className="empty-text">Nenhuma pasta criada</div></div>
                    )}
                    {folders.map(f=>{
                        const s=getFolderSummary(f);
                        return(
                            <div key={f.id} className="folder-card" onClick={()=>{setCurrentFolderId(f.id);setView('games');}}>
                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:s?14:0}}>
                                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                                        {/* Home logo */}
                                        <div style={{width:40,height:40,borderRadius:10,overflow:'hidden',background:'var(--bg)',border:'1px solid var(--border)',flexShrink:0,position:'relative',cursor:'pointer'}}
                                            onClick={e=>e.stopPropagation()}>
                                            {f.homeLogo
                                                ?<img src={f.homeLogo} style={{width:'100%',height:'100%',objectFit:'cover'}}/>

                                            }
                                            <input type="file" accept="image/*" style={{position:'absolute',inset:0,opacity:0,cursor:'pointer'}}
                                                onChange={async e=>{
                                                    const file=e.target.files[0]; if(!file) return;
                                                    const c=await compressImage(file);
                                                    setFolders(prev=>prev.map(x=>x.id!==f.id?x:{...x,homeLogo:c}));
                                                    showToast('Logo guardado');
                                                }}/>
                                        </div>
                                        <div>
                                            <div style={{fontFamily:'Barlow Condensed',fontSize:22,letterSpacing:2}}>{f.name}</div>
                                            <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',color:'var(--accent)',letterSpacing:2,marginTop:2}}>{f.games.length} Jogo{f.games.length!==1?'s':''}</div>
                                        </div>
                                    </div>
                                    <button className="icon-btn" style={{background:'rgba(244,67,54,0.08)',borderColor:'rgba(244,67,54,0.2)',color:'var(--red)'}}
                                        onClick={e=>{e.stopPropagation();if(confirm('Apagar pasta e todos os jogos?')){setFolders(prev=>prev.filter(x=>x.id!==f.id));showToast('Eliminada');}}}>✕</button>
                                </div>
                                {s&&(
                                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
                                        {[{val:s.golos,label:'Golos',c:'var(--green)'},{val:s.sofr,label:'Sofridos',c:'var(--red)'},{val:`${s.ef}%`,label:'Eficácia',c:'var(--accent)'}].map(x=>(
                                            <div key={x.label} style={{textAlign:'center',padding:'10px 6px',background:'var(--bg)',borderRadius:10,border:'1px solid var(--border)'}}>
                                                <div style={{fontFamily:'Barlow Condensed',fontSize:24,color:x.c,lineHeight:1}}>{x.val}</div>
                                                <div style={{fontSize:8,fontWeight:700,textTransform:'uppercase',color:'var(--muted)',marginTop:2,letterSpacing:1}}>{x.label}</div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        );
                    })}
                </div>

                {/* Storage info */}
                <div style={{marginTop:24,padding:'12px 14px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:14,display:'flex',alignItems:'center',gap:12}}>
                    <div style={{width:8,height:8,borderRadius:'50%',background:'var(--green)',flexShrink:0,boxShadow:'0 0 6px var(--green)'}}/>
                    <div style={{flex:1}}>
                        <div style={{fontSize:11,fontWeight:700,color:'var(--text)'}}>Dados guardados automaticamente</div>
                        <div style={{fontSize:10,color:'var(--muted)',marginTop:2}}>localStorage + IndexedDB · Backup a cada 15 min</div>
                    </div>
                    <button className="btn-ghost" style={{fontSize:10,padding:'6px 12px',flexShrink:0}} onClick={handleExport}>
                        Backup
                    </button>
                </div>
            </div>
        </div>
    );
    const renderGames=()=>{
        if(!currentFolder) return <div className="empty"><div className="empty-text">Seleciona uma pasta</div></div>;
        const sumGF=filteredGames.reduce((s,g)=>s+(g.stats.find(x=>x.name==='Golo')?.count||0),0);
        const sumGA=filteredGames.reduce((s,g)=>s+(g.stats.find(x=>x.name==='Golo Sofr.')?.count||0),0);
        return(
            <div className="screen slide-in no-scrollbar" style={{paddingBottom:'calc(16px + env(safe-area-inset-bottom,0px))'}}>
                <div className="page-header">
                    <div>
                        <div className="page-title" style={{color:'var(--accent)'}}>{currentFolder.name}</div>
                        <div style={{fontSize:10,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:2,marginTop:2}}>{currentFolder.games.length} Jogos</div>
                    </div>
                    <div style={{display:'flex',gap:8,alignItems:'center'}}>
                        <button className="icon-btn" style={{background:hasActiveFilter?'rgba(255,87,34,0.2)':'var(--surface)',borderColor:hasActiveFilter?'var(--accent)':'var(--border)',color:hasActiveFilter?'var(--accent)':'var(--muted)',width:40,height:40,fontSize:17}}
                            onClick={()=>setShowFilter(true)}>⚙</button>
                    </div>
                </div>
                <div style={{padding:'12px 16px 0'}}>
                    <div style={{display:'flex',gap:8,marginBottom:14}}>
                        <input type="text" placeholder="🔍  Pesquisar adversário..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)}
                            style={{flex:1,padding:'11px 14px',fontSize:13,borderRadius:12}}/>
                        <div style={{display:'flex',gap:6}}>
                            {['date','name'].map(s=>(
                                <button key={s} onClick={()=>setSortBy(s)} style={{padding:'0 12px',height:44,borderRadius:12,border:'1px solid var(--border)',background:sortBy===s?'var(--accent)':'var(--surface)',color:'white',fontSize:10,fontWeight:700,textTransform:'uppercase',cursor:'pointer'}}>
                                    {s==='date'?'Data':'A-Z'}
                                </button>
                            ))}
                        </div>
                    </div>
                    <button className="btn-primary" style={{marginBottom:16}} onClick={()=>{

                            // No players — create game directly
                            const tpl=getFolderTemplate(currentFolderId);
                            const ng={id:Date.now(),opponent:o,time:0,stats:statsFromTemplate(tpl),events:[],notes:'',notesHistory:[],pic:null,date:new Date().toLocaleDateString('pt-PT'),squad:[]};
                            setFolders(prev=>prev.map(f=>f.id!==currentFolderId?f:{...f,games:[ng,...f.games]}));
                            setGameAndView(ng.id,'tracking');
                            showToast('Jogo criado');

                    }}>+ Adicionar Jogo</button>

                    {filteredGames.length>0&&(
                        <div className="card" style={{marginBottom:14}}>
                            <div className="section-label">Resumo</div>
                            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,textAlign:'center'}}>
                                {[{val:filteredGames.length,label:'Jogos',c:'var(--accent)'},{val:(sumGF/filteredGames.length).toFixed(2),label:'Méd. Golos',c:'var(--green)'},{val:(sumGA/filteredGames.length).toFixed(2),label:'Méd. Sofr.',c:'var(--red)'}].map(x=>(
                                    <div key={x.label}>
                                        <div style={{fontFamily:'Barlow Condensed',fontSize:22,color:x.c}}>{x.val}</div>

                            const gf=g.stats.find(s=>s.name==='Golo')?.count||0;
                            const ga=g.stats.find(s=>s.name==='Golo Sofr.')?.count||0;

                                        <div className="game-opponent">{g.opponent}</div>
                                        <div className="game-meta">{g.date} · {fmt(g.time)}</div>

                                    <div className="game-score">
                                        <span className="game-score-num" style={{color:'var(--green)'}}>{gf}</span>
                                        <span style={{color:'var(--muted)',fontSize:11,fontWeight:700}}>–</span>
                                        <span className="game-score-num" style={{color:'var(--red)'}}>{ga}</span>
                                    </div>
                                    <div className="game-card-actions" onClick={e=>e.stopPropagation()}>

                                            onClick={e=>openEditModal(g,e)}>✎</button>
                                        <button className="icon-btn" style={{background:'rgba(255,87,34,0.08)',borderColor:'rgba(255,87,34,0.2)',color:'var(--accent)',fontSize:12}}
                                            onClick={()=>{const tpl=getFolderTemplate(currentFolderId);const ng={...g,id:Date.now(),opponent:`${g.opponent} (Cópia)`,time:0,stats:statsFromTemplate(tpl),events:[],notes:'',notesHistory:[],date:new Date().toLocaleDateString('pt-PT')};setFolders(prev=>prev.map(f=>f.id!==currentFolderId?f:{...f,games:[ng,...f.games]}));showToast('Duplicado');}}>C</button>
                                        <button className="icon-btn" style={{background:'rgba(244,67,54,0.08)',borderColor:'rgba(244,67,54,0.2)',color:'var(--red)',fontSize:12}}
                                            onClick={()=>{if(confirm('Eliminar jogo?')){setFolders(prev=>prev.map(f=>f.id!==currentFolderId?f:{...f,games:f.games.filter(x=>x.id!==g.id)}));showToast('Eliminado');}}}>✕</button>
                                    </div>

                        })}
                    </div>
                </div>

                {showFilter&&(
                    <div className="filter-overlay" onClick={()=>setShowFilter(false)}>

                            <div style={{display:'flex',flexDirection:'column',gap:12}}>
                                <div>
                                    <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',color:'var(--muted)',letterSpacing:1,marginBottom:6}}>Data</div>
                                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                                        <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} style={{padding:'10px 12px'}}/>
                                        <input type="date" value={dateTo}   onChange={e=>setDateTo(e.target.value)}   style={{padding:'10px 12px'}}/>

                                    <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',color:'var(--muted)',letterSpacing:1,marginBottom:6}}>Mínimo de Golos</div>
                                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                                        <input type="number" min="0" placeholder="Marcados" value={minGF} onChange={e=>setMinGF(e.target.value)} style={{padding:'10px 12px'}}/>
                                        <input type="number" min="0" placeholder="Sofridos"  value={minGA} onChange={e=>setMinGA(e.target.value)} style={{padding:'10px 12px'}}/>

                                </div>
                                <div style={{display:'flex',gap:8,marginTop:4}}>
                                    <button onClick={()=>{setDateFrom('');setDateTo('');setMinGF('');setMinGA('');}} className="btn-ghost" style={{flex:1}}>Limpar</button>
                                    <button onClick={()=>setShowFilter(false)} className="btn-save" style={{flex:1}}>Aplicar</button>
                                </div>
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );
    };

    /* ════════════════════════════════════
       VIEW: TRACKING
    ════════════════════════════════════ */
    const renderTracking=()=>{
        if(!currentGame) return(
            <div className="screen">
                <div className="empty" style={{height:'100%'}}>
                    <div className="empty-icon">⚽</div>
                    <div className="empty-text">Seleciona um jogo para começar</div>
                    <button className="btn-ghost" onClick={()=>setView('games')}>Ir para Jogos</button>
                </div>
            </div>
        );
        const period=getPeriodInfo(currentGame.time);
        const gf=currentGame.stats.find(s=>s.name==='Golo')?.count||0;
        const ga=currentGame.stats.find(s=>s.name==='Golo Sofr.')?.count||0;
        const scoreColor=gf>ga?'var(--green)':gf<ga?'var(--red)':'var(--muted)';
        return(
            <div className="screen" style={{display:'flex',flexDirection:'column',overflow:'hidden'}}>
                {/* Header */}
                <div className="track-header">
                    <div className="timer-pill">
                        <span className="timer-digits">{fmt(currentGame.time)}</span>
                        <span className="period-badge" style={{color:period.color,background:`${period.color}22`}}>{period.label}</span>
                    </div>
                    <div className="score-pill" style={{borderColor:`${scoreColor}44`}}>
                        <span className="score-num" style={{color:'var(--green)'}}>{gf}</span>
                        <span style={{fontFamily:'JetBrains Mono',fontSize:11,color:'var(--muted)',fontWeight:700}}>–</span>
                        <span className="score-num" style={{color:'var(--red)'}}>{ga}</span>
                    </div>
                    <div className="header-actions">
                        <button className="hbtn hbtn-sq" title="Desfazer último" onClick={undoLast}
                            style={{fontSize:17}}>↩</button>
                        <button className="hbtn hbtn-sq" title="Notas"
                            style={{background:currentGame.notes?'rgba(255,87,34,0.25)':'var(--bg)',borderColor:currentGame.notes?'var(--accent)':'var(--border)',fontSize:17}}
                            onClick={()=>setShowNotes(p=>!p)}>📝</button>
                        <button className="hbtn hbtn-rect" style={{color:'var(--muted)',fontSize:12}} onClick={()=>adjustTime(-10)}>-10s</button>
                        <button className="hbtn hbtn-rect" style={{color:'var(--muted)',fontSize:12}} onClick={()=>adjustTime(60)}>+1m</button>
                        <button className="hbtn hbtn-start" onClick={()=>setIsActive(p=>{const n=!p;if(!n)showToast('⏸ Pausado');return n;})}
                            style={{background:isActive?'var(--red)':'var(--green)',color:'white',minWidth:70}}>
                            {isActive?'STOP':'START'}
                        </button>
                    </div>
                </div>

                {/* Notes panel */}
                {showNotes&&(
                    <div className="notes-panel">
                        <textarea value={currentGame.notes} onChange={e=>updateGame({notes:e.target.value})}
                            placeholder="Observações sobre o jogo..."/>
                        <div className="notes-footer">
                            <button className="btn-save" onClick={()=>{
                                if(!currentGame.notes?.trim()){showToast('Nota vazia');return;}
                                const label=`${fmt(currentGame.time)} · ${new Date().toLocaleDateString('pt-PT')}`;
                                updateGame(g=>({...g,notesHistory:[...(g.notesHistory||[]),{label,text:g.notes.trim()}]}));
                                showToast('✅ Nota guardada');
                            }}>Guardar</button>
                        </div>
                    </div>
                )}

                {/* Tabs */}
                <div className="track-tabs">
                    {[{id:'stats',label:'⚡ Stats'},{id:'pitch',label:'🗺 Mapa'},{id:'squad',label:'👤 Plantel'}].map(t=>(
                        <button key={t.id} className={`track-tab${trackTab===t.id?' active':''}`} onClick={()=>setTrackTab(t.id)}>{t.label}</button>
                    ))}
                </div>

                {/* Stats columns */}
                {trackTab==='stats'&&(
                <div className="track-cols">
                    {['ataque','defesa'].map(type=>(
                        <div key={type} className="track-col">
                            <div className="col-header">
                                <span className="col-title" style={{color:type==='ataque'?'var(--accent)':'var(--red)'}}>{type.toUpperCase()}</span>
                                <button className="col-add-btn" onClick={()=>addCustomStat(type)} title={`Nova ação de ${type}`}>+</button>
                            </div>
                            <div className="stats-scroll no-scrollbar">
                                {currentGame.stats.filter(s=>s.type===type).map(s=>{
                                    const isGoalStat=s.name.toLowerCase().includes('golo')&&type==='ataque';
                                    const hasCount=s.count>0;
                                    const activeClass=hasCount?(isGoalStat?'goal-active':type==='ataque'?'atk-active':'def-active'):'';
                                    return(
                                        <div key={s.id} className="stat-row">
                                            <button className={`stat-main ${activeClass}`}
                                                onPointerDown={e=>e.currentTarget.style.transform='scale(0.96)'}
                                                onPointerUp={e=>{e.currentTarget.style.transform='';addStat(s.id);}}
                                                onPointerLeave={e=>e.currentTarget.style.transform=''}>
                                                <span className={`stat-count${hasCount?'':' zero'}`} style={{color:hasCount?(isGoalStat?'var(--gold)':type==='ataque'?'var(--accent)':'var(--red)'):''}}>
                                                    {s.count}
                                                </span>
                                                <span className="stat-name">{s.name}</span>
                                                {isActive&&<span style={{fontSize:9,color:'var(--muted)',opacity:0.6,flexShrink:0}}>+</span>}
                                            </button>
                                            <div className="stat-actions">
                                                <button className="stat-side-btn sbtn-minus" onClick={()=>removeStat(s.id)}>−</button>
                                                <button className="stat-side-btn sbtn-edit" onClick={()=>renameStat(s.id,s.name)}>E</button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    ))}
                </div>
                )}

                {/* Pitch tab */}
                {trackTab==='pitch'&&(
                <div style={{flex:1,overflowY:'auto',padding:12}} className="no-scrollbar">
                    <div style={{marginBottom:8,fontSize:11,color:'var(--muted)',fontWeight:700,textTransform:'uppercase',letterSpacing:1}}>
                        {isActive?'Toca no campo para registar posição do próximo evento':'Inicia o cronómetro para registar'}
                    </div>
                    <PitchMap
                        events={currentGame.events}
                        interactive={isActive}
                        onTap={(x,y)=>{
                            // Store pending pitch click, then show stat selector
                            setPendingPitch({x,y});
                            showToast('Posição marcada — regista o evento');
                        }}
                    />
                    {pendingPitch&&(
                        <div style={{marginTop:10,padding:'10px 14px',background:'rgba(255,87,34,0.12)',border:'1px solid rgba(255,87,34,0.3)',borderRadius:12,fontSize:12,color:'var(--accent)',fontWeight:700}}>
                            📍 Posição pendente — clica num stat para associar
                            <button onClick={()=>setPendingPitch(null)} style={{marginLeft:10,background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:13}}>✕</button>
                        </div>
                    )}
                    <div style={{marginTop:12,fontSize:10,color:'var(--muted)',fontWeight:700,textTransform:'uppercase',letterSpacing:1}}>
                        Eventos com posição: {currentGame.events.filter(e=>e.x!=null).length} / {currentGame.events.length}
                    </div>
                </div>
                )}

                {/* Squad tab */}
                {trackTab==='squad'&&(
                <div style={{flex:1,overflowY:'auto',padding:12}} className="no-scrollbar">
                    {currentGame?.squad?.length>0?(
                        <>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                            <div style={{fontSize:11,color:'var(--muted)',fontWeight:700,textTransform:'uppercase',letterSpacing:1}}>
                                {currentGame.squad.length} convocadas
                            </div>
                            <button className="btn-ghost" style={{fontSize:10,padding:'6px 12px'}}
                                onClick={()=>{setConvocOpponent(currentGame.opponent);setConvocSelected(currentGame.squad||[]);setConvocView({gameId:currentGame.id,folderId:currentFolderId,editMode:true});}}>
                                Editar
                            </button>
                        </div>
                        <div style={{display:'flex',flexDirection:'column',gap:6}}>
                            {getGamePlayers(currentGame,currentFolderId).map(p=>{
                                const evCount=currentGame.events.filter(e=>e.playerId===p.id).length;
                                return(
                                    <div key={p.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12}}>
                                        <div className="player-num">#{p.number||'?'}</div>
                                        <div style={{flex:1}}>
                                            <div style={{fontWeight:700,fontSize:13}}>{p.name}</div>
                                        </div>
                                        {evCount>0&&<span style={{fontFamily:'JetBrains Mono',fontSize:11,color:'var(--accent)',fontWeight:700}}>{evCount}</span>}
                                    </div>
                                );
                            })}
                        </div>
                        </>
                    ):(
                        <div className="empty" style={{paddingTop:40}}>
                            <div className="empty-icon">👥</div>
                            <div className="empty-text">Sem convocatória</div>
                            {globalPlayers.length>0?(
                                <button className="btn-ghost" onClick={()=>{setConvocOpponent(currentGame?.opponent||'');setConvocSelected([]);setConvocView({gameId:currentGame?.id,folderId:currentFolderId,editMode:true});}}>
                                    Definir convocatória
                                </button>
                            ):(
                                <button className="btn-ghost" onClick={()=>setView('squad')}>Gerir Plantel</button>
                            )}
                        </div>
                    )}
                </div>
                )}
            </div>
        );
    };

    /* ════════════════════════════════════
       VIEW: REPORT
    ════════════════════════════════════ */
    const renderReport=()=>{
        if(!currentGame) return(
            <div className="screen">
                <div className="empty" style={{height:'100%'}}>
                    <div className="empty-icon">📊</div>
                    <div className="empty-text">Seleciona um jogo para ver o relatório</div>
                    <button className="btn-ghost" onClick={()=>setView('games')}>Ir para Jogos</button>
                </div>
            </div>
        );
        const g=currentGame;
        const golos=g.stats.find(s=>s.name==='Golo')?.count||0;
        const sofr=g.stats.find(s=>s.name==='Golo Sofr.')?.count||0;
        const remates=g.stats.find(s=>s.name==='Remate')?.count||0;
        const ef=remates>0?((golos/remates)*100).toFixed(1):0;
        const totalAtk=g.stats.filter(s=>s.type==='ataque').reduce((a,s)=>a+s.count,0);
        const totalDef=g.stats.filter(s=>s.type==='defesa').reduce((a,s)=>a+s.count,0);
        const filtEv=eventFilter==='all'?g.events:eventFilter==='golos'?g.events.filter(e=>e.isGoal):g.events.filter(e=>e.type===eventFilter);
        const atkC=['var(--accent)','var(--accent-dim)','#26C6DA','var(--accent-dim)','var(--accent-dim)','var(--accent2)'];
        const defC=['var(--red)','#d90429','#e63946','#c1121f','#ff595e','#ff6b6b'];
        return(
            <div className="screen no-scrollbar" style={{paddingBottom:'calc(16px + env(safe-area-inset-bottom,0px))'}}>
                <div className="page-header">
                    <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:9,fontWeight:700,textTransform:'uppercase',color:'var(--muted)',letterSpacing:3,marginBottom:3}}>Relatório</div>
                        <div style={{fontFamily:'Barlow Condensed',fontSize:26,letterSpacing:2,color:'var(--accent)',lineHeight:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{g.opponent}</div>
                        <div style={{fontFamily:'JetBrains Mono',fontSize:9,color:'var(--muted)',marginTop:2}}>{g.date} · {fmt(g.time)}</div>
                    </div>
                    <div style={{display:'flex',gap:8,flexShrink:0}}>
                        <select value={eventFilter} onChange={e=>setEventFilter(e.target.value)}
                            style={{padding:'8px 10px',fontSize:11,fontWeight:700,cursor:'pointer',borderRadius:10}}>
                            <option value="all">Todos</option>
                            <option value="golos">Golos</option>
                            <option value="ataque">Ataque</option>
                            <option value="defesa">Defesa</option>
                        </select>
                        <button onClick={()=>setShowShare(true)} style={{padding:'8px 16px',borderRadius:10,background:'linear-gradient(135deg,var(--accent),var(--accent2))',color:'white',fontFamily:'Barlow Condensed',fontSize:15,letterSpacing:2,cursor:'pointer',border:'none',fontWeight:700,boxShadow:'0 4px 16px rgba(255,87,34,0.35)'}}>
                            ↗ PARTILHAR
                        </button>
                    </div>
                </div>

                <div style={{padding:'16px'}}>
                    {/* KPIs */}
                    <div className="report-kpis">
                        {[{val:golos,label:'Golos',c:'var(--green)',sub:'marcados'},{val:sofr,label:'Sofr.',c:'var(--red)',sub:'sofridos'},{val:remates,label:'Remates',c:'var(--accent)',sub:'total'},{val:`${ef}%`,label:'Eficácia',c:'var(--gold)',sub:'golo/remate'}].map(k=>(
                            <div key={k.label} className="kpi-card">
                                <div className="kpi-val" style={{color:k.c}}>{k.val}</div>
                                <div className="kpi-label">{k.label}</div>
                                <div className="kpi-sub">{k.sub}</div>
                            </div>
                        ))}
                    </div>

                    {/* ── VÍDEO DO JOGO ── */}
                    <div className="card" style={{marginBottom:14}}>
                        <div className="section-label">Vídeo do Jogo</div>
                        {g.videoUrl ? (
                            <div>
                                <div style={{marginBottom:10,display:'flex',alignItems:'center',gap:10}}>
                                    <div className="clip-thumb" style={{width:56,height:42}}>
                                        <ClipThumb url={g.videoUrl}/>
                                    </div>
                                    <div style={{flex:1,minWidth:0}}>
                                        <div style={{fontSize:11,fontWeight:700,color:'var(--text2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{g.videoUrl}</div>
                                        <div style={{fontSize:10,color:'var(--muted)',marginTop:2}}>{parseVideoUrl(g.videoUrl)?.type||'vídeo'}</div>
                                    </div>
                                </div>
                                <div style={{display:'flex',gap:8}}>
                                    <button className="btn-save" style={{flex:2}} onClick={()=>setVideoModal({url:g.videoUrl,title:g.opponent})}>
                                        ▶ Ver Vídeo
                                    </button>
                                    <button className="btn-ghost" style={{flex:1}} onClick={()=>openClipModal('game')}>Editar</button>
                                    <button className="btn-ghost" style={{flex:1,color:'var(--red)',borderColor:'rgba(244,67,54,0.3)'}} onClick={()=>updateGame(g=>({...g,videoUrl:''}))}>✕</button>
                                </div>
                            </div>
                        ) : (
                            <button className="clip-add-btn" onClick={()=>openClipModal('game')}>
                                <span style={{fontSize:20}}>🎬</span>
                                Adicionar vídeo do jogo (URL ou ficheiro)
                            </button>
                        )}
                    </div>

                    {/* ── PLAYLIST POR CATEGORIA ── */}
                    {g.events.filter(e=>e.clipUrl).length>0&&(
                    <div style={{marginBottom:14}}>
                        <div className="section-label">Clips por Categoria</div>
                        {['Golo','Remate','Rem. Enquad.','Rem. Area','Golo Sofr.','Recuper.','Faltas'].map(cat=>{
                            const clips=g.events.map((e,i)=>({...e,idx:i})).filter(e=>e.name===cat&&e.clipUrl);
                            if(!clips.length) return null;
                            return(
                                <div key={cat} className="playlist-section">
                                    <div className="playlist-header">
                                        <div style={{display:'flex',alignItems:'center',gap:8}}>
                                            <div style={{width:8,height:8,borderRadius:2,background:cat.toLowerCase().includes('golo')&&!cat.includes('Sofr.')?'var(--gold)':cat.includes('Sofr.')||cat==='Faltas'?'var(--red)':'var(--accent)'}}/>
                                            <span style={{fontFamily:'Barlow Condensed',fontSize:14,fontWeight:800,textTransform:'uppercase',letterSpacing:2}}>{cat}</span>
                                        </div>
                                        <span style={{fontFamily:'JetBrains Mono',fontSize:11,color:'var(--muted)'}}>{clips.length} clip{clips.length!==1?'s':''}</span>
                                    </div>
                                    <div style={{padding:'8px'}}>
                                        {clips.map((e,ci)=>(
                                            <div key={ci} className="clip-card has-clip" style={{marginBottom:ci<clips.length-1?6:0}}
                                                onClick={()=>setVideoModal({url:e.clipUrl,title:`${fmtMin(e.time)} ${e.name}${e.playerName?` · ${e.playerName}`:''}` })}>
                                                <div className="clip-thumb"><ClipThumb url={e.clipUrl}/></div>
                                                <div style={{flex:1,minWidth:0}}>
                                                    <div style={{fontFamily:'JetBrains Mono',fontSize:10,color:'var(--muted)'}}>{fmtMin(e.time)}</div>
                                                    <div style={{fontSize:12,fontWeight:700,textTransform:'uppercase'}}>{e.name}{e.playerName&&<span style={{color:'var(--accent)',fontWeight:600,marginLeft:5}}>· {e.playerName}</span>}</div>
                                                </div>
                                                <div style={{color:'var(--accent)',fontSize:18,flexShrink:0}}>▶</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                    )}

                    {/* Ataque / Defesa */}
                    <div className="card" style={{marginBottom:14}}>
                        <div className="section-label">Distribuição Ataque / Defesa</div>
                        <StackedBar left={totalAtk} right={totalDef} lColor="var(--accent)" rColor="var(--red)" lLabel={`Ataque (${totalAtk})`} rLabel={`Defesa (${totalDef})`}/>
                    </div>

                    {/* Radar + Donuts */}
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
                        <div className="card">
                            <div className="section-label">Radar</div>
                            <Radar stats={g.stats} size={180}/>
                        </div>
                        <div className="card">
                            <div className="section-label">Indicadores</div>
                            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,paddingTop:4}}>
                                <Donut value={golos} max={Math.max(remates,1)} color="var(--green)" label="Conversão" sublabel="Golos" size={72}/>
                                <Donut value={g.stats.find(s=>s.name==='Rem. Enquad.')?.count||0} max={Math.max(remates,1)} color="var(--accent)" label="Enquadram." sublabel="Remates" size={72}/>
                                <Donut value={g.stats.find(s=>s.name==='Recuper.')?.count||0} max={Math.max(totalDef,1)} color="var(--gold)" label="Recuper." sublabel="de Bola" size={72}/>
                                <Donut value={sofr} max={Math.max(g.stats.find(s=>s.name==='Rem. Conc.')?.count||1,sofr)} color="var(--red)" label="Sofr./Conc." sublabel="Golos" size={72}/>
                            </div>
                        </div>
                    </div>

                    {/* Intensity */}
                    <div className="card" style={{marginBottom:14}}>
                        <div className="section-label">Intensidade por Minuto</div>
                        <IntensityChart events={filtEv} totalTime={g.time}/>
                    </div>

                    {/* Pitch heatmap */}
                    {filtEv.filter(e=>e.x!=null).length>0&&(
                    <div className="card" style={{marginBottom:14}}>
                        <div className="section-label">Mapa Tático</div>
                        <PitchMap events={filtEv} filterType={eventFilter}/>
                    </div>
                    )}

                    {/* Player stats */}
                    {(currentFolder?.players||[]).length>0&&(
                    <div className="card" style={{marginBottom:14}}>
                        <div className="section-label">Estatísticas por Jogador</div>
                        <PlayerStatsTable events={g.events} players={currentFolder.players}/>
                    </div>
                    )}

                    {/* Bars */}
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
                        <div className="card">
                            <div className="section-label" style={{color:'var(--accent)'}}>Ataque</div>
                            <BarChart data={g.stats.filter(s=>s.type==='ataque').map(s=>({label:s.name,value:s.count}))} colorFn={(_,i)=>atkC[i%atkC.length]}/>
                        </div>
                        <div className="card">
                            <div className="section-label" style={{color:'var(--red)'}}>Defesa</div>
                            <BarChart data={g.stats.filter(s=>s.type==='defesa').map(s=>({label:s.name,value:s.count}))} colorFn={(_,i)=>defC[i%defC.length]}/>
                        </div>
                    </div>

                    {/* Timeline */}
                    <div className="card" style={{marginBottom:14}}>
                        <div className="section-label">Cronologia</div>
                        <Timeline events={filtEv} totalTime={g.time}/>
                        {filtEv.filter(e=>e.isGoal).length>0&&(
                            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:12}}>
                                {filtEv.filter(e=>e.isGoal).map((e,i)=>(
                                    <div key={i} style={{padding:'5px 10px',background:'rgba(255,214,0,0.1)',border:'1px solid rgba(255,214,0,0.3)',borderRadius:8,fontFamily:'JetBrains Mono',fontSize:10,color:'var(--gold)'}}>
                                        ⚽ {fmtMin(e.time)}
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Events list — com suporte a clips */}
                    {filtEv.length>0&&(
                        <div className="card" style={{marginBottom:14}}>
                            <div className="section-label" style={{marginBottom:12}}>
                                Eventos ({filtEv.length})
                                <span style={{marginLeft:'auto',fontSize:9,color:'var(--muted)',fontWeight:600}}>
                                    {filtEv.filter(e=>e.clipUrl).length} com clip
                                </span>
                            </div>
                            <div style={{display:'flex',flexDirection:'column',gap:6}}>
                                {filtEv.map((e,i)=>{
                                    // find real index in g.events for clip ops
                                    const realIdx=g.events.findIndex((ge,gi)=>ge===e||(ge.time===e.time&&ge.statId===e.statId&&ge.name===e.name&&!g.events.slice(0,gi).find(x=>x.time===e.time&&x.statId===e.statId&&x.name===e.name)));
                                    return(
                                        <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',background:'var(--bg)',borderRadius:8,border:`1px solid ${e.isGoal?'rgba(255,214,0,0.25)':e.type==='ataque'?'rgba(255,87,34,0.15)':'rgba(244,67,54,0.15)'}`}}>
                                            <div style={{width:6,height:6,borderRadius:2,flexShrink:0,background:e.isGoal?'var(--gold)':e.type==='ataque'?'var(--accent)':'var(--red)'}}/>
                                            <div style={{flex:1,minWidth:0}}>
                                                <div style={{display:'flex',alignItems:'center',gap:6}}>
                                                    <span style={{fontFamily:'JetBrains Mono',fontSize:10,color:'var(--muted)',flexShrink:0}}>{fmtMin(e.time)}</span>
                                                    <span style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.04em',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.name}</span>
                                                    {e.playerName&&<span style={{fontSize:10,color:'var(--accent)',flexShrink:0}}>· {e.playerName}</span>}
                                                </div>
                                            </div>
                                            {/* Clip button */}
                                            {e.clipUrl ? (
                                                <div style={{display:'flex',gap:4}}>
                                                    <button onClick={()=>setVideoModal({url:e.clipUrl,title:`${fmtMin(e.time)} ${e.name}`})}
                                                        style={{background:'rgba(255,87,34,0.15)',border:'1px solid rgba(255,87,34,0.3)',borderRadius:6,color:'var(--accent)',width:32,height:32,fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0}}>▶</button>
                                                    <button onClick={()=>openClipModal('event',realIdx)}
                                                        style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:6,color:'var(--muted)',width:32,height:32,fontSize:11,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0}}>✎</button>
                                                </div>
                                            ) : (
                                                <button onClick={()=>openClipModal('event',realIdx)}
                                                    style={{background:'var(--surface2)',border:'1px dashed var(--border2)',borderRadius:6,color:'var(--muted)',width:32,height:32,fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0}}>+</button>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {/* Notes */}
                    {(g.notes||(g.notesHistory||[]).length>0)&&(
                        <div className="card" style={{marginBottom:14}}>
                            <div className="section-label">Notas</div>
                            {g.notes&&<p style={{fontSize:12,color:'var(--text)',fontStyle:'italic',lineHeight:1.6,marginBottom:12}}>"{g.notes}"</p>}
                            {(g.notesHistory||[]).map((n,i)=>(
                                <div key={i} style={{marginBottom:10,paddingLeft:12,borderLeft:'2px solid var(--border)'}}>
                                    <div style={{fontSize:9,fontWeight:700,textTransform:'uppercase',color:'var(--muted)',letterSpacing:1,marginBottom:4}}>{n.label}</div>
                                    <div style={{fontSize:11,color:'var(--text)',fontStyle:'italic'}}>"{n.text}"</div>
                                </div>
                            ))}
                        </div>
                    )}

                    <div style={{textAlign:'center',fontSize:9,color:'var(--muted)',fontWeight:700,textTransform:'uppercase',letterSpacing:3,padding:'12px 0'}}>
                        SoccerAnalyst Pro · {new Date().toLocaleDateString('pt-PT')}
                    </div>
                </div>
            </div>
        );
    };

    /* ════════════════════════════════════
       VIEW: SQUAD GLOBAL
    ════════════════════════════════════ */
    const renderSquad=()=>(
        <div className="screen slide-in no-scrollbar" style={{paddingBottom:'calc(24px + env(safe-area-inset-bottom,0px))'}}>
            <div className="page-header">
                <div>
                    <div className="page-title">👥 Plantel</div>
                    <div style={{fontSize:10,color:'var(--muted)',fontWeight:700,textTransform:'uppercase',letterSpacing:2,marginTop:2}}>
                        {globalPlayers.length} atleta{globalPlayers.length!==1?'s':''}
                    </div>
                </div>
                <button className="btn-ghost" onClick={()=>{
                    const name=promptText('Nome da atleta:');
                    if(!name) return;
                    const num=promptText('Número (opcional):','');
                    const np={id:Date.now(),name:name.trim(),number:(num||'').trim()};
                    setGlobalPlayers(prev=>[...prev,np].sort((a,b)=>{
                        const na=Number(a.number)||999,nb=Number(b.number)||999;
                        return na-nb||a.name.localeCompare(b.name);
                    }));
                    showToast(`${name} adicionada`);
                }}>+ Adicionar</button>
            </div>

            <div style={{padding:'16px'}}>
                {globalPlayers.length===0&&(
                    <div className="empty" style={{paddingTop:60}}>
                        <div className="empty-icon">👥</div>
                        <div className="empty-text">Plantel vazio</div>
                        <div style={{fontSize:12,color:'var(--muted)',textAlign:'center',lineHeight:1.6,maxWidth:260}}>
