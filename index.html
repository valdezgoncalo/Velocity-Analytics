                        <div style={{fontWeight:700,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</div>
                        <div style={{fontSize:10,color:'var(--muted)'}}>{p.position||'—'}</div>
                    </div>
                    <div style={{display:'flex',gap:10,flexShrink:0}}>
                        {p.goals>0&&<div style={{textAlign:'center'}}>
                            <div style={{fontFamily:'Bebas Neue',fontSize:18,color:'var(--gold)',lineHeight:1}}>{p.goals}</div>
                            <div style={{fontSize:8,color:'var(--muted)',fontWeight:700}}>GOLOS</div>
                        </div>}
                        {p.shots>0&&<div style={{textAlign:'center'}}>
                            <div style={{fontFamily:'Bebas Neue',fontSize:18,color:'var(--accent)',lineHeight:1}}>{p.shots}</div>
                            <div style={{fontSize:8,color:'var(--muted)',fontWeight:700}}>REM.</div>
                        </div>}
                        <div style={{textAlign:'center'}}>
                            <div style={{fontFamily:'Bebas Neue',fontSize:18,color:'var(--text)',lineHeight:1}}>{p.total}</div>
                            <div style={{fontSize:8,color:'var(--muted)',fontWeight:700}}>AÇÕES</div>
                        </div>
                    </div>
                </div>
            ))}
        </div>
    );
}

/* ═══════════════ APP ═══════════════════ */
function App() {
    const [view,            setView]            = useState('folders');
    const [folders,         setFolders]         = useState(loadDB);
    const [currentFolderId, setCurrentFolderId] = useState(null);
    const [currentGameId,   setCurrentGameId]   = useState(null);
    const [isActive,        setIsActive]        = useState(false);
    const [showNotes,       setShowNotes]       = useState(false);
    const [toast,           setToast]           = useState(null);
    const [searchTerm,      setSearchTerm]      = useState('');
    const [sortBy,          setSortBy]          = useState('date');
    const [showFilter,      setShowFilter]      = useState(false);
    const [dateFrom,        setDateFrom]        = useState('');
    const [dateTo,          setDateTo]          = useState('');
    const [minGF,           setMinGF]           = useState('');
    const [minGA,           setMinGA]           = useState('');
    const [eventFilter,     setEventFilter]     = useState('all');
    const [showShare,    setShowShare]    = useState(false);
    const [pdfProgress,  setPdfProgress]  = useState(null);
    const [trackTab,     setTrackTab]     = useState('stats');   // 'stats' | 'pitch' | 'squad'
    const [playerPicker, setPlayerPicker] = useState(null);      // { statId } | null
    const [pendingPitch, setPendingPitch] = useState(null);      // { statId, x, y } | null
    const [editModal,    setEditModal]    = useState(null);      // { gameId } | null
    const [editOpponent, setEditOpponent] = useState('');
    const [editDate,     setEditDate]     = useState('');
    const importRef = useRef(null);

    const currentFolder = currentFolderId ? folders.find(f=>f.id===currentFolderId)||null : null;
    const currentGame   = (currentGameId && currentFolder)
        ? (currentFolder.games||[]).find(g=>g.id===currentGameId)||null : null;

    useEffect(()=>{ saveDB(folders); },[folders]);

    useEffect(()=>{
        if(!isActive||!currentGameId) return;
        const iv=setInterval(()=>{
            setFolders(prev=>prev.map(f=>{
                if(f.id!==currentFolderId) return f;
                return{...f,games:f.games.map(g=>g.id!==currentGameId?g:{...g,time:g.time+1})};
            }));
        },1000);
        return ()=>clearInterval(iv);
    },[isActive,currentGameId,currentFolderId]);

    useEffect(()=>{
        const h=e=>{
            if(view==='tracking'&&e.code==='Space'&&!e.target.matches('textarea,input')){
                e.preventDefault();setIsActive(p=>!p);
            }
        };
        window.addEventListener('keydown',h);
        return ()=>window.removeEventListener('keydown',h);
    },[view]);

    const showToast = useCallback((msg,goal=false)=>setToast({msg,goal}),[]);

    const updateGame = useCallback(updater=>{
        setFolders(prev=>prev.map(f=>{
            if(f.id!==currentFolderId) return f;
            return{...f,games:f.games.map(g=>g.id!==currentGameId?g:(typeof updater==='function'?updater(g):{...g,...updater}))};
        }));
    },[currentFolderId,currentGameId]);

    const getFolderTemplate = useCallback(fid=>{
        const f=folders.find(x=>x.id===fid);
        return f?.statTemplate||DEFAULT_TEMPLATE.map(s=>({...s}));
    },[folders]);

    const syncStatToFolder = useCallback((fid,newStat)=>{
        setFolders(prev=>prev.map(f=>{
            if(f.id!==fid) return f;
            const tpl=f.statTemplate||DEFAULT_TEMPLATE.map(s=>({...s}));
            const idx=tpl.findIndex(t=>t.id===newStat.id);
            const newTpl=idx>=0?tpl.map(t=>t.id===newStat.id?{...t,...newStat}:t):[...tpl,{id:newStat.id,name:newStat.name,type:newStat.type}];
            const updGames=f.games.map(g=>{
                if(g.stats.find(s=>s.id===newStat.id)) return g;
                return{...g,stats:[...g.stats,{id:newStat.id,name:newStat.name,type:newStat.type,count:0}]};
            });
            return{...f,statTemplate:newTpl,games:updGames};
        }));
    },[]);

    const renameStatAcrossFolder = useCallback((fid,statId,newName)=>{
        setFolders(prev=>prev.map(f=>{
            if(f.id!==fid) return f;
            const tpl=(f.statTemplate||DEFAULT_TEMPLATE.map(s=>({...s}))).map(t=>t.id===statId?{...t,name:newName}:t);
            const games=f.games.map(g=>({...g,stats:g.stats.map(s=>s.id===statId?{...s,name:newName}:s)}));
            return{...f,statTemplate:tpl,games};
        }));
    },[]);

    const getFolderPlayers = useCallback(fid=>{
        const f=folders.find(x=>x.id===fid);
        return f?.players||[];
    },[folders]);

    const addPlayer = useCallback((fid, player)=>{
        setFolders(prev=>prev.map(f=>{
            if(f.id!==fid) return f;
            const players=f.players||[];
            return {...f, players:[...players, player]};
        }));
    },[]);

    const removePlayer = useCallback((fid, playerId)=>{
        setFolders(prev=>prev.map(f=>{
            if(f.id!==fid) return f;
            return {...f, players:(f.players||[]).filter(p=>p.id!==playerId)};
        }));
    },[]);

    const commitStat = useCallback((statId, extra={})=>{
        let statName='', isGoal=false;
        updateGame(g=>{
            const stat=g.stats.find(s=>s.id===statId);
            if(!stat) return g;
            statName=stat.name;
            isGoal=stat.name.toLowerCase().includes('golo')&&stat.type==='ataque';
            return {
                ...g,
                stats:g.stats.map(s=>s.id===statId?{...s,count:s.count+1}:s),
                events:[...g.events,{time:g.time,type:stat.type,name:stat.name,isGoal,statId,...extra}],
            };
        });
        if(navigator.vibrate) navigator.vibrate(isGoal?[40,30,40]:20);
        if(statName) showToast(isGoal?'⚽ GOLOOO!':statName, isGoal);
    },[updateGame, showToast]);

    const addStat = id=>{
        if(!isActive){showToast('▶ Inicia o cronómetro!');return;}
        const players=getFolderPlayers(currentFolderId);
        if(players.length>0){
            setPlayerPicker({statId:id});
        } else {
            const extra=pendingPitch?{x:pendingPitch.x,y:pendingPitch.y}:{};
            commitStat(id, extra);
            if(pendingPitch) setPendingPitch(null);
        }
    };

    const removeStat = id=>{
        let removed=false;
        updateGame(g=>{
            const stat=g.stats.find(s=>s.id===id);
            if(!stat||stat.count<=0) return g;
            removed=true;
            const events=[...g.events];
            const li=[...events].reverse().findIndex(e=>e.statId===id);
            if(li!==-1) events.splice(events.length-1-li,1);
            return{...g,stats:g.stats.map(s=>s.id===id?{...s,count:s.count-1}:s),events};
        });
        if(removed) showToast('Removido');
    };

    const undoLast=()=>{
        if(!currentGame?.events.length) return;
        removeStat(currentGame.events[currentGame.events.length-1].statId);
    };

    const saveEditGame = ()=>{
        if(!editModal) return;
        const opp=editOpponent.trim();
        const dt=editDate.trim();
        if(!opp){showToast('Nome obrigatório');return;}
        setFolders(prev=>prev.map(f=>{
            if(f.id!==currentFolderId) return f;
            return{...f,games:f.games.map(g=>g.id!==editModal.gameId?g:{...g,opponent:opp,date:dt||g.date})};
        }));
        setEditModal(null);
        showToast('✅ Jogo atualizado');
    };

    const openEditModal = (g,e)=>{
        e.stopPropagation();
        setEditOpponent(g.opponent);
        setEditDate(g.date||'');
        setEditModal({gameId:g.id});
    };

    const adjustTime=delta=>updateGame(g=>({...g,time:Math.max(0,g.time+delta)}));

    const addCustomStat=type=>{
        const n=promptText(`Nome da nova ação (${type}):`);
        if(!n) return;
        const newStat={id:Date.now(),name:n,type,count:0};
        updateGame(g=>({...g,stats:[...g.stats,newStat]}));
        syncStatToFolder(currentFolderId,newStat);
        showToast(`"${n}" adicionado`);
    };

    const renameStat=(statId,currentName)=>{
        const n=promptText('Novo nome:',currentName);
        if(!n||n===currentName) return;
        renameStatAcrossFolder(currentFolderId,statId,n);
        showToast('Renomeado em todos os jogos');
    };

    const compressImage=file=>new Promise(res=>{
        const r=new FileReader();
        r.onload=()=>{
            const img=new Image();
            img.onload=()=>{
                const scale=Math.min(1,512/Math.max(img.width,img.height));
                const c=document.createElement('canvas');
                c.width=Math.round(img.width*scale);c.height=Math.round(img.height*scale);
                c.getContext('2d').drawImage(img,0,0,c.width,c.height);
                res(c.toDataURL('image/jpeg',0.8));
            };
            img.src=r.result;
        };
        r.readAsDataURL(file);
    });

    const exportPDF = async (shareMode=false) => {
        if(!currentGame){showToast('Nenhum jogo carregado');return null;}
        setPdfProgress(10);
        await new Promise(r=>setTimeout(r,50));
        try {
            setPdfProgress(30);
            await new Promise(r=>setTimeout(r,30));
            const doc=buildNativePDF(currentGame, currentFolder?.name||'');
            setPdfProgress(80);
            await new Promise(r=>setTimeout(r,30));
            const filename=`SoccerAnalyst_${currentGame.opponent.replace(/[^a-zA-Z0-9]/g,'_')}_${(currentGame.date||'').replace(/\//g,'-')}.pdf`;
            if(shareMode){
                const blob=doc.output('blob');
                setPdfProgress(100);
                await new Promise(r=>setTimeout(r,200));
                setPdfProgress(null);
                return {blob, filename};
            }
            doc.save(filename);
            setPdfProgress(100);
            await new Promise(r=>setTimeout(r,300));
            setPdfProgress(null);
            showToast('✅ PDF guardado');
            return null;
        } catch(e) {
            console.error(e);
            setPdfProgress(null);
            showToast('Erro ao gerar PDF');
            return null;
        }
    };

    const buildShareText = () => {
        if(!currentGame) return '';
        const g=currentGame;
        const gf=g.stats.find(s=>s.name==='Golo')?.count||0;
        const ga=g.stats.find(s=>s.name==='Golo Sofr.')?.count||0;
        const rem=g.stats.find(s=>s.name==='Remate')?.count||0;
        const ef=rem>0?`${((gf/rem)*100).toFixed(0)}%`:'—';
        const atk=g.stats.filter(s=>s.type==='ataque').reduce((a,s)=>a+s.count,0);
        const def=g.stats.filter(s=>s.type==='defesa').reduce((a,s)=>a+s.count,0);
        const goals=g.events.filter(e=>e.isGoal).map(e=>fmtMin(e.time)).join(', ');
        return [
            `⚽ *RELATÓRIO DE JOGO*`,
            `📋 ${currentFolder?.name||''}`,
            `🆚 *${g.opponent}*  |  ${g.date}`,
            ``,
            `🏆 *Resultado:  ${gf} – ${ga}*`,
            ``,
            `📊 *Estatísticas:*`,
            `• Remates: ${rem}  |  Eficácia: ${ef}`,
            `• Ações ataque: ${atk}  |  Defesa: ${def}`,
            goals?`• ⚽ Golos: ${goals}`:``,
            ``,
            g.notes?`📝 "${g.notes}"`:null,
            ``,
            `_Gerado por SoccerAnalyst Pro_`,
        ].filter(l=>l!==null).join('\n');
    };

    const handleShareWhatsApp = () => {
        const text=buildShareText();
        const encoded=encodeURIComponent(text);
        window.open(`https://wa.me/?text=${encoded}`,'_blank');
        setShowShare(false);
    };

    const handleShareEmail = () => {
        const g=currentGame;
        if(!g) return;
        const gf=g.stats.find(s=>s.name==='Golo')?.count||0;
        const ga=g.stats.find(s=>s.name==='Golo Sofr.')?.count||0;
        const subject=encodeURIComponent(`Relatório: ${g.opponent} (${gf}–${ga}) - ${g.date}`);
        const body=encodeURIComponent(buildShareText().replace(/\*/g,'').replace(/_/g,''));
        window.open(`mailto:?subject=${subject}&body=${body}`,'_blank');
        setShowShare(false);
    };

    const handleShareNative = async () => {
        setShowShare(false);
        const result = await exportPDF(true);
        if(!result) return;
        const {blob, filename}=result;
        const file=new File([blob],filename,{type:'application/pdf'});
        if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
            try{ await navigator.share({files:[file],title:`Relatório ${currentGame.opponent}`,text:buildShareText()}); }
            catch(e){ if(e.name!=='AbortError') showToast('Erro ao partilhar'); }
        } else {
            // Fallback: download
            const url=URL.createObjectURL(blob);
            const a=document.createElement('a');
            a.href=url;a.download=filename;
            document.body.appendChild(a);a.click();a.remove();
            URL.revokeObjectURL(url);
            showToast('✅ PDF guardado');
        }
    };

    const handleCopyText = () => {
        const text=buildShareText().replace(/\*/g,'').replace(/_/g,'');
        if(navigator.clipboard){
            navigator.clipboard.writeText(text).then(()=>showToast('✅ Copiado!'));
        } else {
            const ta=document.createElement('textarea');
            ta.value=text;document.body.appendChild(ta);ta.select();
            document.execCommand('copy');document.body.removeChild(ta);
            showToast('✅ Copiado!');
        }
        setShowShare(false);
    };

    const handleExport=()=>{
        const blob=new Blob([JSON.stringify({version:4,exportedAt:new Date().toISOString(),folders})],{type:'application/json'});
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');
        a.href=url;a.download=`socceranalyst_backup_${new Date().toISOString().slice(0,10)}.json`;
        document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
        showToast('Backup exportado');
    };

    const handleImport=file=>{
        if(!file) return;
        const r=new FileReader();
        r.onload=()=>{
            try{
                const p=JSON.parse(r.result);
                const imported=Array.isArray(p)?p:p?.folders;
                if(!Array.isArray(imported)){showToast('Ficheiro inválido');return;}
                setFolders(imported);showToast('✅ Dados importados');
            } catch(_){showToast('Erro ao importar');}
        };
        r.readAsText(file);
    };

    const getPeriodInfo=t=>{
        const m=Math.floor(t/60);
        if(m<45) return{label:'1 TEMPO',color:'#2dc653'};
        if(m<90) return{label:'2 TEMPO',color:'#4361ee'};
        return{label:'PRORROG.',color:'#f9c74f'};
    };

    const getFolderSummary=folder=>{
        if(!folder.games.length) return null;
        const golos=folder.games.reduce((s,g)=>s+(g.stats.find(x=>x.name==='Golo')?.count||0),0);
        const sofr=folder.games.reduce((s,g)=>s+(g.stats.find(x=>x.name==='Golo Sofr.')?.count||0),0);
        const rem=folder.games.reduce((s,g)=>s+(g.stats.find(x=>x.name==='Remate')?.count||0),0);
        return{games:folder.games.length,golos,sofr,ef:rem>0?((golos/rem)*100).toFixed(1):0};
    };

    /* ── Filtered games ── */
    const filteredGames = useMemo(()=>{
        if(!currentFolder) return [];
        const fromD=dateFrom?new Date(dateFrom):null;
        const toD=dateTo?(()=>{const d=new Date(dateTo);d.setHours(23,59,59,999);return d;})():null;
        return currentFolder.games.filter(g=>{
            if(!g.opponent.toLowerCase().includes(searchTerm.toLowerCase())) return false;
            const gd=parsePtDate(g.date);
            if(fromD&&(!gd||gd<fromD)) return false;
            if(toD&&(!gd||gd>toD)) return false;
            const gf=g.stats.find(s=>s.name==='Golo')?.count||0;
            const ga=g.stats.find(s=>s.name==='Golo Sofr.')?.count||0;
            if(minGF&&gf<Number(minGF)) return false;
            if(minGA&&ga<Number(minGA)) return false;
            return true;
        }).sort((a,b)=>sortBy==='date'?(parsePtDate(b.date)-parsePtDate(a.date)):a.opponent.localeCompare(b.opponent));
    },[currentFolder,searchTerm,dateFrom,dateTo,minGF,minGA,sortBy]);

    const hasActiveFilter = dateFrom||dateTo||minGF||minGA;

    /* ════════════════════════════════════
       RENDER HELPERS
    ════════════════════════════════════ */
    const setGameAndView=(gameId,v)=>{
        setCurrentGameId(gameId);
        setView(v);
    };

    /* ════════════════════════════════════
       VIEW: FOLDERS
    ════════════════════════════════════ */
    const renderFolders=()=>(
        <div className="screen slide-in no-scrollbar" style={{padding:'0 0 16px'}}>
            <div className="page-header">
                <div>
                    <div style={{fontFamily:'Bebas Neue',fontSize:28,letterSpacing:3,color:'var(--accent)',lineHeight:1}}>SoccerAnalyst</div>
                    <div style={{fontFamily:'Bebas Neue',fontSize:14,letterSpacing:6,color:'var(--muted)'}}>PRO</div>
                </div>
                <div style={{display:'flex',gap:8}}>
                    <button className="btn-ghost" onClick={handleExport}>Exportar</button>
                    <button className="btn-ghost" onClick={()=>importRef.current?.click()}>Importar</button>
                    <input ref={importRef} type="file" accept=".json" style={{display:'none'}} onChange={e=>handleImport(e.target.files[0])}/>
                </div>
            </div>
            <div style={{padding:'16px 16px 0'}}>
                <button className="btn-primary" style={{marginBottom:16}} onClick={()=>{
                    const n=promptText('Nome da pasta:');
                    if(n){setFolders(prev=>[{id:Date.now(),name:n,games:[],statTemplate:DEFAULT_TEMPLATE.map(s=>({...s}))},...prev]);showToast('Pasta criada');}
                }}>+ Nova Pasta</button>
                <div style={{display:'flex',flexDirection:'column',gap:10}}>
                    {folders.length===0&&(
                        <div className="empty"><div className="empty-icon">🗂</div><div className="empty-text">Nenhuma pasta criada</div></div>
                    )}
                    {folders.map(f=>{
                        const s=getFolderSummary(f);
                        return(
                            <div key={f.id} className="folder-card" onClick={()=>{setCurrentFolderId(f.id);setView('games');}}>
                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:s?14:0}}>
                                    <div>
                                        <div style={{fontFamily:'Bebas Neue',fontSize:22,letterSpacing:2}}>{f.name}</div>
                                        <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',color:'var(--accent)',letterSpacing:2,marginTop:2}}>{f.games.length} Jogo{f.games.length!==1?'s':''}</div>
                                    </div>
                                    <button className="icon-btn" style={{background:'rgba(239,35,60,0.08)',borderColor:'rgba(239,35,60,0.2)',color:'var(--red)'}}
                                        onClick={e=>{e.stopPropagation();if(confirm('Apagar pasta e todos os jogos?')){setFolders(prev=>prev.filter(x=>x.id!==f.id));showToast('Eliminada');}}}>✕</button>
                                </div>
                                {s&&(
                                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
                                        {[{val:s.golos,label:'Golos',c:'var(--green)'},{val:s.sofr,label:'Sofridos',c:'var(--red)'},{val:`${s.ef}%`,label:'Eficácia',c:'var(--accent)'}].map(x=>(
                                            <div key={x.label} style={{textAlign:'center',padding:'10px 6px',background:'var(--bg)',borderRadius:10,border:'1px solid var(--border)'}}>
                                                <div style={{fontFamily:'Bebas Neue',fontSize:24,color:x.c,lineHeight:1}}>{x.val}</div>
                                                <div style={{fontSize:8,fontWeight:700,textTransform:'uppercase',color:'var(--muted)',marginTop:2,letterSpacing:1}}>{x.label}</div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        );
                    })}
                </div>
            </div>
        </div>
    );

    /* ════════════════════════════════════
       VIEW: GAMES
    ════════════════════════════════════ */
    const renderGames=()=>{
        if(!currentFolder) return <div className="empty"><div className="empty-text">Seleciona uma pasta</div></div>;
        const sumGF=filteredGames.reduce((s,g)=>s+(g.stats.find(x=>x.name==='Golo')?.count||0),0);
        const sumGA=filteredGames.reduce((s,g)=>s+(g.stats.find(x=>x.name==='Golo Sofr.')?.count||0),0);
        return(
            <div className="screen slide-in no-scrollbar" style={{padding:'0 0 16px'}}>
                <div className="page-header">
                    <div>
                        <div className="page-title" style={{color:'var(--accent)'}}>{currentFolder.name}</div>
                        <div style={{fontSize:10,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:2,marginTop:2}}>{currentFolder.games.length} Jogos</div>
                    </div>
                    <div style={{display:'flex',gap:8,alignItems:'center'}}>
                        <button className="icon-btn" style={{background:hasActiveFilter?'rgba(67,97,238,0.2)':'var(--surface)',borderColor:hasActiveFilter?'var(--accent)':'var(--border)',color:hasActiveFilter?'var(--accent)':'var(--muted)',width:40,height:40,fontSize:17}}
                            onClick={()=>setShowFilter(true)}>⚙</button>
                    </div>
                </div>
                <div style={{padding:'12px 16px 0'}}>
                    <div style={{display:'flex',gap:8,marginBottom:14}}>
                        <input type="text" placeholder="🔍  Pesquisar adversário..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)}
                            style={{flex:1,padding:'11px 14px',fontSize:13,borderRadius:12}}/>
                        <div style={{display:'flex',gap:6}}>
                            {['date','name'].map(s=>(

                        const o=promptText('Nome do adversário:');
                        if(!o) return;
                        const tpl=getFolderTemplate(currentFolderId);
                        const ng={id:Date.now(),opponent:o,time:0,stats:statsFromTemplate(tpl),events:[],notes:'',notesHistory:[],pic:null,date:new Date().toLocaleDateString('pt-PT')};
                        setFolders(prev=>prev.map(f=>f.id!==currentFolderId?f:{...f,games:[ng,...f.games]}));

                            const ga=g.stats.find(s=>s.name==='Golo Sofr.')?.count||0;
                            const rc=gf>ga?'var(--green)':gf<ga?'var(--red)':'var(--muted)';
                            return(

                                    <div className="game-score">
                                        <span className="game-score-num" style={{color:'var(--green)'}}>{gf}</span>

                {showFilter&&(

                                <div>
                                    <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',color:'var(--muted)',letterSpacing:1,marginBottom:6}}>Data</div>
                                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                                        <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} style={{padding:'10px 12px'}}/>
                                        <input type="date" value={dateTo}   onChange={e=>setDateTo(e.target.value)}   style={{padding:'10px 12px'}}/>
                                    </div>
                                </div>
                                <div>
                                    <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',color:'var(--muted)',letterSpacing:1,marginBottom:6}}>Mínimo de Golos</div>

                                        <input type="number" min="0" placeholder="Marcados" value={minGF} onChange={e=>setMinGF(e.target.value)} style={{padding:'10px 12px'}}/>
                                        <input type="number" min="0" placeholder="Sofridos"  value={minGA} onChange={e=>setMinGA(e.target.value)} style={{padding:'10px 12px'}}/>

                                <div style={{display:'flex',gap:8,marginTop:4}}>
                                    <button onClick={()=>{setDateFrom('');setDateTo('');setMinGF('');setMinGA('');}} className="btn-ghost" style={{flex:1}}>Limpar</button>
                                    <button onClick={()=>setShowFilter(false)} className="btn-save" style={{flex:1}}>Aplicar</button>
                                </div>
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );
    };

    /* ════════════════════════════════════
       VIEW: TRACKING
    ════════════════════════════════════ */
    const renderTracking=()=>{
        if(!currentGame) return(
            <div className="screen">
                <div className="empty" style={{height:'100%'}}>
                    <div className="empty-icon">⚽</div>
                    <div className="empty-text">Seleciona um jogo para começar</div>
                    <button className="btn-ghost" onClick={()=>setView('games')}>Ir para Jogos</button>
                </div>
            </div>
        );
        const period=getPeriodInfo(currentGame.time);
        const gf=currentGame.stats.find(s=>s.name==='Golo')?.count||0;
        const ga=currentGame.stats.find(s=>s.name==='Golo Sofr.')?.count||0;
        const scoreColor=gf>ga?'var(--green)':gf<ga?'var(--red)':'var(--muted)';
        return(
            <div className="screen" style={{display:'flex',flexDirection:'column',overflow:'hidden'}}>
                {/* Header */}
                <div className="track-header">
                    <div className="timer-pill">
                        <span className="timer-digits">{fmt(currentGame.time)}</span>
                        <span className="period-badge" style={{color:period.color,background:`${period.color}22`}}>{period.label}</span>
                    </div>
                    <div className="score-pill" style={{borderColor:`${scoreColor}44`}}>
                        <span className="score-num" style={{color:'var(--green)'}}>{gf}</span>
                        <span style={{fontFamily:'Space Mono',fontSize:11,color:'var(--muted)',fontWeight:700}}>–</span>
                        <span className="score-num" style={{color:'var(--red)'}}>{ga}</span>
                    </div>
                    <div className="header-actions">
                        <button className="hbtn hbtn-sq" title="Desfazer último" onClick={undoLast}
                            style={{fontSize:17}}>↩</button>
                        <button className="hbtn hbtn-sq" title="Notas"
                            style={{background:currentGame.notes?'rgba(67,97,238,0.25)':'var(--bg)',borderColor:currentGame.notes?'var(--accent)':'var(--border)',fontSize:17}}
                            onClick={()=>setShowNotes(p=>!p)}>📝</button>
                        <button className="hbtn hbtn-rect" style={{color:'var(--muted)',fontSize:12}} onClick={()=>adjustTime(-10)}>-10s</button>
                        <button className="hbtn hbtn-rect" style={{color:'var(--muted)',fontSize:12}} onClick={()=>adjustTime(60)}>+1m</button>
                        <button className="hbtn hbtn-start" onClick={()=>setIsActive(p=>{const n=!p;if(!n)showToast('⏸ Pausado');return n;})}
                            style={{background:isActive?'var(--red)':'var(--green)',color:'white',minWidth:70}}>
                            {isActive?'STOP':'START'}
                        </button>
                    </div>
                </div>

                {/* Notes panel */}
                {showNotes&&(
                    <div className="notes-panel">
                        <textarea value={currentGame.notes} onChange={e=>updateGame({notes:e.target.value})}
                            placeholder="Observações sobre o jogo..."/>
                        <div className="notes-footer">
                            <button className="btn-save" onClick={()=>{
                                if(!currentGame.notes?.trim()){showToast('Nota vazia');return;}
                                const label=`${fmt(currentGame.time)} · ${new Date().toLocaleDateString('pt-PT')}`;
                                updateGame(g=>({...g,notesHistory:[...(g.notesHistory||[]),{label,text:g.notes.trim()}]}));
                                showToast('✅ Nota guardada');
                            }}>Guardar</button>
                        </div>
                    </div>
                )}

                {/* Tabs */}
                <div className="track-tabs">
                    {[{id:'stats',label:'⚡ Stats'},{id:'pitch',label:'🗺 Mapa'},{id:'squad',label:'👤 Plantel'}].map(t=>(
                        <button key={t.id} className={`track-tab${trackTab===t.id?' active':''}`} onClick={()=>setTrackTab(t.id)}>{t.label}</button>
                    ))}
                </div>

                {/* Stats columns */}
                {trackTab==='stats'&&(
                <div className="track-cols">
                    {['ataque','defesa'].map(type=>(
                        <div key={type} className="track-col">
                            <div className="col-header">
                                <span className="col-title" style={{color:type==='ataque'?'var(--accent)':'var(--red)'}}>{type.toUpperCase()}</span>
                                <button className="col-add-btn" onClick={()=>addCustomStat(type)} title={`Nova ação de ${type}`}>+</button>
                            </div>
                            <div className="stats-scroll no-scrollbar">
                                {currentGame.stats.filter(s=>s.type===type).map(s=>{
                                    const isGoalStat=s.name.toLowerCase().includes('golo')&&type==='ataque';
                                    const hasCount=s.count>0;
                                    const activeClass=hasCount?(isGoalStat?'goal-active':type==='ataque'?'atk-active':'def-active'):'';
                                    return(
                                        <div key={s.id} className="stat-row">
                                            <button className={`stat-main ${activeClass}`}
                                                onPointerDown={e=>e.currentTarget.style.transform='scale(0.96)'}
                                                onPointerUp={e=>{e.currentTarget.style.transform='';addStat(s.id);}}
                                                onPointerLeave={e=>e.currentTarget.style.transform=''}>
                                                <span className={`stat-count${hasCount?'':' zero'}`} style={{color:hasCount?(isGoalStat?'var(--gold)':type==='ataque'?'var(--accent)':'var(--red)'):''}}>
                                                    {s.count}
                                                </span>
                                                <span className="stat-name">{s.name}</span>
                                                {isActive&&<span style={{fontSize:9,color:'var(--muted)',opacity:0.6,flexShrink:0}}>+</span>}
                                            </button>
                                            <div className="stat-actions">
                                                <button className="stat-side-btn sbtn-minus" onClick={()=>removeStat(s.id)}>−</button>
                                                <button className="stat-side-btn sbtn-edit" onClick={()=>renameStat(s.id,s.name)}>E</button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    ))}
                </div>
                )}

                {/* Pitch tab */}
                {trackTab==='pitch'&&(
                <div style={{flex:1,overflowY:'auto',padding:12}} className="no-scrollbar">
                    <div style={{marginBottom:8,fontSize:11,color:'var(--muted)',fontWeight:700,textTransform:'uppercase',letterSpacing:1}}>
                        {isActive?'Toca no campo para registar posição do próximo evento':'Inicia o cronómetro para registar'}
                    </div>
                    <PitchMap
                        events={currentGame.events}
                        interactive={isActive}
                        onTap={(x,y)=>{
                            // Store pending pitch click, then show stat selector
                            setPendingPitch({x,y});
                            showToast('Posição marcada — regista o evento');
                        }}
                    />
                    {pendingPitch&&(
                        <div style={{marginTop:10,padding:'10px 14px',background:'rgba(67,97,238,0.12)',border:'1px solid rgba(67,97,238,0.3)',borderRadius:12,fontSize:12,color:'var(--accent)',fontWeight:700}}>
                            📍 Posição pendente — clica num stat para associar
                            <button onClick={()=>setPendingPitch(null)} style={{marginLeft:10,background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:13}}>✕</button>
                        </div>
                    )}
                    <div style={{marginTop:12,fontSize:10,color:'var(--muted)',fontWeight:700,textTransform:'uppercase',letterSpacing:1}}>
                        Eventos com posição: {currentGame.events.filter(e=>e.x!=null).length} / {currentGame.events.length}
                    </div>
                </div>
                )}

                {/* Squad tab */}
                {trackTab==='squad'&&(
                <div style={{flex:1,overflowY:'auto',padding:12}} className="no-scrollbar">
                    <button className="btn-primary" style={{marginBottom:14,fontSize:14,padding:'12px'}} onClick={()=>{
                        const name=promptText('Nome do jogador:');
                        if(!name) return;
                        const num=promptText('Número (opcional):','');
                        const pos=promptText('Posição (ex: GR, DC, MC, AV):','');
                        addPlayer(currentFolderId,{id:Date.now(),name,number:num||'',position:pos||''});
                        showToast(`${name} adicionado`);
                    }}>+ Adicionar Jogador</button>
                    {getFolderPlayers(currentFolderId).length===0&&(
                        <div className="empty"><div className="empty-icon">👤</div><div className="empty-text">Plantel vazio</div></div>
                    )}
                    <div style={{display:'flex',flexDirection:'column',gap:7}}>
                        {getFolderPlayers(currentFolderId).map(p=>{
                            const evCount=currentGame.events.filter(e=>e.playerId===p.id).length;
                            return(
                                <div key={p.id} className="player-chip" style={{justifyContent:'space-between'}}>
                                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                                        <div className="player-num">#{p.number||'?'}</div>
                                        <div>
                                            <div className="player-name-txt">{p.name}</div>
                                            <div className="player-pos-txt">{p.position||'Sem posição'}</div>
                                        </div>
                                    </div>
                                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                                        {evCount>0&&<span style={{fontFamily:'Space Mono',fontSize:11,color:'var(--accent)',fontWeight:700}}>{evCount} eventos</span>}
                                        <button onClick={()=>{if(confirm(`Remover ${p.name}?`))removePlayer(currentFolderId,p.id);}}
                                            style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:14,padding:4}}>✕</button>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
                )}
            </div>
        );
    };

    /* ════════════════════════════════════
       VIEW: REPORT
    ════════════════════════════════════ */
    const renderReport=()=>{
        if(!currentGame) return(
            <div className="screen">
                <div className="empty" style={{height:'100%'}}>
                    <div className="empty-icon">📊</div>
                    <div className="empty-text">Seleciona um jogo para ver o relatório</div>
                    <button className="btn-ghost" onClick={()=>setView('games')}>Ir para Jogos</button>
                </div>
            </div>
        );
        const g=currentGame;
        const golos=g.stats.find(s=>s.name==='Golo')?.count||0;
        const sofr=g.stats.find(s=>s.name==='Golo Sofr.')?.count||0;
        const remates=g.stats.find(s=>s.name==='Remate')?.count||0;
        const ef=remates>0?((golos/remates)*100).toFixed(1):0;
        const totalAtk=g.stats.filter(s=>s.type==='ataque').reduce((a,s)=>a+s.count,0);
        const totalDef=g.stats.filter(s=>s.type==='defesa').reduce((a,s)=>a+s.count,0);
        const filtEv=eventFilter==='all'?g.events:eventFilter==='golos'?g.events.filter(e=>e.isGoal):g.events.filter(e=>e.type===eventFilter);
        const atkC=['#4361ee','#3a0ca3','#4cc9f0','#560bad','#7209b7','#4895ef'];
        const defC=['#ef233c','#d90429','#e63946','#c1121f','#ff595e','#ff6b6b'];
        return(
            <div className="screen no-scrollbar" style={{padding:'0 0 16px'}}>
                <div className="page-header">
                    <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:9,fontWeight:700,textTransform:'uppercase',color:'var(--muted)',letterSpacing:3,marginBottom:3}}>Relatório</div>
                        <div style={{fontFamily:'Bebas Neue',fontSize:26,letterSpacing:2,color:'var(--accent)',lineHeight:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{g.opponent}</div>
                        <div style={{fontFamily:'Space Mono',fontSize:9,color:'var(--muted)',marginTop:2}}>{g.date} · {fmt(g.time)}</div>
                    </div>
                    <div style={{display:'flex',gap:8,flexShrink:0}}>
                        <select value={eventFilter} onChange={e=>setEventFilter(e.target.value)}
                            style={{padding:'8px 10px',fontSize:11,fontWeight:700,cursor:'pointer',borderRadius:10}}>
                            <option value="all">Todos</option>
                            <option value="golos">Golos</option>
                            <option value="ataque">Ataque</option>
                            <option value="defesa">Defesa</option>
                        </select>
                        <button onClick={()=>setShowShare(true)} style={{padding:'8px 16px',borderRadius:10,background:'linear-gradient(135deg,var(--accent),var(--accent2))',color:'white',fontFamily:'Bebas Neue',fontSize:15,letterSpacing:2,cursor:'pointer',border:'none',fontWeight:700,boxShadow:'0 4px 16px rgba(67,97,238,0.35)'}}>
                            ↗ PARTILHAR
                        </button>
                    </div>
                </div>

                <div style={{padding:'16px'}}>
                    {/* KPIs */}
                    <div className="report-kpis">
                        {[{val:golos,label:'Golos',c:'var(--green)',sub:'marcados'},{val:sofr,label:'Sofr.',c:'var(--red)',sub:'sofridos'},{val:remates,label:'Remates',c:'var(--accent)',sub:'total'},{val:`${ef}%`,label:'Eficácia',c:'var(--gold)',sub:'golo/remate'}].map(k=>(
                            <div key={k.label} className="kpi-card">
                                <div className="kpi-val" style={{color:k.c}}>{k.val}</div>
                                <div className="kpi-label">{k.label}</div>
                                <div className="kpi-sub">{k.sub}</div>
                            </div>
                        ))}
                    </div>

                    {/* Ataque / Defesa */}
                    <div className="card" style={{marginBottom:14}}>
                        <div className="section-label">Distribuição Ataque / Defesa</div>
                        <StackedBar left={totalAtk} right={totalDef} lColor="var(--accent)" rColor="var(--red)" lLabel={`Ataque (${totalAtk})`} rLabel={`Defesa (${totalDef})`}/>
                    </div>

                    {/* Radar + Donuts */}
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
                        <div className="card">
                            <div className="section-label">Radar</div>
                            <Radar stats={g.stats} size={180}/>
                        </div>
                        <div className="card">
                            <div className="section-label">Indicadores</div>
                            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,paddingTop:4}}>
                                <Donut value={golos} max={Math.max(remates,1)} color="var(--green)" label="Conversão" sublabel="Golos" size={72}/>
                                <Donut value={g.stats.find(s=>s.name==='Rem. Enquad.')?.count||0} max={Math.max(remates,1)} color="var(--accent)" label="Enquadram." sublabel="Remates" size={72}/>
                                <Donut value={g.stats.find(s=>s.name==='Recuper.')?.count||0} max={Math.max(totalDef,1)} color="var(--gold)" label="Recuper." sublabel="de Bola" size={72}/>
                                <Donut value={sofr} max={Math.max(g.stats.find(s=>s.name==='Rem. Conc.')?.count||1,sofr)} color="var(--red)" label="Sofr./Conc." sublabel="Golos" size={72}/>
                            </div>
                        </div>
                    </div>

                    {/* Intensity */}
                    <div className="card" style={{marginBottom:14}}>
                        <div className="section-label">Intensidade por Minuto</div>
                        <IntensityChart events={filtEv} totalTime={g.time}/>
                    </div>

                    {/* Pitch heatmap */}
                    {filtEv.filter(e=>e.x!=null).length>0&&(
                    <div className="card" style={{marginBottom:14}}>
                        <div className="section-label">Mapa Tático</div>
                        <PitchMap events={filtEv} filterType={eventFilter}/>
                    </div>
                    )}

                    {/* Player stats */}
                    {(currentFolder?.players||[]).length>0&&(
                    <div className="card" style={{marginBottom:14}}>
                        <div className="section-label">Estatísticas por Jogador</div>
                        <PlayerStatsTable events={g.events} players={currentFolder.players}/>
                    </div>
                    )}

                    {/* Bars */}
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:14}}>
                        <div className="card">
                            <div className="section-label" style={{color:'var(--accent)'}}>Ataque</div>
                            <BarChart data={g.stats.filter(s=>s.type==='ataque').map(s=>({label:s.name,value:s.count}))} colorFn={(_,i)=>atkC[i%atkC.length]}/>
                        </div>
                        <div className="card">
                            <div className="section-label" style={{color:'var(--red)'}}>Defesa</div>
                            <BarChart data={g.stats.filter(s=>s.type==='defesa').map(s=>({label:s.name,value:s.count}))} colorFn={(_,i)=>defC[i%defC.length]}/>
                        </div>
                    </div>

                    {/* Timeline */}
                    <div className="card" style={{marginBottom:14}}>
                        <div className="section-label">Cronologia</div>
                        <Timeline events={filtEv} totalTime={g.time}/>
                        {filtEv.filter(e=>e.isGoal).length>0&&(
                            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:12}}>
                                {filtEv.filter(e=>e.isGoal).map((e,i)=>(
                                    <div key={i} style={{padding:'5px 10px',background:'rgba(249,199,79,0.1)',border:'1px solid rgba(249,199,79,0.3)',borderRadius:8,fontFamily:'Space Mono',fontSize:10,color:'var(--gold)'}}>
                                        ⚽ {fmtMin(e.time)}
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Events list */}
                    {filtEv.length>0&&(
                        <div className="card" style={{marginBottom:14}}>
                            <div className="section-label">Eventos ({filtEv.length})</div>
                            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))',gap:6}}>
                                {filtEv.map((e,i)=>(
                                    <div key={i} style={{padding:'6px 10px',background:'var(--bg)',borderRadius:8,border:`1px solid ${e.isGoal?'rgba(249,199,79,0.3)':e.type==='ataque'?'rgba(67,97,238,0.2)':'rgba(239,35,60,0.2)'}`,display:'flex',alignItems:'center',gap:8}}>
                                        <div style={{width:6,height:6,borderRadius:'50%',flexShrink:0,background:e.isGoal?'var(--gold)':e.type==='ataque'?'var(--accent)':'var(--red)'}}/>
                                        <div>
                                            <div style={{fontFamily:'Space Mono',fontSize:9,color:'var(--muted)'}}>{fmtMin(e.time)}</div>
                                            <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.04em'}}>{e.name}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Notes */}
                    {(g.notes||(g.notesHistory||[]).length>0)&&(
                        <div className="card" style={{marginBottom:14}}>
                            <div className="section-label">Notas</div>
                            {g.notes&&<p style={{fontSize:12,color:'var(--text)',fontStyle:'italic',lineHeight:1.6,marginBottom:12}}>"{g.notes}"</p>}
                            {(g.notesHistory||[]).map((n,i)=>(
                                <div key={i} style={{marginBottom:10,paddingLeft:12,borderLeft:'2px solid var(--border)'}}>
                                    <div style={{fontSize:9,fontWeight:700,textTransform:'uppercase',color:'var(--muted)',letterSpacing:1,marginBottom:4}}>{n.label}</div>
                                    <div style={{fontSize:11,color:'var(--text)',fontStyle:'italic'}}>"{n.text}"</div>
                                </div>
                            ))}
                        </div>
                    )}

                    <div style={{textAlign:'center',fontSize:9,color:'var(--muted)',fontWeight:700,textTransform:'uppercase',letterSpacing:3,padding:'12px 0'}}>
                        SoccerAnalyst Pro · {new Date().toLocaleDateString('pt-PT')}
                    </div>
                </div>
            </div>
        );
    };

    /* ── Player Picker Sheet ── */
    const renderPlayerPicker=()=>{
        if(!playerPicker) return null;
        const players=getFolderPlayers(currentFolderId);
        return(
            <div className="player-picker-overlay" onClick={()=>setPlayerPicker(null)}>
                <div className="player-picker-sheet" onClick={e=>e.stopPropagation()}>
                    <div className="drawer-handle"/>
                    <div style={{fontFamily:'Bebas Neue',fontSize:18,letterSpacing:2,marginBottom:14}}>Quem foi?</div>
                    <div style={{display:'flex',flexDirection:'column',gap:7}}>
                        <button className="player-chip" onClick={()=>{
                            commitStat(playerPicker.statId, pendingPitch?{x:pendingPitch.x,y:pendingPitch.y}:{});
                            setPendingPitch(null); setPlayerPicker(null);
                        }}>
                            <div className="player-num" style={{color:'var(--muted)'}}>—</div>
                            <div><div className="player-name-txt" style={{color:'var(--muted)'}}>Sem jogador</div></div>
                        </button>
                        {players.map(p=>(
                            <button key={p.id} className="player-chip" onClick={()=>{
                                commitStat(playerPicker.statId, {playerId:p.id, playerName:p.name, ...(pendingPitch?{x:pendingPitch.x,y:pendingPitch.y}:{})});
                                setPendingPitch(null); setPlayerPicker(null);
                            }}>
                                <div className="player-num">#{p.number||'?'}</div>
                                <div>
                                    <div className="player-name-txt">{p.name}</div>
                                    <div className="player-pos-txt">{p.position||''}</div>
                                </div>
                            </button>
                        ))}
                    </div>
                </div>
            </div>
        );
    };

    /* ── Edit Game Modal ── */
    const renderEditModal=()=>{
        if(!editModal) return null;
        return(
            <div className="modal-overlay" onClick={()=>setEditModal(null)}>
                <div className="modal-box" onClick={e=>e.stopPropagation()}>
                    <div className="modal-title">✎ Editar Jogo</div>
                    <div className="form-field">
                        <label className="form-label">Adversário</label>
                        <input className="form-input" value={editOpponent} onChange={e=>setEditOpponent(e.target.value)}
                            placeholder="Nome do adversário" autoFocus/>
                    </div>
                    <div className="form-field">
                        <label className="form-label">Data</label>
                        <input className="form-input" value={editDate} onChange={e=>setEditDate(e.target.value)}
                            placeholder="DD/MM/AAAA"/>
                    </div>
                    <div className="modal-actions">
                        <button className="btn-ghost" style={{flex:1}} onClick={()=>setEditModal(null)}>Cancelar</button>
                        <button className="btn-save" style={{flex:2,padding:'11px'}} onClick={saveEditGame}>Guardar</button>
                    </div>
                </div>
            </div>
        );
    };

    /* ── Share Drawer ── */
    const renderShareDrawer=()=>(
        <div className="filter-overlay" onClick={()=>setShowShare(false)}>
            <div className="filter-drawer" onClick={e=>e.stopPropagation()}>
                <div className="drawer-handle"/>
                <div className="drawer-title">↗ Partilhar Relatório</div>
                <div style={{fontSize:11,color:'var(--muted)',marginBottom:16,marginTop:-8}}>
                    {currentGame?.opponent} · {currentGame?.stats.find(s=>s.name==='Golo')?.count||0}–{currentGame?.stats.find(s=>s.name==='Golo Sofr.')?.count||0} · {currentGame?.date}
                </div>
                <div className="share-btn-row">
                    <button className="share-option" onClick={()=>{setShowShare(false);exportPDF(false);}}>
                        <div className="share-option-icon" style={{background:'rgba(230,237,243,0.08)'}}>📄</div>
                        <div className="share-option-text">
                            <div className="share-option-title">Guardar PDF</div>
                            <div className="share-option-sub">Download para o dispositivo</div>
                        </div>
                        <span style={{color:'var(--muted)',fontSize:16}}>›</span>
                    </button>
                    <button className="share-option" onClick={handleShareNative}>
                        <div className="share-option-icon" style={{background:'rgba(67,97,238,0.15)'}}>📤</div>
                        <div className="share-option-text">
                            <div className="share-option-title">Partilhar PDF</div>
                            <div className="share-option-sub">WhatsApp, Email, AirDrop…</div>
                        </div>
                        <span style={{color:'var(--muted)',fontSize:16}}>›</span>
                    </button>
                    <button className="share-option" onClick={handleShareWhatsApp}>
                        <div className="share-option-icon" style={{background:'rgba(37,211,102,0.15)'}}>💬</div>
                        <div className="share-option-text">
                            <div className="share-option-title">WhatsApp</div>
                            <div className="share-option-sub">Enviar resumo como mensagem</div>
                        </div>
                        <span style={{color:'var(--muted)',fontSize:16}}>›</span>
                    </button>
                    <button className="share-option" onClick={handleShareEmail}>
                        <div className="share-option-icon" style={{background:'rgba(67,97,238,0.12)'}}>📧</div>
                        <div className="share-option-text">
                            <div className="share-option-title">Email</div>
                            <div className="share-option-sub">Abrir cliente de email</div>
                        </div>
                        <span style={{color:'var(--muted)',fontSize:16}}>›</span>
                    </button>
                    <button className="share-option" onClick={handleCopyText}>
                        <div className="share-option-icon" style={{background:'rgba(249,199,79,0.12)'}}>📋</div>
                        <div className="share-option-text">
                            <div className="share-option-title">Copiar Resumo</div>
                            <div className="share-option-sub">Texto formatado para colar</div>
                        </div>
                        <span style={{color:'var(--muted)',fontSize:16}}>›</span>
                    </button>
                </div>
            </div>
        </div>
    );

    /* ════════════════════════════════════
       MAIN RENDER
    ════════════════════════════════════ */
    return (
        <div style={{position:'relative',width:'100%',height:'100vh',background:'var(--bg)',overflow:'hidden'}}>
            {view==='folders' && renderFolders()}
            {view==='games'   && renderGames()}
            {view==='tracking'&& renderTracking()}
            {view==='report'  && renderReport()}
            <BottomNav
                view={view}
                setView={setView}
                hasGame={!!currentGame}
                hasFolder={!!currentFolder}
            />
            {showShare && renderShareDrawer()}
            {playerPicker && renderPlayerPicker()}
            {editModal && renderEditModal()}
            {pdfProgress!==null&&(
                <div className="pdf-progress-overlay">
                    <div style={{fontFamily:'Bebas Neue',fontSize:20,letterSpacing:3,color:'var(--text)'}}>A GERAR PDF</div>
                    <div className="pdf-progress-bar-wrap">
                        <div className="pdf-progress-bar" style={{width:`${pdfProgress}%`}}/>
                    </div>
                    <div style={{fontSize:11,color:'var(--muted)',fontWeight:700}}>{pdfProgress}%</div>
                </div>
            )}
            {toast&&<Toast message={toast.msg} isGoal={toast.goal} onClose={()=>setToast(null)}/>}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
