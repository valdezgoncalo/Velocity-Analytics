                        </div>
                    </div>
                )}

                {globalPlayers.length>0&&(
                    <div style={{display:'flex',flexDirection:'column',gap:8}}>
                        {globalPlayers.map(p=>(
                            <div key={p.id} className="squad-screen-player">
                                <div className="num-badge">
                                    {p.number?`#${p.number}`:'—'}
                                </div>
                                <div style={{flex:1,minWidth:0}}>
                                    <div style={{fontWeight:700,fontSize:15,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                                        {p.name}
                                    </div>
                                </div>
                                <div style={{display:'flex',gap:6}}>
                                    <button className="icon-btn" style={{background:'rgba(255,87,34,0.08)',borderColor:'rgba(255,87,34,0.2)',color:'var(--accent)',fontSize:13,width:34,height:34}}
                                        onClick={()=>{
                                            const name=promptText('Nome:',p.name);
                                            if(!name) return;
                                            const num=promptText('Número:',p.number||'');
                                            setGlobalPlayers(prev=>prev.map(x=>x.id!==p.id?x:{...x,name:name.trim(),number:(num||'').trim()})
                                                .sort((a,b)=>{const na=Number(a.number)||999,nb=Number(b.number)||999;return na-nb||a.name.localeCompare(b.name);}));
                                            showToast('Atualizado');
                                        }}>✎</button>
                                    <button className="icon-btn" style={{background:'rgba(244,67,54,0.08)',borderColor:'rgba(244,67,54,0.2)',color:'var(--red)',fontSize:13,width:34,height:34}}
                                        onClick={()=>{if(confirm(`Remover ${p.name} do plantel?`)){setGlobalPlayers(prev=>prev.filter(x=>x.id!==p.id));showToast('Removida');}}}>✕</button>
                                </div>
                            </div>
                        ))}
                    </div>
                )}

                {globalPlayers.length>0&&(
                    <div style={{marginTop:24,padding:'14px 16px',background:'rgba(255,87,34,0.08)',border:'1px solid rgba(255,87,34,0.2)',borderRadius:14}}>
                        <div style={{fontSize:11,color:'var(--accent)',fontWeight:700,marginBottom:4}}>ℹ Como funciona</div>
                        <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.6}}>
                            Ao criar um jogo, escolhes as atletas convocadas a partir deste plantel. Só as convocadas aparecem no picker durante o tracking.
                        </div>
                    </div>
                )}
            </div>
        </div>
    );

    /* ════════════════════════════════════
       VIEW: CONVOCATÓRIA
    ════════════════════════════════════ */
    const renderConvocation=()=>{
        if(!convocView) return null;
        const allPlayers=[...globalPlayers,...(folders.find(f=>f.id===convocView.folderId)?.players||[]).filter(p=>!globalPlayers.find(g=>g.id===p.id))];
        const sorted=[...allPlayers].sort((a,b)=>{const na=Number(a.number)||999,nb=Number(b.number)||999;return na-nb||a.name.localeCompare(b.name);});
        const selCount=convocSelected.length;

        const confirmConvocation=()=>{
            if(convocView.newGame){
                const tpl=getFolderTemplate(convocView.folderId);
                const ng={id:Date.now(),opponent:convocOpponent,time:0,stats:statsFromTemplate(tpl),events:[],notes:'',notesHistory:[],pic:null,date:new Date().toLocaleDateString('pt-PT'),squad:convocSelected};
                setFolders(prev=>prev.map(f=>f.id!==convocView.folderId?f:{...f,games:[ng,...f.games]}));
                setConvocView(null);
                setGameAndView(ng.id,'tracking');
                showToast(`Jogo criado · ${selCount} convocadas`);
            } else if(convocView.editMode&&convocView.gameId){
                setFolders(prev=>prev.map(f=>{
                    if(f.id!==convocView.folderId) return f;
                    return{...f,games:f.games.map(g=>g.id!==convocView.gameId?g:{...g,squad:convocSelected})};
                }));
                setConvocView(null);
                showToast(`Convocatória atualizada · ${selCount} atletas`);
            }
        };

        return(
            <div style={{position:'fixed',inset:0,zIndex:400,background:'var(--bg)',display:'flex',flexDirection:'column'}}>
                {/* Header */}
                <div style={{padding:'14px 16px',background:'var(--surface)',borderBottom:'1px solid var(--border)',flexShrink:0}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                        <button className="btn-ghost" style={{fontSize:11}} onClick={()=>setConvocView(null)}>← Cancelar</button>
                        <div style={{position:'relative'}}>
                            <button className="btn-save" style={{padding:'10px 22px',fontSize:13,letterSpacing:1}}
                                onClick={confirmConvocation}>
                                {convocView.newGame?'Iniciar Jogo':'Guardar'}
                            </button>
                            {selCount>0&&<span className="convoc-count-badge">{selCount}</span>}
                        </div>
                    </div>
                    <div style={{marginTop:8}}>
                        <div style={{fontFamily:'Barlow Condensed',fontSize:22,letterSpacing:2,color:'var(--accent)'}}>
                            Convocatória
                        </div>
                        <div style={{fontSize:11,color:'var(--muted)',fontWeight:600,marginTop:1}}>
                            {convocView.newGame?`vs ${convocOpponent}`:'Editar convocatória'}
                            {' · '}
                            <span style={{color:'var(--accent)'}}>{selCount} selecionadas</span>
                            {' de '}{sorted.length}
                        </div>
                    </div>
                    {/* Select all / none */}
                    <div style={{display:'flex',gap:8,marginTop:10}}>
                        <button className="btn-ghost" style={{flex:1,fontSize:11}}
                            onClick={()=>setConvocSelected(sorted.map(p=>p.id))}>
                            ✓ Todas ({sorted.length})
                        </button>
                        <button className="btn-ghost" style={{flex:1,fontSize:11}}
                            onClick={()=>setConvocSelected([])}>
                            ✕ Limpar
                        </button>
                    </div>
                </div>

                {/* Player list */}
                <div style={{flex:1,overflowY:'auto',padding:'12px 16px',display:'flex',flexDirection:'column',gap:8}} className="no-scrollbar">
                    {sorted.length===0&&(
                        <div className="empty">
                            <div className="empty-icon">👥</div>
                            <div className="empty-text">Plantel vazio</div>
                            <button className="btn-ghost" onClick={()=>{setConvocView(null);setView('squad');}}>
                                Gerir Plantel
                            </button>
                        </div>
                    )}
                    {sorted.map(p=>{
                        const sel=convocSelected.includes(p.id);
                        return(
                            <div key={p.id} className={`convoc-player${sel?' selected':''}`}
                                onClick={()=>setConvocSelected(prev=>sel?prev.filter(id=>id!==p.id):[...prev,p.id])}>
                                <div className="convoc-check">{sel?'✓':''}</div>
                                <div className="num-badge" style={{width:34,height:34,fontSize:12}}>
                                    {p.number?`#${p.number}`:'—'}
                                </div>
                                <div style={{flex:1}}>
                                    <div style={{fontWeight:700,fontSize:14}}>{p.name}</div>
                                </div>
                            </div>
                        );
                    })}

                    {/* Add player shortcut */}
                    <button style={{marginTop:4,padding:'12px',borderRadius:14,border:'2px dashed var(--border)',background:'transparent',color:'var(--muted)',fontSize:12,fontWeight:700,cursor:'pointer',letterSpacing:1,textTransform:'uppercase'}}
                        onClick={()=>{
                            const name=promptText('Nome da atleta:');
                            if(!name) return;
                            const num=promptText('Número (opcional):','');
                            const np={id:Date.now(),name:name.trim(),number:(num||'').trim()};
                            setGlobalPlayers(prev=>[...prev,np].sort((a,b)=>{const na=Number(a.number)||999,nb=Number(b.number)||999;return na-nb||a.name.localeCompare(b.name);}));
                            setConvocSelected(prev=>[...prev,np.id]);
                            showToast(`${name} adicionada e convocada`);
                        }}>
                        + Adicionar nova atleta
                    </button>
                </div>

                {/* Footer bar */}
                <div style={{padding:'12px 16px',background:'var(--surface)',borderTop:'1px solid var(--border)',flexShrink:0,paddingBottom:'calc(12px + env(safe-area-inset-bottom,0px))'}}>
                    <button className="btn-primary" onClick={confirmConvocation}>
                        {convocView.newGame?`⚽ Iniciar Jogo com ${selCount} Convocadas`:`✅ Guardar Convocatória`}
                    </button>
                </div>
            </div>
        );
    };

    /* ── Player Picker Sheet ── */
    const renderPlayerPicker=()=>{
        if(!playerPicker) return null;
        const players=getGamePlayers(currentGame, currentFolderId);
        return(
            <div className="player-picker-overlay" onClick={()=>setPlayerPicker(null)}>
                <div className="player-picker-sheet" onClick={e=>e.stopPropagation()}>
                    <div className="drawer-handle"/>
                    <div style={{fontFamily:'Barlow Condensed',fontSize:18,letterSpacing:2,marginBottom:14}}>
                        Quem foi?
                        {currentGame?.squad?.length>0&&<span style={{fontSize:10,color:'var(--muted)',fontFamily:'Barlow',fontWeight:600,letterSpacing:0,marginLeft:8}}>({currentGame.squad.length} convocadas)</span>}
                    </div>
                    <div style={{display:'flex',flexDirection:'column',gap:7}}>
                        <button className="player-chip" onClick={()=>{
                            commitStat(playerPicker.statId, pendingPitch?{x:pendingPitch.x,y:pendingPitch.y}:{});
                            setPendingPitch(null); setPlayerPicker(null);
                        }}>
                            <div className="player-num" style={{color:'var(--muted)'}}>—</div>
                            <div><div className="player-name-txt" style={{color:'var(--muted)'}}>Sem atleta</div></div>
                        </button>
                        {players.map(p=>(
                            <button key={p.id} className="player-chip" onClick={()=>{
                                commitStat(playerPicker.statId, {playerId:p.id, playerName:p.name, ...(pendingPitch?{x:pendingPitch.x,y:pendingPitch.y}:{})});
                                setPendingPitch(null); setPlayerPicker(null);
                            }}>
                                <div className="player-num">#{p.number||'?'}</div>
                                <div>
                                    <div className="player-name-txt">{p.name}</div>
                                    {p.position&&<div className="player-pos-txt">{p.position}</div>}
                                </div>
                            </button>
                        ))}
                    </div>
                </div>
            </div>
        );
    };

    /* ── Edit Game Modal ── */
    const renderEditModal=()=>{
        if(!editModal) return null;
        const game=currentFolder?.games?.find(g=>g.id===editModal.gameId);
        return(
            <div className="modal-overlay" onClick={()=>setEditModal(null)}>
                <div className="modal-box" onClick={e=>e.stopPropagation()}>
                    <div className="modal-title">Editar Jogo</div>
                    <div className="form-field">
                        <label className="form-label">Adversário</label>
                        <input className="form-input" value={editOpponent} onChange={e=>setEditOpponent(e.target.value)}
                            placeholder="Nome do adversário" autoFocus/>
                    </div>
                    <div className="form-field">
                        <label className="form-label">Data</label>
                        <input className="form-input" value={editDate} onChange={e=>setEditDate(e.target.value)}
                            placeholder="DD/MM/AAAA"/>
                    </div>
                    <div className="form-field">
                        <label className="form-label">Logo Adversário (PDF)</label>
                        <div style={{display:'flex',alignItems:'center',gap:10}}>
                            {game?.awayLogo&&(
                                <img src={game.awayLogo} style={{width:40,height:40,borderRadius:8,objectFit:'cover',border:'1px solid var(--border)'}}/>
                            )}
                            <label style={{flex:1,padding:'9px 14px',borderRadius:10,border:'1px dashed var(--border)',background:'var(--surface2)',cursor:'pointer',fontSize:12,color:'var(--muted)',textAlign:'center'}}>
                                {game?.awayLogo?'Alterar logo':'+ Carregar logo'}
                                <input type="file" accept="image/*" style={{display:'none'}} onChange={async e=>{
                                    const f=e.target.files[0]; if(!f) return;
                                    const compressed=await compressImage(f);
                                    setFolders(prev=>prev.map(fo=>fo.id!==currentFolderId?fo:{...fo,games:fo.games.map(g=>g.id!==editModal.gameId?g:{...g,awayLogo:compressed})}));
                                    showToast('Logo guardado');
                                }}/>
                            </label>
                            {game?.awayLogo&&(
                                <button onClick={()=>setFolders(prev=>prev.map(fo=>fo.id!==currentFolderId?fo:{...fo,games:fo.games.map(g=>g.id!==editModal.gameId?g:{...g,awayLogo:null})}))}
                                    style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:18,padding:4}}>✕</button>
                            )}
                        </div>
                    </div>
                    <div className="modal-actions">
                        <button className="btn-ghost" style={{flex:1}} onClick={()=>setEditModal(null)}>Cancelar</button>
                        <button className="btn-save" style={{flex:2,padding:'11px'}} onClick={saveEditGame}>Guardar</button>
                    </div>
                </div>
            </div>
        );
    };

    /* ── Clip URL Modal ── */
    const renderClipModal=()=>{
        if(!clipModal) return null;
        const isGame = clipModal.mode==='game';
        const currentClip = isGame ? currentGame?.videoUrl : currentGame?.events[clipModal.eventIdx]?.clipUrl;
        const eventName = !isGame && currentGame?.events[clipModal.eventIdx]
            ? `${fmtMin(currentGame.events[clipModal.eventIdx].time)} ${currentGame.events[clipModal.eventIdx].name}`
            : '';
        const fileRef = React.createRef();

        const handleSave = ()=>{
            if(!clipUrlInput.trim()){ showToast('URL vazio'); return; }
            if(isGame) saveGameVideo(clipUrlInput);
            else saveEventClip(clipModal.eventIdx, clipUrlInput);
            setClipModal(null);
        };

        const handleRemove = ()=>{
            if(isGame) updateGame(g=>({...g,videoUrl:''}));
            else removeEventClip(clipModal.eventIdx);
            setClipModal(null);
        };

        const handleFile = async(file)=>{
            if(!file) return;
            const url = URL.createObjectURL(file);
            setClipUrlInput(url);
        };

        return(
            <div className="modal-overlay" onClick={()=>setClipModal(null)}>
                <div className="modal-box" onClick={e=>e.stopPropagation()} style={{maxWidth:440}}>
                    <div className="modal-title">{isGame?'Vídeo do Jogo':'Clip do Evento'}</div>
                    {!isGame&&<div style={{fontSize:12,color:'var(--muted)',marginBottom:14,fontWeight:600}}>{eventName}</div>}

                    <div className="form-field">
                        <label className="form-label">URL do vídeo</label>
                        <input className="form-input" value={clipUrlInput} onChange={e=>setClipUrlInput(e.target.value)}
                            placeholder="YouTube, Google Drive, OneDrive, MP4..."
                            style={{width:'100%'}}
                            autoFocus={false}/>
                    </div>

                    {/* Supported formats info */}
                    <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:14}}>
                        {['YouTube','Google Drive','OneDrive','MP4 / WebM','Vimeo'].map(s=>(
                            <span key={s} style={{fontSize:10,fontWeight:700,color:'var(--muted)',background:'var(--surface2)',padding:'3px 8px',borderRadius:20,border:'1px solid var(--border)'}}>
                                {s}
                            </span>
                        ))}
                    </div>

                    <div className="form-field">
                        <label className="form-label">Ou carregar ficheiro</label>
                        <label style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,padding:'12px',borderRadius:'var(--radius)',border:'1.5px dashed var(--border2)',background:'var(--surface2)',cursor:'pointer',color:'var(--muted)',fontSize:12,fontWeight:700,minHeight:44}}>
                            <span style={{fontSize:18}}>📎</span>
                            Selecionar ficheiro de vídeo
                            <input type="file" accept="video/*" style={{display:'none'}} onChange={e=>handleFile(e.target.files[0])}/>
                        </label>
                    </div>

                    {/* Preview */}
                    {clipUrlInput&&parseVideoUrl(clipUrlInput)&&(
                        <div style={{marginBottom:14,padding:'8px 12px',background:'rgba(255,87,34,0.08)',border:'1px solid rgba(255,87,34,0.2)',borderRadius:8,display:'flex',alignItems:'center',gap:8}}>
                            <span style={{fontSize:16}}>✓</span>
                            <span style={{fontSize:11,color:'var(--accent)',fontWeight:700}}>
                                URL reconhecido: {parseVideoUrl(clipUrlInput)?.type}
                            </span>
                        </div>
                    )}

                    <div className="modal-actions">
                        {currentClip&&<button className="btn-ghost" style={{color:'var(--red)',borderColor:'rgba(244,67,54,0.3)'}} onClick={handleRemove}>Remover</button>}
                        <button className="btn-ghost" style={{flex:1}} onClick={()=>setClipModal(null)}>Cancelar</button>
                        <button className="btn-save" style={{flex:2,padding:'11px'}} onClick={handleSave}>Guardar</button>
                    </div>
                </div>
            </div>
        );
    };

    /* ── Video Player Modal ── */
    const renderVideoModal=()=>{
        if(!videoModal) return null;
        return <VideoPlayer url={videoModal.url} title={videoModal.title} onClose={()=>setVideoModal(null)}/>;
    };
    const renderShareDrawer=()=>(
        <div className="filter-overlay" onClick={()=>setShowShare(false)}>
            <div className="filter-drawer" onClick={e=>e.stopPropagation()}>
                <div className="drawer-handle"/>
                <div className="drawer-title">↗ Partilhar Relatório</div>
                <div style={{fontSize:11,color:'var(--muted)',marginBottom:16,marginTop:-8}}>
                    {currentGame?.opponent} · {currentGame?.stats.find(s=>s.name==='Golo')?.count||0}–{currentGame?.stats.find(s=>s.name==='Golo Sofr.')?.count||0} · {currentGame?.date}
                </div>
                <div className="share-btn-row">
                    <button className="share-option" onClick={()=>{setShowShare(false);exportPDF(false);}}>
                        <div className="share-option-icon" style={{background:'rgba(230,237,243,0.08)'}}>📄</div>
                        <div className="share-option-text">
                            <div className="share-option-title">Guardar PDF</div>
                            <div className="share-option-sub">Download para o dispositivo</div>
                        </div>
                        <span style={{color:'var(--muted)',fontSize:16}}>›</span>
                    </button>
                    <button className="share-option" onClick={handleShareNative}>
                        <div className="share-option-icon" style={{background:'rgba(255,87,34,0.15)'}}>📤</div>
                        <div className="share-option-text">
                            <div className="share-option-title">Partilhar PDF</div>
                            <div className="share-option-sub">WhatsApp, Email, AirDrop…</div>
                        </div>
                        <span style={{color:'var(--muted)',fontSize:16}}>›</span>
                    </button>
                    <button className="share-option" onClick={handleShareWhatsApp}>
                        <div className="share-option-icon" style={{background:'rgba(37,211,102,0.15)'}}>💬</div>
                        <div className="share-option-text">
                            <div className="share-option-title">WhatsApp</div>
                            <div className="share-option-sub">Enviar resumo como mensagem</div>
                        </div>
                        <span style={{color:'var(--muted)',fontSize:16}}>›</span>
                    </button>
                    <button className="share-option" onClick={handleShareEmail}>
                        <div className="share-option-icon" style={{background:'rgba(255,87,34,0.12)'}}>📧</div>
                        <div className="share-option-text">
                            <div className="share-option-title">Email</div>
                            <div className="share-option-sub">Abrir cliente de email</div>
                        </div>
                        <span style={{color:'var(--muted)',fontSize:16}}>›</span>
                    </button>
                    <button className="share-option" onClick={handleCopyText}>
                        <div className="share-option-icon" style={{background:'rgba(255,214,0,0.12)'}}>📋</div>
                        <div className="share-option-text">
                            <div className="share-option-title">Copiar Resumo</div>
                            <div className="share-option-sub">Texto formatado para colar</div>
                        </div>
                        <span style={{color:'var(--muted)',fontSize:16}}>›</span>
                    </button>
                </div>
            </div>
        </div>
    );

    /* ════════════════════════════════════
       MAIN RENDER
    ════════════════════════════════════ */
    return (
        <div style={{position:'relative',width:'100%',height:'100vh',background:'var(--bg)',overflow:'hidden'}}>
            {/* Loading splash */}
            {!dataLoaded&&(
                <div style={{position:'absolute',inset:0,background:'var(--bg)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16,zIndex:500}}>
                    <div style={{fontFamily:'Barlow Condensed',fontSize:32,letterSpacing:4,color:'var(--accent)'}}>SoccerAnalyst</div>
                    <div style={{fontFamily:'Barlow Condensed',fontSize:14,letterSpacing:6,color:'var(--muted)'}}>PRO</div>
                    <div style={{marginTop:8,width:120,height:3,background:'var(--border)',borderRadius:2,overflow:'hidden'}}>
                        <div style={{height:'100%',background:'var(--accent)',borderRadius:2,animation:'loadBar 1.2s ease-in-out infinite'}}/>
                    </div>
                    <style>{`@keyframes loadBar{0%{width:0%;margin-left:0%}50%{width:70%;margin-left:15%}100%{width:0%;margin-left:100%}}`}</style>
                </div>
            )}
            {view==='folders' && renderFolders()}
            {view==='squad'   && renderSquad()}
            {view==='games'   && renderGames()}
            {view==='tracking'&& renderTracking()}
            {view==='report'  && renderReport()}
            <BottomNav
                view={view}
                setView={setView}
                hasGame={!!currentGame}
                hasFolder={!!currentFolder}
            />
            {convocView && renderConvocation()}
            {showShare && renderShareDrawer()}
            {playerPicker && renderPlayerPicker()}
            {editModal && renderEditModal()}
            {clipModal && renderClipModal()}
            {videoModal && renderVideoModal()}
            {pdfProgress!==null&&(
                <div className="pdf-progress-overlay">
                    <div style={{fontFamily:'Barlow Condensed',fontSize:20,letterSpacing:3,color:'var(--text)'}}>A GERAR PDF</div>
                    <div className="pdf-progress-bar-wrap">
                        <div className="pdf-progress-bar" style={{width:`${pdfProgress}%`}}/>
                    </div>
                    <div style={{fontSize:11,color:'var(--muted)',fontWeight:700}}>{pdfProgress}%</div>
                </div>
            )}
            <SaveIndicator status={saveStatus}/>
            {toast&&<Toast message={toast.msg} isGoal={toast.goal} onClose={()=>setToast(null)}/>}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
