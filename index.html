<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SoccerAnalyst Pro - Ultra Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { 
            background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
            touch-action: manipulation; 
            color: white; 
            overflow: hidden; 
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-btn:active { transform: scale(0.96); opacity: 0.8; }
        .timeline-bar { 
            height: 50px; 
            background: linear-gradient(90deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            border-radius: 12px; 
            position: relative; 
            border: 1px solid #1e293b; 
            margin-top: 25px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }
        .event-marker { 
            position: absolute; 
            width: 3px; 
            height: 100%; 
            top: 0; 
            transform: translateX(-50%);
            cursor: pointer;
            transition: all 0.2s;
        }
        .event-marker:hover {
            width: 5px;
            filter: brightness(1.3);
        }
        .goal-marker { 
            position: absolute; 
            width: 5px; 
            height: 100%; 
            top: 0; 
            background: linear-gradient(180deg, #fbbf24 0%, #f59e0b 100%);
            z-index: 10; 
            box-shadow: 0 0 15px #fbbf24, 0 0 30px rgba(251, 191, 36, 0.5);
            transform: translateX(-50%);
            cursor: pointer;
            animation: pulse-gold 2s infinite;
        }
        @keyframes pulse-gold {
            0%, 100% { box-shadow: 0 0 15px #fbbf24, 0 0 30px rgba(251, 191, 36, 0.5); }
            50% { box-shadow: 0 0 25px #fbbf24, 0 0 50px rgba(251, 191, 36, 0.8); }
        }
        .time-label { 
            position: absolute; 
            top: -20px; 
            left: 50%; 
            transform: translateX(-50%); 
            font-size: 9px; 
            font-weight: 900; 
            color: #475569;
            background: #020617;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(79, 70, 229, 0.4);
            z-index: 9999;
            animation: slideIn 0.3s ease-out;
            font-weight: 800;
            font-size: 12px;
            text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.2);
        }
        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(400px); opacity: 0; }
        }
        .stat-flash {
            animation: flash 0.3s ease-out;
        }
        @keyframes flash {
            0% { background: #4f46e5; transform: scale(1.05); }
            100% { background: inherit; transform: scale(1); }
        }
        .swipe-delete {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent 0%, #dc2626 100%);
            width: 100px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 20px;
            border-radius: 0 24px 24px 0;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .game-card {
            position: relative;
            overflow: hidden;
            transition: transform 0.2s;
        }
        .game-card:active .swipe-delete {
            opacity: 1;
        }
        .period-indicator {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 900;
            margin-left: 8px;
        }
        .card-gradient {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }
        .glow-border {
            box-shadow: 0 0 20px rgba(79, 70, 229, 0.3);
        }
        .slide-enter {
            animation: slideEnter 0.3s ease-out;
        }
        @keyframes slideEnter {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body class="font-sans select-none">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const INITIAL_STATS = [
            { id: 1, name: 'Golo', count: 0, type: 'ataque' },
            { id: 2, name: 'Remate', count: 0, type: 'ataque' },
            { id: 3, name: 'Rem. Enquad.', count: 0, type: 'ataque' },
            { id: 4, name: 'Cantos', count: 0, type: 'ataque' },
            { id: 5, name: 'Rem. Área', count: 0, type: 'ataque' },
            { id: 6, name: 'Cruzam.', count: 0, type: 'ataque' },
            { id: 7, name: 'Golo Sofr.', count: 0, type: 'defesa' },
            { id: 8, name: 'Recuper.', count: 0, type: 'defesa' },
            { id: 9, name: 'Rem. Conc.', count: 0, type: 'defesa' },
            { id: 10, name: 'Rem. Área C.', count: 0, type: 'defesa' },
            { id: 11, name: 'Perdas Bola', count: 0, type: 'defesa' },
            { id: 12, name: 'Faltas', count: 0, type: 'defesa' }
        ];

        // Toast Component
        function Toast({ message, onClose }) {
            useEffect(() => {
                const timer = setTimeout(() => {
                    onClose();
                }, 2500);
                return () => clearTimeout(timer);
            }, [onClose]);

            return (
                <div className="toast">
                    {message}
                </div>
            );
        }

        function App() {
            const [view, setView] = useState('folders'); 
            const [folders, setFolders] = useState(() => JSON.parse(localStorage.getItem('soccer_final_db')) || []);
            const [currentFolderId, setCurrentFolderId] = useState(null);
            const [currentGame, setCurrentGame] = useState(null);
            const [isActive, setIsActive] = useState(false);
            const [showNotes, setShowNotes] = useState(false);
            const [toast, setToast] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [sortBy, setSortBy] = useState('date'); // 'date' or 'name'
            const [eventFilter, setEventFilter] = useState('all'); // 'all', 'golos', 'ataque', 'defesa'
            const [lastSaved, setLastSaved] = useState(null);

            useEffect(() => { 
                localStorage.setItem('soccer_final_db', JSON.stringify(folders)); 
                setLastSaved(new Date());
            }, [folders]);

            useEffect(() => {
                let interval = null;
                if (isActive && currentGame) {
                    interval = setInterval(() => { 
                        updateCurrentGameData('time', currentGame.time + 1); 
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [isActive, currentGame]);

            // Keyboard shortcuts
            useEffect(() => {
                const handleKey = (e) => {
                    if (view === 'tracking' && currentGame) {
                        if (e.code === 'Space' && !e.target.matches('textarea, input')) {
                            e.preventDefault();
                            setIsActive(!isActive);
                            showToast(isActive ? '⏸ Cronómetro Pausado' : '▶ Cronómetro Iniciado');
                        }
                    }
                };
                window.addEventListener('keydown', handleKey);
                return () => window.removeEventListener('keydown', handleKey);
            }, [view, isActive, currentGame]);

            const showToast = (message) => {
                setToast(message);
            };

            const updateCurrentGameData = (field, value) => {
                const updatedFolders = folders.map(f => {
                    if (f.id === currentFolderId) {
                        return { ...f, games: f.games.map(g => g.id === currentGame.id ? { ...g, [field]: value } : g) };
                    }
                    return f;
                });
                setFolders(updatedFolders);
                setCurrentGame(prev => ({ ...prev, [field]: value }));
            };

            const formatFullTime = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;

            const getPeriodLabel = (time) => {
                const minutes = Math.floor(time / 60);
                if (minutes < 45) return { label: '1º TEMPO', color: 'bg-green-600' };
                if (minutes < 90) return { label: '2º TEMPO', color: 'bg-blue-600' };
                return { label: 'PRORROG.', color: 'bg-orange-600' };
            };

            const handleDeleteGame = (e, gameId) => {
                e.preventDefault();
                e.stopPropagation();
                if(window.confirm("ELIMINAR JOGO?\nEsta ação não pode ser desfeita.")) {
                    const newFolders = folders.map(f => {
                        if (f.id === currentFolderId) {
                            return { ...f, games: f.games.filter(g => g.id !== gameId) };
                        }
                        return f;
                    });
                    setFolders(newFolders);
                    showToast('🗑️ Jogo Eliminado');
                }
            };

            const duplicateGame = (e, game) => {
                e.preventDefault();
                e.stopPropagation();
                const newGame = {
                    ...game,
                    id: Date.now(),
                    opponent: `${game.opponent} (Cópia)`,
                    time: 0,
                    events: [],
                    date: new Date().toLocaleDateString('pt-PT')
                };
                const newFolders = folders.map(f => {
                    if (f.id === currentFolderId) {
                        return { ...f, games: [newGame, ...f.games] };
                    }
                    return f;
                });
                setFolders(newFolders);
                showToast('📋 Jogo Duplicado');
            };

            const addStat = (id) => {
                if(!isActive) {
                    showToast('⚠️ Inicia o Cronómetro!');
                    return;
                }
                const stat = currentGame.stats.find(s => s.id === id);
                const isGoal = stat.name.toLowerCase().includes('golo');
                const newStats = currentGame.stats.map(s => s.id === id ? { ...s, count: s.count + 1 } : s);
                const newEvent = { time: currentGame.time, type: stat.type, name: stat.name, isGoal, statId: id };
                updateCurrentGameData('stats', newStats);
                updateCurrentGameData('events', [...currentGame.events, newEvent]);
                
                // Haptic feedback (mobile)
                if (navigator.vibrate) {
                    navigator.vibrate(isGoal ? [50, 50, 50] : 30);
                }
                
                showToast(isGoal ? '⚽ GOLOOO!' : `✓ ${stat.name}`);
            };

            const removeStat = (id) => {
                const stat = currentGame.stats.find(s => s.id === id);
                if (stat.count <= 0) return;
                const newStats = currentGame.stats.map(s => s.id === id ? { ...s, count: s.count - 1 } : s);
                const lastEventIndex = [...currentGame.events].reverse().findIndex(e => e.statId === id);
                let newEvents = [...currentGame.events];
                if (lastEventIndex !== -1) {
                    newEvents.splice(currentGame.events.length - 1 - lastEventIndex, 1);
                }
                updateCurrentGameData('stats', newStats);
                updateCurrentGameData('events', newEvents);
                showToast(`↩️ ${stat.name} removido`);
            };

            const getFolderStats = (folder) => {
                if (!folder.games.length) return null;
                const totalGames = folder.games.length;
                const totalGoals = folder.games.reduce((sum, g) => {
                    const golos = g.stats.find(s => s.name === 'Golo')?.count || 0;
                    return sum + golos;
                }, 0);
                const totalGoalsSuffered = folder.games.reduce((sum, g) => {
                    const golosSofr = g.stats.find(s => s.name === 'Golo Sofr.')?.count || 0;
                    return sum + golosSofr;
                }, 0);
                const totalRemates = folder.games.reduce((sum, g) => {
                    const remates = g.stats.find(s => s.name === 'Remate')?.count || 0;
                    return sum + remates;
                }, 0);
                const eficacia = totalRemates > 0 ? ((totalGoals / totalRemates) * 100).toFixed(1) : 0;
                
                return { totalGames, totalGoals, totalGoalsSuffered, eficacia };
            };

            const exportPDF = async () => {
                showToast('📄 Gerando PDF...');
                const element = document.getElementById('report-area');
                const canvas = await html2canvas(element, { backgroundColor: '#020617', scale: 2, useCORS: true });
                const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, (canvas.height * 210) / canvas.width);
                pdf.save(`Relatorio_${currentGame.opponent}.pdf`);
                showToast('✓ PDF Descarregado');
            };

            const getFilteredEvents = () => {
                if (eventFilter === 'all') return currentGame.events;
                if (eventFilter === 'golos') return currentGame.events.filter(e => e.isGoal);
                return currentGame.events.filter(e => e.type === eventFilter);
            };

            if (view === 'folders') return (
                <div className="p-6 h-screen bg-slate-950 overflow-y-auto slide-enter">
                    <div className="flex justify-between items-center mb-8">
                        <h1 className="text-3xl font-black text-indigo-500 italic uppercase tracking-tighter">SoccerAnalyst Pro</h1>
                        {lastSaved && <span className="text-[9px] text-slate-600 font-bold">✓ Auto-saved</span>}
                    </div>
                    <button onClick={() => {const n = prompt("Nome da Pasta:"); if(n) { setFolders([{id: Date.now(), name: n, games: []}, ...folders]); showToast('✓ Pasta Criada'); }}} className="w-full p-5 mb-6 border-2 border-dashed border-slate-800 rounded-3xl text-slate-500 font-bold active-btn hover:border-indigo-500 transition-all">+ Nova Pasta</button>
                    <div className="space-y-4">
                        {folders.map(f => {
                            const stats = getFolderStats(f);
                            return (
                                <div key={f.id} onClick={() => {setCurrentFolderId(f.id); setView('games')}} className="card-gradient p-6 rounded-3xl active-btn border border-slate-800 hover:glow-border transition-all cursor-pointer">
                                    <div className="flex justify-between items-start mb-3">
                                        <div className="flex-1">
                                            <h3 className="font-black text-white uppercase italic text-lg mb-1">{f.name}</h3>
                                            <p className="text-[10px] text-indigo-500 font-bold uppercase">{f.games.length} Jogos</p>
                                        </div>
                                        <button onClick={(e) => { e.stopPropagation(); if(confirm("Apagar pasta inteira?")) { setFolders(folders.filter(fold => fold.id !== f.id)); showToast('🗑️ Pasta Eliminada'); }}} className="text-slate-700 text-xs font-bold bg-slate-800 px-3 py-1 rounded-lg hover:bg-red-900 transition-all">Eliminar</button>
                                    </div>
                                    {stats && (
                                        <div className="grid grid-cols-3 gap-2 pt-3 border-t border-slate-800/50">
                                            <div className="text-center">
                                                <div className="text-2xl font-black text-green-500">{stats.totalGoals}</div>
                                                <div className="text-[8px] text-slate-600 font-bold uppercase">Golos</div>
                                            </div>
                                            <div className="text-center">
                                                <div className="text-2xl font-black text-red-500">{stats.totalGoalsSuffered}</div>
                                                <div className="text-[8px] text-slate-600 font-bold uppercase">Sofridos</div>
                                            </div>
                                            <div className="text-center">
                                                <div className="text-2xl font-black text-indigo-400">{stats.eficacia}%</div>
                                                <div className="text-[8px] text-slate-600 font-bold uppercase">Eficácia</div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                    {toast && <Toast message={toast} onClose={() => setToast(null)} />}
                </div>
            );

            if (view === 'games') {
                const folder = folders.find(f => f.id === currentFolderId);
                const filteredGames = folder.games.filter(g => 
                    g.opponent.toLowerCase().includes(searchTerm.toLowerCase())
                );
                const sortedGames = [...filteredGames].sort((a, b) => {
                    if (sortBy === 'date') {
                        return new Date(b.date.split('/').reverse().join('-')) - new Date(a.date.split('/').reverse().join('-'));
                    }
                    return a.opponent.localeCompare(b.opponent);
                });

                return (
                    <div className="p-6 h-screen bg-slate-950 overflow-y-auto slide-enter">
                        <button onClick={() => setView('folders')} className="text-[10px] font-black text-slate-500 mb-6 uppercase tracking-widest hover:text-indigo-500 transition-all">← Voltar</button>
                        <h2 className="text-2xl font-black mb-6 uppercase italic text-indigo-400 border-l-4 border-indigo-500 pl-4">{folder.name}</h2>
                        
                        <div className="mb-6 space-y-3">
                            <input 
                                type="text" 
                                placeholder="🔍 Pesquisar jogo..." 
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                                className="w-full p-4 bg-slate-900 border border-slate-800 rounded-2xl text-sm text-white outline-none focus:border-indigo-500 transition-all"
                            />
                            <div className="flex gap-2">
                                <button onClick={() => setSortBy('date')} className={`flex-1 py-2 rounded-xl text-xs font-bold uppercase ${sortBy === 'date' ? 'bg-indigo-600' : 'bg-slate-800'} transition-all`}>Data</button>
                                <button onClick={() => setSortBy('name')} className={`flex-1 py-2 rounded-xl text-xs font-bold uppercase ${sortBy === 'name' ? 'bg-indigo-600' : 'bg-slate-800'} transition-all`}>Nome</button>
                            </div>
                        </div>

                        <button onClick={() => {const o = prompt("Adversário:"); if(o) { setFolders(folders.map(f => f.id === currentFolderId ? {...f, games: [{id: Date.now(), opponent: o, time: 0, stats: INITIAL_STATS, events: [], notes: "", pic: null, date: new Date().toLocaleDateString('pt-PT')}, ...f.games]} : f)); showToast('✓ Jogo Adicionado'); }}} className="w-full p-5 bg-gradient-to-r from-indigo-600 to-purple-600 rounded-3xl font-black uppercase italic mb-8 shadow-xl active-btn hover:shadow-2xl transition-all">+ Adicionar Jogo</button>
                        
                        <div className="space-y-4">
                            {sortedGames.map(g => {
                                const golos = g.stats.find(s => s.name === 'Golo')?.count || 0;
                                const golosSofr = g.stats.find(s => s.name === 'Golo Sofr.')?.count || 0;
                                return (
                                    <div key={g.id} onClick={() => {setCurrentGame(g); setView('tracking')}} className="game-card card-gradient p-5 rounded-3xl flex justify-between items-center active-btn border border-slate-800 hover:glow-border transition-all cursor-pointer">
                                        <div className="flex flex-col flex-1">
                                            <div className="flex items-center gap-2">
                                                <span className="font-black uppercase italic tracking-tight">{g.opponent}</span>
                                                <span className="text-lg font-black text-green-500">{golos}</span>
                                                <span className="text-slate-700">-</span>
                                                <span className="text-lg font-black text-red-500">{golosSofr}</span>
                                            </div>
                                            <span className="text-[10px] text-slate-600 font-bold">{g.date}</span>
                                        </div>
                                        <div className="flex gap-2">
                                            <button 
                                                onClick={(e) => duplicateGame(e, g)} 
                                                className="w-10 h-10 flex items-center justify-center bg-blue-600/10 rounded-xl text-blue-400 border border-blue-500/20 hover:bg-blue-600 hover:text-white transition-all text-lg"
                                            >📋</button>
                                            <button 
                                                onClick={(e) => handleDeleteGame(e, g.id)} 
                                                className="w-10 h-10 flex items-center justify-center bg-red-600/10 rounded-xl text-red-500 border border-red-500/20 hover:bg-red-600 hover:text-white transition-all text-lg"
                                            >🗑️</button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                        {toast && <Toast message={toast} onClose={() => setToast(null)} />}
                    </div>
                );
            }

            // REPORT VIEW
            if (view === 'report') {
                const golos = currentGame.stats.find(s => s.name === 'Golo')?.count || 0;
                const remates = currentGame.stats.find(s => s.name === 'Remate')?.count || 0;
                const eficacia = remates > 0 ? ((golos / remates) * 100).toFixed(1) : 0;
                const totalAtaque = currentGame.stats.filter(s => s.type === 'ataque').reduce((sum, s) => sum + s.count, 0);
                const totalDefesa = currentGame.stats.filter(s => s.type === 'defesa').reduce((sum, s) => sum + s.count, 0);
                const filteredEvents = getFilteredEvents();

                return (
                    <div className="h-screen flex flex-col bg-slate-950 text-white">
                        <div className="p-4 flex justify-between border-b border-slate-800 shrink-0 bg-slate-900">
                            <button onClick={() => setView('tracking')} className="text-xs font-bold text-slate-400 uppercase hover:text-indigo-400 transition-all">← Painel</button>
                            <div className="flex gap-2">
                                <select 
                                    value={eventFilter} 
                                    onChange={(e) => setEventFilter(e.target.value)}
                                    className="bg-slate-800 text-white px-3 py-2 rounded-xl text-xs font-bold outline-none border border-slate-700"
                                >
                                    <option value="all">Todos Eventos</option>
                                    <option value="golos">Só Golos</option>
                                    <option value="ataque">Ataque</option>
                                    <option value="defesa">Defesa</option>
                                </select>
                                <button onClick={exportPDF} className="bg-white text-black px-6 py-2 rounded-xl font-black text-[10px] uppercase italic active-btn shadow-lg hover:shadow-xl transition-all">Baixar PDF</button>
                            </div>
                        </div>
                        <div id="report-area" className="flex-1 overflow-y-auto p-10 bg-slate-950">
                            <div className="flex justify-between items-start mb-8">
                                <div>
                                    <h2 className="text-5xl font-black italic uppercase text-indigo-500 mb-2">{currentGame.opponent}</h2>
                                    <p className="text-slate-500 font-bold text-xs uppercase tracking-widest">{currentGame.date} | FINAL: {formatFullTime(currentGame.time)}</p>
                                    <div className="mt-4 flex gap-4">
                                        <div className="text-center">
                                            <div className="text-4xl font-black text-green-500">{golos}</div>
                                            <div className="text-[10px] text-slate-600 font-bold uppercase">Golos</div>
                                        </div>
                                        <div className="text-center">
                                            <div className="text-4xl font-black text-indigo-400">{eficacia}%</div>
                                            <div className="text-[10px] text-slate-600 font-bold uppercase">Eficácia</div>
                                        </div>
                                    </div>
                                </div>
                                {currentGame.pic && <img src={currentGame.pic} className="w-32 h-32 rounded-2xl object-cover border-2 border-slate-800 shadow-2xl" />}
                            </div>

                            {/* Gráfico de comparação */}
                            <div className="mb-12 p-6 bg-slate-900/50 rounded-3xl border border-slate-800">
                                <h3 className="text-[10px] font-black uppercase text-slate-500 mb-4 tracking-widest text-center">Distribuição de Ações</h3>
                                <div className="flex gap-4 items-center">
                                    <div className="flex-1">
                                        <div className="h-8 bg-indigo-600 rounded-lg flex items-center justify-end px-3" style={{width: `${(totalAtaque / (totalAtaque + totalDefesa)) * 100}%`}}>
                                            <span className="text-xs font-black">{totalAtaque}</span>
                                        </div>
                                        <div className="text-[10px] text-indigo-400 font-bold uppercase mt-2">Ataque</div>
                                    </div>
                                    <div className="flex-1">
                                        <div className="h-8 bg-red-600 rounded-lg flex items-center justify-start px-3" style={{width: `${(totalDefesa / (totalAtaque + totalDefesa)) * 100}%`}}>
                                            <span className="text-xs font-black">{totalDefesa}</span>
                                        </div>
                                        <div className="text-[10px] text-red-500 font-bold uppercase mt-2">Defesa</div>
                                    </div>
                                </div>
                            </div>

                            <div className="mb-16">
                                <h3 className="text-[10px] font-black uppercase text-slate-500 mb-4 tracking-widest text-center">
                                    Cronologia {eventFilter !== 'all' && `(${eventFilter === 'golos' ? 'Golos' : eventFilter})`}
                                </h3>
                                <div className="timeline-bar">
                                    {filteredEvents.map((e, i) => (
                                        <div 
                                            key={i} 
                                            className={e.isGoal ? 'goal-marker' : 'event-marker ' + (e.type === 'ataque' ? 'bg-indigo-500' : 'bg-red-600')} 
                                            style={{ left: `${(e.time / (currentGame.time || 1)) * 100}%` }}
                                            title={`${Math.floor(e.time/60)}' - ${e.name}`}
                                        >
                                            {(e.isGoal || i % 5 === 0) && <span className="time-label">{Math.floor(e.time/60)}'</span>}
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-12 text-white mb-12">
                                {['ataque', 'defesa'].map(type => (
                                    <div key={type}>
                                        <h4 className={`text-xl font-black uppercase italic mb-6 border-l-4 pl-3 ${type === 'ataque' ? 'border-indigo-500 text-indigo-400' : 'border-red-600 text-red-500'}`}>{type}</h4>
                                        {currentGame.stats.filter(s => s.type === type).map(s => (
                                            <div key={s.id} className="flex justify-between items-center border-b border-slate-900 py-3 text-white">
                                                <span className="text-[10px] font-bold text-slate-500 uppercase">{s.name}</span>
                                                <span className="text-xl font-black text-white">{s.count}</span>
                                            </div>
                                        ))}
                                    </div>
                                ))}
                            </div>

                            {currentGame.notes && (
                                <div className="p-8 bg-slate-900 rounded-3xl italic text-slate-300 text-sm border border-slate-800 shadow-2xl">
                                    <div className="text-[10px] font-black uppercase text-slate-600 mb-3">Notas</div>
                                    "{currentGame.notes}"
                                </div>
                            )}

                            <div className="mt-12 text-center text-[10px] text-slate-700 font-bold uppercase tracking-widest">
                                SoccerAnalyst Pro - Relatório Gerado em {new Date().toLocaleDateString('pt-PT')}
                            </div>
                        </div>
                        {toast && <Toast message={toast} onClose={() => setToast(null)} />}
                    </div>
                );
            }

            // TRACKING (MAIN)
            const period = getPeriodLabel(currentGame.time);
            return (
                <div className="h-screen flex flex-col bg-slate-950 overflow-hidden">
                    <header className="p-3 bg-slate-900 border-b border-slate-800 flex justify-between items-center shrink-0 shadow-xl">
                        <div className="flex items-center gap-3">
                            <div className="bg-slate-950 px-4 py-2 rounded-xl border border-slate-800 text-2xl font-mono font-black text-indigo-400 tracking-tighter shadow-inner">
                                {formatFullTime(currentGame.time)}
                                <span className={`period-indicator ${period.color} text-white ml-2`}>
                                    {period.label}
                                </span>
                            </div>
                            <button 
                                onClick={() => {
                                    if (currentGame.events.length > 0) {
                                        removeStat(currentGame.events[currentGame.events.length - 1].statId);
                                    }
                                }} 
                                className="bg-slate-800 w-12 h-12 rounded-xl flex items-center justify-center active-btn border border-slate-700 shadow-lg text-xl hover:bg-slate-700 transition-all"
                            >↩</button>
                        </div>
                        <div className="flex gap-2">
                            <div className="relative w-12 h-12 bg-slate-800 rounded-xl flex items-center justify-center border border-slate-700 active-btn overflow-hidden shadow-lg hover:border-indigo-500 transition-all">
                                {currentGame.pic ? <img src={currentGame.pic} className="w-full h-full object-cover" /> : <span className="text-2xl">📷</span>}
                                <input type="file" onChange={(e) => {const f=e.target.files[0]; if(f){const r=new FileReader(); r.onloadend=()=>{updateCurrentGameData('pic', r.result); showToast('✓ Foto Adicionada');}; r.readAsDataURL(f)}}} className="absolute inset-0 opacity-0 cursor-pointer" />
                            </div>
                            <button onClick={() => {setShowNotes(!showNotes); if(!showNotes) showToast('📝 Editor de Notas');}} className={`w-12 h-12 rounded-xl flex items-center justify-center border border-slate-700 text-xl transition-all ${currentGame.notes ? 'bg-indigo-600 shadow-lg shadow-indigo-500/50' : 'bg-slate-800'}`}>📝</button>
                            <button onClick={() => {setIsActive(!isActive); showToast(isActive ? '⏸ Pausado' : '▶ Iniciado');}} className={`px-5 rounded-xl font-black text-xs uppercase transition-all shadow-lg ${isActive ? 'bg-red-600 animate-pulse' : 'bg-green-600'}`}>{isActive ? 'STOP' : 'START'}</button>
                            <button onClick={() => setView('report')} className="bg-white text-black px-5 rounded-xl text-xs font-black uppercase italic active-btn shadow-lg hover:shadow-xl transition-all">PDF</button>
                        </div>
                    </header>

                    {showNotes && (
                        <div className="p-4 bg-slate-900 border-b border-slate-800 shrink-0 slide-enter">
                            <textarea 
                                value={currentGame.notes} 
                                onChange={(e) => updateCurrentGameData('notes', e.target.value)} 
                                placeholder="✍️ Escreve as tuas observações aqui..." 
                                className="w-full h-24 bg-slate-950 border border-slate-800 rounded-2xl p-4 text-xs text-white outline-none focus:border-indigo-500 transition-all resize-none"
                            />
                        </div>
                    )}

                    <div className="flex-1 flex overflow-hidden">
                        {['ataque', 'defesa'].map(type => (
                            <div key={type} className="flex-1 flex flex-col border-r border-slate-900 last:border-r-0">
                                <div className="flex justify-between items-center px-4 py-3 bg-slate-900/50 border-b border-slate-800">
                                    <span className={`${type === 'ataque' ? 'text-indigo-400' : 'text-red-500'} text-[10px] font-black uppercase italic tracking-widest`}>{type}</span>
                                    <button 
                                        onClick={() => {
                                            const n=prompt("Nova ação:"); 
                                            if(n) {
                                                updateCurrentGameData('stats', [...currentGame.stats, {id: Date.now(), name: n, count: 0, type}]);
                                                showToast('✓ Nova Ação Criada');
                                            }
                                        }} 
                                        className="text-lg bg-slate-800 w-8 h-8 rounded-lg flex items-center justify-center border border-slate-700 hover:bg-indigo-600 transition-all active-btn"
                                    >+</button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-2 space-y-3 no-scrollbar pb-32">
                                    {currentGame.stats.filter(s => s.type === type).map(s => (
                                        <div key={s.id} className="flex items-stretch gap-1">
                                            <button 
                                                onClick={() => addStat(s.id)} 
                                                className="stat-btn flex-1 h-20 card-gradient rounded-2xl flex items-center px-4 border-l-4 border-slate-800 active:border-indigo-500 shadow-xl active-btn transition-all hover:glow-border"
                                            >
                                                <span className={`text-3xl font-black mr-3 italic transition-all ${s.count > 0 ? 'text-white' : 'text-slate-800'}`}>{s.count}</span>
                                                <span className="text-[11px] font-black uppercase text-slate-400 text-left leading-tight tracking-tighter">{s.name}</span>
                                            </button>
                                            <div className="flex flex-col gap-1 w-10">
                                                <button onClick={() => removeStat(s.id)} className="flex-1 bg-red-950/20 border border-red-900/30 rounded-xl text-red-500 text-sm font-black active-btn flex items-center justify-center hover:bg-red-600 transition-all">-</button>
                                                <button onClick={() => {const n=prompt("Editar:", s.name); if(n) {updateCurrentGameData('stats', currentGame.stats.map(st=>st.id===s.id?{...st, name:n}:st)); showToast('✓ Editado');}}} className="flex-1 bg-slate-900/50 border border-slate-800 rounded-xl text-xs opacity-40 flex items-center justify-center hover:opacity-100 transition-all">✎</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>

                    <button onClick={() => setView('folders')} className="absolute bottom-8 left-8 w-16 h-16 bg-gradient-to-br from-slate-800 to-slate-900 rounded-full flex items-center justify-center shadow-2xl border-2 border-slate-700 active-btn text-3xl hover:scale-110 transition-all">🏠</button>
                    
                    {toast && <Toast message={toast} onClose={() => setToast(null)} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
